async function submitOrder(custId) {
  if (CART.length === 0) return alert('주문 품목을 추가해주세요.');

  // Phase 2 동시성: 트랜잭션으로 orderSeq 를 안전하게 증가시켜 주문번호 중복 방지
  // (두 거래처가 동시에 주문 제출해도 서로 다른 번호 보장)
  let orderSeq = 0;
  if (DB_REF) {
    // 버그 수정 (2026-06-12): 트랜잭션 *전* 에 _lastSaveTime 설정 — 그렇지 않으면
    // local-apply 단계에서 value 리스너가 isSelf=false 로 잘못 판단해 빨간 배너 + DB 덮어쓰기.
    _lastSaveTime = Date.now();
    try {
      const result = await DB_REF.child('settings/orderSeq').transaction(curr => {
        const next = (typeof curr === 'number' && curr > 0) ? curr : 1;
        return next + 1;
      });
      // 서버 확정 후에도 _lastSaveTime 재설정 (네트워크 지연 시 후속 리스너 발사 방어)
      _lastSaveTime = Date.now();
      if (result && result.committed) {
        const newVal = result.snapshot.val();
        if (typeof newVal === 'number') {
          orderSeq = newVal - 1;
          if (!DB.settings) DB.settings = {};
          DB.settings.orderSeq = newVal;
        }
      }
    } catch(e) {
      console.warn('orderSeq transaction failed, using local counter:', e);
    }
  }
  if (!orderSeq) {
    orderSeq = (DB.settings.orderSeq || 1);
    DB.settings.orderSeq = orderSeq + 1;
  }

  const order = {
    id: uid('o'),
    orderNo: 'ATM-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + String(orderSeq).padStart(3,'0'),
    customerId: custId,
    orderDate: new Date().toISOString(),
    deliveryDate: val('deliveryDate'),
    deliveryNotes: val('deliveryNotes'),
    items: CART.map(i => ({...i, actualWeightKg: i.unit === '작업중량' ? i.quantity : null})),
    status: 'new',
    createdAt: new Date().toISOString()
  };
  DB.orders.push(order);

  // Auto-add ordered products to customer favourites
  const custForFav = DB.customers.find(c => c.id === custId);
  if (custForFav) {
    custForFav.favoriteProductIds = custForFav.favoriteProductIds || [];
    CART.forEach(item => {
      if (!custForFav.favoriteProductIds.includes(item.productId)) {
        custForFav.favoriteProductIds.push(item.productId);
      }
    });
  }

  // 항상 먼저 이 기기(localStorage)에 저장
  saveLocalDB();

  // 하나의 창에서 "전송 중 → 접수 완료"를 보여준다.
  // 확인 버튼은 서버(Firebase)가 주문을 실제로 받은 게 확인된 뒤에만 눌리도록 비활성화로 시작한다.
  openModal(
    '<style>@keyframes atmspin{to{transform:rotate(360deg)}}</style>' +
    '<div id="submitState" style="text-align:center; padding:6px 4px 2px;">' +
      '<div style="display:inline-flex; align-items:center; gap:10px; background:#2E7D32; color:#fff; padding:11px 18px; border-radius:9px; font-size:14px; font-weight:600;">' +
        '<span style="width:16px; height:16px; border:2.5px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; display:inline-block; animation:atmspin 0.8s linear infinite;"></span>' +
        '주문을 서버로 보내는 중…' +
      '</div>' +
    '</div>' +
    '<div class="btn-row" style="justify-content:center; margin-top:18px;">' +
      '<button id="submitOkBtn" class="btn" disabled style="opacity:0.45; cursor:not-allowed; min-width:96px;">확인</button>' +
    '</div>'
  );
  // 전송 중에는 바깥 영역 클릭으로 창이 닫히지 않도록 막는다.
  const _bg = document.getElementById('modalBg');
  if (_bg) _bg.onclick = null;

  // Phase 2 동시성: 전체 DB 덮어쓰기 대신 신규 주문을 트랜잭션으로 push.
  // 거래처 favorites 도 부분 업데이트 (다른 거래처 주문과 충돌 없음).
  const delivered = !DB_REF ? true : await new Promise(resolve => {
    let done = false;
    const finish = ok => { if (!done) { done = true; clearTimeout(timer); resolve(ok); } };
    const timer = setTimeout(() => finish(false), 12000); // 12초 내 확인 못하면 실패로 간주
    _lastSaveTime = Date.now();
    DB_REF.child('orders').transaction(currentList => {
      const list = Array.isArray(currentList) ? currentList.slice() : [];
      if (list.some(x => x && x.id === order.id)) return list; // 이미 추가됨
      list.push(order);
      return list;
    }, (error, committed) => {
      if (committed && !error) {
        // 거래처 favorites 부분 업데이트 (fire-and-forget)
        if (custForFav) saveEntityField('customers', custId, 'favoriteProductIds');
        finish(true);
      } else {
        // 트랜잭션 실패 시 전체 저장으로 폴백
        DB_REF.set(DB).then(() => finish(true)).catch(() => finish(false));
      }
    });
  });

  const stateEl = document.getElementById('submitState');
  const okBtn = document.getElementById('submitOkBtn');

  if (delivered) {
    if (stateEl) stateEl.innerHTML =
      '<div style="font-size:44px; line-height:1; margin-bottom:10px;">✅</div>' +
      '<div style="font-size:17px; font-weight:700; color:#2E7D32;">주문이 정상 접수되었습니다</div>' +
      '<div style="font-size:12px; color:var(--muted); margin-top:7px;">주문번호: ' + order.orderNo + '</div>';
    if (okBtn) {
      okBtn.disabled = false;
      okBtn.style.opacity = '1';
      okBtn.style.cursor = 'pointer';
      okBtn.classList.add('success');
      okBtn.onclick = function(){ closeModal(); CART = []; location.hash = '#orderDetail?id=' + order.id; };
    }
  } else {
    // 서버 전송이 확인되지 않음 → 중복 방지를 위해 방금 추가한 주문을 로컬에서 제거하고, 장바구니는 유지해 재시도 가능하게 둔다.
    DB.orders = DB.orders.filter(x => x.id !== order.id);
    saveLocalDB();
    if (stateEl) stateEl.innerHTML =
      '<div style="font-size:44px; line-height:1; margin-bottom:10px;">⚠️</div>' +
      '<div style="font-size:16px; font-weight:700; color:#C62828;">주문 전송이 확인되지 않았습니다</div>' +
      '<div style="font-size:12px; color:var(--muted); margin-top:7px;">인터넷 연결을 확인한 뒤<br>다시 [주문 제출]을 눌러 주세요.</div>';
    if (okBtn) {
      okBtn.disabled = false;
      okBtn.style.opacity = '1';
      okBtn.style.cursor = 'pointer';
      okBtn.textContent = '닫기';
      okBtn.onclick = function(){ closeModal(); }; // 장바구니 유지 → 바로 재시도 가능
    }
  }
}

function completeWeighing(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  const missing = o.items.filter(i => i.actualWeightKg == null || i.actualWeightKg <= 0);
  if (missing.length > 0) {
    if (!confirm(`${missing.length}개 품목의 중량이 미입력입니다. 그래도 진행할까요?`)) return;
  }
  o.status = 'weighed';
  o.weighedAt = new Date().toISOString();
  // Phase 2 동시성: 다른 주문 작업과 충돌 없이 status+weighedAt 동시 업데이트
  saveEntityFields('orders', orderId, { status: o.status, weighedAt: o.weighedAt });
  alert('계근 완료! 사무실로 전송되었습니다.');
  location.hash = '#warehouse';
}

function updateWeighing(orderId, idx, val) {
  const o = DB.orders.find(x => x.id === orderId);
  const v = parseFloat(val);
  o.items[idx].actualWeightKg = (isNaN(v) || v <= 0) ? null : v;
  // Phase 1 동시성: 전체 DB 덮어쓰지 않고 이 항목만 부분 업데이트
  saveOrderItemField(orderId, 'items', idx, 'actualWeightKg');
  renderWeighingTotal(o);
}
function renderWeighingTotal(o) {
  let total = 0, weighed = 0;
  o.items.forEach(it => {
    if (it.actualWeightKg != null && it.actualWeightKg > 0) {
      total += it.actualWeightKg;
      weighed++;
    }
  });
  const tEl = document.getElementById('totalWeighedKg');
  const pEl = document.getElementById('weighProgress');
  if (tEl) tEl.textContent = total.toFixed(2);
  if (pEl) pEl.textContent = weighed + '/' + o.items.length;
}

//  매출 일보 (Daily Sales Report)
// =========================================================================
function formatDateDMY(iso) {
  if (!iso) return '-';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function dailyReportComputeRows(dateISO) {
  const custs = DB.customers.filter(c => c.active !== false);
  const todayCutoff = new Date(dateISO + 'T00:00:00');
  const rows = custs.map(c => {
    const days = termsDays(c.terms);
    const allInvoices = DB.orders
      .filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === c.id)
      .map(o => ({
        dateISO: (o.invoicedAt || o.orderDate || '').slice(0,10),
        amount: computeTotals(o).grand
      }))
      .filter(x => x.dateISO);
    const allPayments = (DB.payments||[]).filter(p => p.customerId === c.id);

    // 전미수금 = 선택일 이전(<)까지의 인보이스 - 입금
    const priorInvoiced = allInvoices.filter(x => x.dateISO < dateISO).reduce((s,x)=>s+x.amount,0);
    const priorPaid = allPayments.filter(p => (p.date||'') < dateISO).reduce((s,p)=>s+p.amount,0);
    const priorBalance = priorInvoiced - priorPaid;

    // 당일 매출액 / 입금액
    const todaySales = allInvoices.filter(x => x.dateISO === dateISO).reduce((s,x)=>s+x.amount,0);
    const todayPaid = allPayments.filter(p => (p.date||'') === dateISO).reduce((s,p)=>s+p.amount,0);

    // 현잔액 = 전미수금 + 매출액 - 입금액
    const currentBalance = priorBalance + todaySales - todayPaid;

    // Overdue 정책 (2026-06-16 변경):
    //   - 외상 거래처: due date(인보이스 발행일 + 결제텀일) 이후 추가로 7일 grace period가 지나야 Overdue
    //     예) 7일 외상 → 발행일 + 14일 이후 미결제분, 14일 외상 → 발행일 + 21일 이후
    //   - 현금/계좌이체(termsDays=0): Overdue 계산 자체에서 제외 (사용자 정책)
    const GRACE_DAYS = 7;
    let overdue = 0;
    if (days > 0) {
      const invoicesAsOf = allInvoices
        .filter(x => x.dateISO <= dateISO)
        .sort((a,b) => a.dateISO.localeCompare(b.dateISO));
      let totalPaymentAsOf = allPayments
        .filter(p => (p.date||'') <= dateISO)
        .reduce((s,p)=>s+p.amount,0);
      for (const inv of invoicesAsOf) {
        let unpaid = inv.amount;
        if (totalPaymentAsOf > 0) {
          const applied = Math.min(totalPaymentAsOf, unpaid);
          unpaid -= applied;
          totalPaymentAsOf -= applied;
        }
        if (unpaid > 0.001) {
          const invDate = new Date(inv.dateISO + 'T00:00:00');
          const overdueDate = new Date(invDate.getTime());
          overdueDate.setDate(overdueDate.getDate() + days + GRACE_DAYS);
          if (overdueDate < todayCutoff) overdue += unpaid;
        }
      }
    }
    return { c, priorBalance, todaySales, todayPaid, currentBalance, overdue };
  }).filter(r =>
    Math.abs(r.priorBalance) > 0.001 ||
    Math.abs(r.todaySales) > 0.001 ||
    Math.abs(r.todayPaid) > 0.001 ||
    Math.abs(r.currentBalance) > 0.001 ||
    r.overdue > 0.001
  );
  rows.sort((a,b) => (b.overdue - a.overdue) || (b.currentBalance - a.currentBalance) || a.c.name.localeCompare(b.c.name, 'ko'));
  return rows;
}

function dailyReportTotals(rows) {
  return rows.reduce((t, r) => ({
    priorBalance: t.priorBalance + r.priorBalance,
    todaySales: t.todaySales + r.todaySales,
    todayPaid: t.todayPaid + r.todayPaid,
    currentBalance: t.currentBalance + r.currentBalance,
    overdue: t.overdue + r.overdue,
  }), {priorBalance:0, todaySales:0, todayPaid:0, currentBalance:0, overdue:0});
}

        <td class="num" style="font-weight:700; font-size:14px; color:${totals.currentBalance > 0 ? 'var(--warn)' : (totals.currentBalance < -0.001 ? 'var(--success)' : txt)};">$${fmtMoney(totals.currentBalance)}</td>
        <td class="num" style="font-weight:700; font-size:14px; color:${totals.overdue > 0.001 ? '#D32F2F' : 'var(--muted)'};">${totals.overdue > 0.001 ? '🔴 $' + fmtMoney(totals.overdue) : '–'}</td>

          <td class="num" style="color:${r.todayPaid > 0.001 ? 'var(--success)' : 'var(--muted)'};">${r.todayPaid > 0.001 ? '$' + fmtMoney(r.todayPaid) : '–'}</td>
          <td class="num" style="font-weight:700; color:${balColor};">$${fmtMoney(r.currentBalance)}</td>
          <td class="num" style="font-weight:700; color:${r.overdue > 0.001 ? '#D32F2F' : 'var(--muted)'};">${r.overdue > 0.001 ? '🔴 $' + fmtMoney(r.overdue) : '–'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

window.setDrDateToday = function() {
  const el = document.getElementById('drDate');
  if (!el) return;
  el.value = new Date().toISOString().slice(0,10);
  renderDailyReport();
};

window.renderDailyReport = function() {
  const dateEl = document.getElementById('drDate');
  if (!dateEl) return;
  const dateISO = dateEl.value || new Date().toISOString().slice(0,10);
  const rows = dailyReportComputeRows(dateISO);
  const wrap = document.getElementById('drTableWrap');
  if (wrap) wrap.innerHTML = dailyReportScreenTableHTML(rows);
  const dateLbl = document.getElementById('drDateLabel');
  if (dateLbl) dateLbl.textContent = formatDateDMY(dateISO);
  // 오늘 날짜 스냅샷만 자동 저장 (과거/미래 일자 조회는 저장 안 함)
  const todayISO = new Date().toISOString().slice(0,10);
  if (dateISO === todayISO) saveDailySalesSnapshot(dateISO, rows);
  // 저장 폴더 정보 표시 (비동기)
  refreshDailyReportFolderInfo(dateISO);
};

async function refreshDailyReportFolderInfo(dateISO) {
  const el = document.getElementById('drFolderInfo');
  if (!el) return;
  try {
    const handle = await idbGet('dailyReportDirHandle');
    if (handle) {
      const ym = (dateISO || new Date().toISOString().slice(0,10)).slice(0,7);
      el.innerHTML = `📁 PDF 저장 폴더: <b style="color:var(--brand);">${handle.name}/${ym}/</b>ATM_매출일보_${dateISO}.pdf`;
    } else {
      el.innerHTML = `<span style="color:var(--warn);">⚠️ PDF 저장 폴더 미설정</span> — "📁 폴더 변경" 버튼으로 1회만 지정하면 이후 자동 저장됩니다`;
    }
  } catch(e) {
    el.innerHTML = `<span style="color:var(--muted);">📁 저장 폴더 정보 로딩 실패</span>`;
  }
}

function saveDailySalesSnapshot(dateISO, rows) {
  try {
    const key = 'atm_daily_sales_log';
    const log = JSON.parse(localStorage.getItem(key) || '{}');
    const totals = dailyReportTotals(rows);
    log[dateISO] = {
      date: dateISO,
      savedAt: new Date().toISOString(),
      totals,
      rows: rows.map(r => ({
        custId: r.c.id,
        custName: r.c.name,
        terms: r.c.terms,
        priorBalance: r.priorBalance,
        todaySales: r.todaySales,
        todayPaid: r.todayPaid,
        currentBalance: r.currentBalance,
        overdue: r.overdue,
      })),
    };
    localStorage.setItem(key, JSON.stringify(log));
  } catch (e) { console.warn('일보 스냅샷 저장 실패', e); }
}

let _dailyReportDirHandle = null;

async function getDailyReportDirHandle() {
  if (_dailyReportDirHandle) {
    try {
      const perm = await _dailyReportDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return _dailyReportDirHandle;
      const req = await _dailyReportDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return _dailyReportDirHandle;
    } catch(e) {}
  }
  try {
    const handle = await idbGet('dailyReportDirHandle');
    if (handle) {
      let perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _dailyReportDirHandle = handle; return handle; }
    }
  } catch(e) {}
  return null;
}

window.saveDailyReportPDF = async function() {
  const dateEl = document.getElementById('drDate');
  const dateISO = (dateEl && dateEl.value) || new Date().toISOString().slice(0,10);
  const rows = dailyReportComputeRows(dateISO);
  const totals = dailyReportTotals(rows);

  if (typeof window.jspdf === 'undefined' || typeof window.html2canvas === 'undefined') {
    return alert('PDF 라이브러리를 불러오는 중입니다.\n잠시 후 다시 시도해 주세요.');
  }

  if (typeof showToast === 'function') showToast('💾 PDF 생성 중...');

  const dirHandle = await getDailyReportDirHandle();

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
  container.innerHTML = buildDailyReportPDFHTML(rows, totals, dateISO);
  document.body.appendChild(container);

  try {
    await new Promise(r => setTimeout(r, 120));
    const canvas = await html2canvas(container.firstElementChild, {
      scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const pageW = 210, pageH = 297;
    const imgH = canvas.height * pageW / canvas.width;
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    if (imgH <= pageH) {
      doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
    } else {
      let yOff = 0;
      while (yOff < imgH) {
        if (yOff > 0) doc.addPage();
        doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
        yOff += pageH;
      }
    }

    const yearMonth = dateISO.slice(0,7);
    const filename = `ATM_매출일보_${dateISO}.pdf`;

    if (dirHandle) {
      try {
        const buf = doc.output('arraybuffer');
        await writeToFolderPath(dirHandle, [yearMonth], filename, buf);
        if (typeof showToast === 'function') showToast(`✅ 매출일보 저장 완료 — 📁 ${dirHandle.name}/${yearMonth}/${filename}`);
      } catch(e) {
        console.warn('폴더 저장 실패, 다운로드 대체:', e);
        doc.save(filename);
        if (typeof showToast === 'function') showToast(`💾 매출일보 다운로드 완료 (폴더 쓰기 실패)`);
      }
    } else {
      doc.save(filename);
      setTimeout(() => alert('💾 매출일보 다운로드 완료!\n\n📁 매번 같은 폴더에 자동 저장하려면\n"📁 폴더 변경" 버튼을 한 번 눌러서\n저장 폴더를 지정해 주세요.\n\n이후부터는 클릭만 하면\n자동으로 그 폴더에 "년-월" 하위폴더가 만들어지고\n그 안에 PDF가 저장됩니다.'), 300);
    }
  } catch(e) {
    console.error('매출일보 PDF 저장 실패:', e);
    alert('PDF 저장 실패: ' + e.message);
  } finally {
    document.body.removeChild(container);
  }
};

function lineUnitPrice(it, p, cust) {
  // 우선순위: 1) 라인별 명시 (인보이스 준비 시 사장님이 수정한 값)
  //          2) 거래처 맞춤 단가 (customPrices[productId] — 자동 학습됨)
  //          3) 품목 마스터 단가
  if (it.lineUnitPrice != null) return it.lineUnitPrice;
  if (cust && cust.customPrices && it.productId && cust.customPrices[it.productId] != null) {
    return cust.customPrices[it.productId];
  }
  return p ? p.priceKg : 0;
}
// 거래처 맞춤 단가만 별도로 가져오기 (UI에 "마스터 $XX" 표시할 때 사용)
function customerCustomPrice(cust, productId) {
  if (!cust || !cust.customPrices || !productId) return null;
  const v = cust.customPrices[productId];
  return (v != null) ? v : null;
}

// === Feature 2: 거래처 검색 가능한 select 컴포넌트 =================
// opts: { selectId, selectedId, includeInactive(bool), placeholder, onChange(string), label(string)? }
// 검색 입력 + select 조합. 검색어 입력하면 select 옵션이 좁혀짐.
function renderCustomerSearchSelect(opts) {
  opts = opts || {};
  const selId = opts.selectId;
  const searchId = selId + '_search';
  const includeInactive = !!opts.includeInactive;
  const placeholder = opts.placeholder || '— 선택하세요 —';
  const onChange = opts.onChange || '';
  const list = DB.customers.filter(c => includeInactive || c.active !== false);
  const selected = opts.selectedId || '';
  let html = '<div style="position:relative;">';
  html += '<input type="text" id="' + searchId + '" placeholder="🔍 거래처 검색 (이름·코드·담당자)"';
  html += ' autocomplete="off"';
  html += ' style="width:100%;padding:6px 9px;border:1px solid var(--line);border-radius:4px;font-size:13px;margin-bottom:5px;box-sizing:border-box;"';
  html += ' oninput="filterCustomerSelect(\'' + selId + '\', this.value)">';
  html += '<select id="' + selId + '" data-include-inactive="' + (includeInactive ? '1' : '0') + '"';
  if (onChange) html += ' onchange="' + onChange + '"';
  html += '>';
  html += '<option value="">' + placeholder + '</option>';
  list.forEach(c => {
    const sel = (c.id === selected) ? ' selected' : '';
    html += '<option value="' + c.id + '"' + sel + '>' + (c.name || '') + ' (' + (c.code || '') + ')</option>';
  });
  html += '</select></div>';
  return html;
}

window.filterCustomerSelect = function(selId, query) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  const q = (query || '').toLowerCase().trim();
  const includeInactive = sel.dataset.includeInactive === '1';
  const list = DB.customers.filter(c => includeInactive || c.active !== false);
  const allOpt = sel.querySelector('option[value=""]');
  const placeholder = allOpt ? allOpt.textContent : '— 선택하세요 —';
  const currentVal = sel.value;
  const filtered = q
    ? list.filter(c => {
        const hay = ((c.name || '') + ' ' + (c.code || '') + ' ' + (c.contact || '')).toLowerCase();
        return hay.indexOf(q) >= 0;
      })
    : list;
  let html = '<option value="">' + placeholder + '</option>';
  filtered.forEach(c => {
    const sel2 = (c.id === currentVal) ? ' selected' : '';
    html += '<option value="' + c.id + '"' + sel2 + '>' + (c.name || '') + ' (' + (c.code || '') + ')</option>';
  });
  sel.innerHTML = html;
  // 현재 선택값이 필터에서 사라지면 placeholder 로 리셋되지 않음 — 선택 유지를 위해 보존
  if (currentVal && !filtered.some(c => c.id === currentVal)) {
    // 검색에서 빠졌더라도 사용자가 선택한 거래처 옵션은 보존해서 보여준다
    const c = list.find(x => x.id === currentVal);
    if (c) {
      const extra = document.createElement('option');
      extra.value = c.id;
      extra.selected = true;
      extra.textContent = (c.name || '') + ' (' + (c.code || '') + ')  ✓ 선택됨';
      sel.appendChild(extra);
    }
  }
  // onchange 콜백이 있으면, 검색만으로는 트리거되지 않음 (사용자가 직접 선택해야).
};
// 금액 천단위 쉼표 (예: 1234.5 → "1,234.50")
function fmtMoney(n) {
  return (Number(n) || 0).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
// 주문 단위 영문 표기 (박스→box, 팩→pack)
function unitEn(u) {
  return { '박스': 'box', '팩': 'pack' }[u] || u;
}
// 결제조건 표기 (현금/Cash, 7day 등)
function termsLabel(t) {
  return { '현금': '현금/Cash', '계좌이체': '계좌이체/Transfer', '7일 외상': '7day', '14일 외상': '14day', '30일 외상': '30day' }[t] || (t || '-');
}
// 결제조건 → 일수 (현금/계좌이체는 0일 = 당일)
function termsDays(t) {
  if (!t) return 7;
  if (t === '현금' || t === '계좌이체') return 0;
  const m = (t + '').match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 7;
}
// 인보이스 발행일 기준 듀데이트 ("10 Jul 2026" 형식)
function dueDateText(baseISO, terms) {
  const base = new Date(baseISO);
  if (isNaN(base.getTime())) return '-';
  const d = new Date(base.getTime());
  d.setDate(d.getDate() + termsDays(terms));
  return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
}
// HTML 이스케이프 + 멀티라인 → <div>줄 (사용자 입력 본문용)
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function multilineToDivs(s) {
  if (!s) return '';
  return String(s).split(/\r?\n/).map(line => `<div>${escHtml(line) || '&nbsp;'}</div>`).join('');
}

// 회사 주소 표기 ('Australia' 기본값은 인보이스에 표시하지 않음)
function companyAddrLine() {
  var a = DB.company.address;
  return (a && a !== 'Australia') ? a : '';
}
function computeTotals(order) {
  // Only weighed items contribute to totals — no fake estimates for 박스/팩.
  let subtotal = 0, totalKg = 0, unweighedCount = 0;
  const cust = DB.customers.find(c => c.id === order.customerId);
  getInvoiceItems(order).forEach(it => {
    if (it._status === 'cancelled') return;
    const p = DB.products.find(x => x.id === it.productId);
    if (it.actualWeightKg == null) { unweighedCount++; return; }
    totalKg += it.actualWeightKg;
    subtotal += it.actualWeightKg * lineUnitPrice(it, p, cust);
  });
  // Treat priceKg as GST-inclusive (common AU wholesale convention)
  const gst = subtotal * (DB.company.gstRate / (1 + DB.company.gstRate));
  return { subtotal: subtotal - gst, gst, grand: subtotal, totalKg, unweighedCount };
}

function setHistQuickRange(range) {
  if (!range) return;
  const today = new Date();
  let from, to;
  switch(range) {
    case 'today': from = to = today; break;
    case 'yesterday':
      from = to = new Date(today); from.setDate(today.getDate()-1); to = new Date(from); break;
    case 'week':
      from = new Date(today); from.setDate(today.getDate() - today.getDay()); to = today; break;
    case 'month':
      from = new Date(today.getFullYear(), today.getMonth(), 1); to = today; break;
    case 'lastmonth':
      from = new Date(today.getFullYear(), today.getMonth()-1, 1);
      to = new Date(today.getFullYear(), today.getMonth(), 0); break;
    case 'ytd':
      from = new Date(today.getFullYear(), 0, 1); to = today; break;
  }
  document.getElementById('histFrom').value = from.toISOString().slice(0,10);
  document.getElementById('histTo').value = to.toISOString().slice(0,10);
}

  HISTORY_FILTER.dateFrom = val('histFrom');

function getFilteredHistory() {
  return DB.orders.filter(o => {
    const date = (o.orderDate || '').slice(0, 10);
    if (HISTORY_FILTER.dateFrom && date && date < HISTORY_FILTER.dateFrom) return false;
    if (HISTORY_FILTER.dateTo && date && date > HISTORY_FILTER.dateTo) return false;
    if (HISTORY_FILTER.customerId && o.customerId !== HISTORY_FILTER.customerId) return false;
    if (HISTORY_FILTER.status && o.status !== HISTORY_FILTER.status) return false;
    return true;
  }).sort((a,b) => (b.orderDate||'').localeCompare(a.orderDate||''));

function exportHistoryCSV(detailed) {
  const orders = getFilteredHistory();
  if (orders.length === 0) return alert('내보낼 데이터가 없습니다.');
  const rows = [];
  if (detailed) {
    rows.push(['주문일','주문번호','거래처코드','거래처','상태','인보이스번호','발행일','품목','브랜드','분류','주문단위','주문수량','실측중량_kg','단가_per_kg','금액_GST포함','요청사항']);
    orders.forEach(o => {
      const c = DB.customers.find(x => x.id === o.customerId);
      o.items.forEach(it => {
        const p = DB.products.find(x => x.id === it.productId);
        const price = lineUnitPrice(it, p, c);
        const w = it.actualWeightKg;
        const amt = (w != null) ? w * price : '';
        rows.push([
          (o.orderDate||'').slice(0,10),
          o.orderNo,
          c ? c.code : '',
          c ? c.name : '',
          statusLabel(o.status),
          o.invoiceNo || '',
          (o.invoicedAt||'').slice(0,10),
          p ? p.name : '',
          p ? p.brand : '',
          p ? p.cut : '',
          it.unit,
          it.quantity,
          w != null ? w.toFixed(2) : '',
          price.toFixed(2),
          amt !== '' ? amt.toFixed(2) : '',
          (it.notes || '').replace(/[\r\n]+/g, ' ')
        ]);
      });
    });
  } else {
    rows.push(['주문일','주문번호','거래처코드','거래처','품목수','총중량_kg','총금액_GST포함','상태','인보이스번호','희망배송일','배송요청사항']);
    orders.forEach(o => {
      const c = DB.customers.find(x => x.id === o.customerId);
      const t = computeTotals(o);
      rows.push([
        (o.orderDate||'').slice(0,10),
        o.orderNo,
        c ? c.code : '',
        c ? c.name : '',
        o.items.length,
        t.totalKg.toFixed(2),
        t.grand.toFixed(2),
        statusLabel(o.status),
        o.invoiceNo || '',
        o.deliveryDate || '',
        (o.deliveryNotes || '').replace(/[\r\n]+/g, ' ')
      ]);
    });
  }
  // CSV with UTF-8 BOM for Excel/한글 호환
  const csv = '﻿' + rows.map(row =>
    row.map(cell => {
      const s = String(cell == null ? '' : cell);
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',')
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const tag = detailed ? 'detail' : 'summary';
  const fname = `ATM_history_${HISTORY_FILTER.dateFrom||'all'}_${HISTORY_FILTER.dateTo||'all'}_${tag}.csv`;
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

  var el = document.getElementById('invoiceChangeNotice');

  var items = getInvoiceItems(o);
  var added     = items.filter(function(it){ return it._source === 'added' && it._status !== 'cancelled'; }).length;
  var cancelled = items.filter(function(it){ return it._status === 'cancelled'; }).length;
  var removed   = cancelled;
  if (added > 0 || cancelled > 0) {
    el.innerHTML = '<div class="notice" style="border-left-color:#E67E22;background:#FEF9F0;margin-bottom:12px;">'

      : isAdded
      ? '<span style="background:#27AE60;color:#fff;font-size:10px;border-radius:4px;padding:1px 5px;margin-right:4px;">추가요청</span>'
      : '';
    var cancelNote = isCancelled && it._cancelNote ? '<br><small style="color:#E74C3C;">사유: ' + it._cancelNote + '</small>' : '';
    var addNote    = !isCancelled && it._addNote   ? '<br><small style="color:var(--muted);">📝 ' + it._addNote + '</small>' : '';
    var itemNote   = it.notes ? '<br><small style="color:var(--muted);">※ ' + it.notes + '</small>' : '';
    var pName  = p ? p.name         : '(품목없음)';
    var pBrand = p ? (p.brand || '') : '';
    var lineP  = isCancelled ? 0 : (it.lineUnitPrice || 0);
    var masterP = p ? p.priceKg : 0;
    // 거래처 맞춤 단가 / 마스터 차이 시 표시
    var _custForRow = DB.customers.find(function(x){ return x.id === window._prepCustId; });
    var hasCustomPrice = _custForRow && _custForRow.customPrices && _custForRow.customPrices[it.productId] != null;
    var priceDiff = '';
    if (!isCancelled && Math.abs(lineP - masterP) > 0.001) {
      var labelText = hasCustomPrice ? '거래처 맞춤 · 마스터 $' : '마스터 $';
      priceDiff = '<small style="color:var(--warn);display:block;font-size:10px;">' + labelText + fmtMoney(masterP) + '</small>';
    }
    var amt = fmtMoney(isCancelled ? 0 : ((w != null ? parseFloat(w) : 0) * lineP));
    var nameStyle = isCancelled ? 'text-decoration:line-through;color:#999;' : '';
    var btnTitle  = isCancelled ? '취소 복원 (클릭)' : '취소 처리';
    var btnIcon   = isCancelled ? '↩️' : '❌';
    var wCell = isCancelled
      ? '<span style="color:#999;">0.00</span>'
      : '<input type="number" step="0.01" value="' + wDisplay + '"'
      +   ' style="width:90px;padding:6px;border:1px solid var(--line);border-radius:4px;text-align:right;"'
      +   ' onblur="if(this.value)this.value=parseFloat(this.value).toFixed(2)"'
      +   ' onchange="updatePrepWeight(window._prepOid,' + i + ',this.value)">';
    var pCell = isCancelled
      ? '<span style="color:#999;">0.00</span>'
      : '<input type="number" step="0.01" value="' + lineP.toFixed(2) + '"'
      +   ' style="width:90px;padding:6px;border:2px solid var(--warn);border-radius:4px;text-align:right;font-weight:600;"'
      +   ' onblur="this.value=parseFloat(this.value||0).toFixed(2)"'
      +   ' onchange="updatePrepPrice(window._prepOid,' + i + ',this.value)">' + priceDiff;
    var amtCell = isCancelled ? '<span style="color:#999;">$0.00</span>' : '$' + amt;
    html += '<tr style="' + rowBg + '">'
      + '<td>' + badge + '<b style="' + nameStyle + '">' + pName + '</b>' + cancelNote + addNote + itemNote + '</td>'
      + '<td style="font-size:11px;color:var(--muted);">' + pBrand + '</td>'
      + '<td>' + orderDisplay + '</td>'
      + '<td class="num">' + wCell + '</td>'
      + '<td class="num">' + pCell + '</td>'
      + '<td class="num"><b id="prep_amt_' + i + '">' + amtCell + '</b></td>'
      + '<td style="text-align:center;"><button onclick="removeInvoiceItem(window._prepOid,' + i + ')"'
      +   ' title="' + btnTitle + '" style="background:none;border:none;cursor:pointer;font-size:15px;">' + btnIcon + '</button></td>'
      + '</tr>';
  }
  tbody.innerHTML = html;
}

function removeInvoiceItem(orderId, idx) {
  var oid = orderId || window._prepOid;
  var o   = DB.orders.find(function(x){ return x.id === oid; });
  var item = getInvoiceItems(o)[idx];
  var p    = DB.products.find(function(x){ return x.id === item.productId; });
  var name = p ? p.name : '해당 품목';
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  if (item._status === 'cancelled') {
    // 복원
    item._status = ''; item._cancelNote = '';
    // Phase 2 동시성: 부분 업데이트
    saveOrderItemField(oid, listKey, idx, '_status');
    saveOrderItemField(oid, listKey, idx, '_cancelNote');
    saveLocalDB();
    renderPrepTbody(o); renderPrepTotals(o); renderInvoiceChangeNotice(o);
    return;
  }
  var reason = prompt('"' + name + '" 취소 처리합니다.\n사유 입력 (예: 재고없음, 고객취소):');
  if (reason === null) return;
  item._status = 'cancelled';
  item._cancelNote = reason || '취소';
  // Phase 2 동시성: 부분 업데이트
  saveOrderItemField(oid, listKey, idx, '_status');
  saveOrderItemField(oid, listKey, idx, '_cancelNote');
  saveLocalDB();
  renderPrepTbody(o); renderPrepTotals(o); renderInvoiceChangeNotice(o);
}

function addInvoiceItem(orderId, productId, note) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  var p = DB.products.find(function(x){ return x.id === productId; });
  if (!o || !p) return;
  if (!o.invoiceItems) {
    o.invoiceItems = o.items.map(function(it){
      return Object.assign({}, it, {_source: 'original'});
    });
  }
  // 신규 추가 라인도 거래처 맞춤 단가 우선
  var custForAdd = DB.customers.find(function(x){ return x.id === o.customerId; });
  var customPForAdd = customerCustomPrice(custForAdd, productId);
  var initialPrice = (customPForAdd != null) ? customPForAdd : (p.priceKg || 0);
  o.invoiceItems.push({
    productId: productId, unit: '박스', quantity: 1,
    actualWeightKg: null, notes: '',
    lineUnitPrice: initialPrice,
    _source: 'added', _addNote: note || ''
  });
  // Phase 2 동시성: 이 주문의 invoiceItems 만 부분 업데이트
  saveEntityField('orders', orderId, 'invoiceItems');
  document.getElementById('prepAddSearch').value = '';
  document.getElementById('prepAddResults').innerHTML = '';
  renderPrepTbody(o);
  renderPrepTotals(o);
  renderInvoiceChangeNotice(o);
}

function renderPrepAddResults(orderId, q) {
  var div = document.getElementById('prepAddResults');
  if (!q || q.length < 1) { div.innerHTML = ''; return; }
  var results = DB.products.filter(function(p){
    return p.active && (p.name + ' ' + p.cut).toLowerCase().indexOf(q.toLowerCase()) >= 0;
  }).slice(0, 20);
  if (!results.length) {
    div.innerHTML = '<div style="color:var(--muted);padding:6px;font-size:13px;">결과 없음</div>';
    return;
  }
  var html = '';
  for (var j = 0; j < results.length; j++) {
    var p   = results[j];
    var lbl = CUT_DISPLAY[p.cut] || p.cut;
    var pid = p.id;
    html += '<div'
      + ' onclick="var n=prompt(\'추가 사유 (예: 긴급 전화 추가주문):\') || \'\';addInvoiceItem(\'' + orderId + '\',\'' + pid + '\',n)"'
      + ' onmouseover="this.style.background=\'#FFF5D6\'"'
      + ' onmouseout="this.style.background=\'transparent\'"'
      + ' style="cursor:pointer;padding:6px 8px;font-size:13px;border-bottom:1px solid var(--line);">'
      + '<span style="color:var(--brand);font-size:11px;">' + lbl + '</span>'
      + ' <b>' + p.name + '</b></div>';
  }
  div.innerHTML = html;
}

function resetInvoiceItems(orderId) {
  if (!confirm('인보이스 품목을 원본 주문으로 되돌릴까요?')) return;
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  delete o.invoiceItems;
  // Phase 2 동시성: invoiceItems 만 null 처리 (다른 주문 영향 없음)
  saveEntityField('orders', orderId, 'invoiceItems');
  route();
}

function updatePrepWeight(orderId, idx, val) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  if (!o) return;
  getInvoiceItems(o)[idx].actualWeightKg = parseFloat(val) || 0;
  // Phase 1 동시성: 인보이스 준비 화면도 부분 업데이트
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  saveOrderItemField(orderId, listKey, idx, 'actualWeightKg');
  // Re-render the amount cell directly
  var amtEl = document.getElementById('prep_amt_' + idx);
  var it = getInvoiceItems(o)[idx];
  if (amtEl) amtEl.textContent = '$' + fmtMoney((it.actualWeightKg||0) * (it.lineUnitPrice||0));
  renderPrepTotals(o);
}
function updatePrepPrice(orderId, idx, val) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  if (!o) return;
  var newPrice = parseFloat(val) || 0;
  getInvoiceItems(o)[idx].lineUnitPrice = newPrice;
  // Phase 1 동시성: 단가 변경도 부분 업데이트
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  saveOrderItemField(orderId, listKey, idx, 'lineUnitPrice');
  // Feature 1: 거래처 맞춤 단가 자동 학습 — 다음 인보이스의 초기값으로 사용됨
  var it = getInvoiceItems(o)[idx];
  var cust = DB.customers.find(function(x){ return x.id === o.customerId; });
  if (cust && it.productId) {
    var p = DB.products.find(function(x){ return x.id === it.productId; });
    var masterP = p ? (p.priceKg || 0) : 0;
    cust.customPrices = cust.customPrices || {};
    // 마스터 단가와 같으면 맞춤 단가 항목을 제거 (마스터를 따라가게)
    if (Math.abs(newPrice - masterP) < 0.001) {
      delete cust.customPrices[it.productId];
    } else {
      cust.customPrices[it.productId] = newPrice;
    }
    // Phase 2 동시성: 이 거래처 customPrices 만 부분 업데이트
    saveEntityField('customers', cust.id, 'customPrices');
  }
  var amtEl = document.getElementById('prep_amt_' + idx);
  if (amtEl) amtEl.textContent = '$' + fmtMoney((it.actualWeightKg||0) * (it.lineUnitPrice||0));
  // 단가 변경 직후 마스터 차이 표시도 새로고침
  renderPrepTbody(o);
  renderPrepTotals(o);
}

function resetPrepPricesToMaster(orderId) {
  if (!confirm('모든 라인 단가를 품목 마스터의 현재값으로 되돌릴까요?')) return;
  const o = DB.orders.find(x => x.id === orderId);
  const listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  getInvoiceItems(o).forEach(it => {
    const p = DB.products.find(x => x.id === it.productId);
    it.lineUnitPrice = p ? p.priceKg : 0;
  });
  // Phase 2 동시성: 이 주문의 가격 리스트만 부분 업데이트
  saveEntityField('orders', orderId, listKey);
  route(); // re-render
}
async function issueInvoice(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  const t = computeTotals(o);
  if (t.unweighedCount > 0) {
    if (!confirm(`${t.unweighedCount}건의 품목이 계근되지 않았습니다.\n그래도 인보이스를 발행하시겠습니까?`)) return;
  }
  if (!confirm(`인보이스를 발행합니다.\n총액: $${fmtMoney(t.grand)} (GST 포함)\n\n발행 후에는 단가 수정이 불가합니다. 진행할까요?`)) return;

  // Phase 2 동시성: 두 매니저가 동시에 인보이스 발행해도 중복 번호 방지
  // Firebase 트랜잭션으로 invoiceNoNext 를 원자적으로 증가시키고 그 값을 사용
  let invoiceNo;
  if (DB_REF) {
    // 버그 수정 (2026-06-12): 트랜잭션 *전* 에 _lastSaveTime 설정 — local-apply
    // 단계에서 빨간 배너 + DB 덮어쓰기로 인한 items "undefined" 표시 방지.
    _lastSaveTime = Date.now();
    try {
      const result = await DB_REF.child('settings/invoiceNoNext').transaction(curr => {
        const next = (typeof curr === 'number' && curr >= 200001) ? curr : 200001;
        return next + 1;
      });
      _lastSaveTime = Date.now(); // 서버 확정 후 갱신
      const committed = result && result.committed;
      const newVal = result && result.snapshot && result.snapshot.val();
      if (committed && typeof newVal === 'number') {
        invoiceNo = String(newVal - 1);
        if (!DB.settings) DB.settings = {};
        DB.settings.invoiceNoNext = newVal;
      }
    } catch(e) {
      console.warn('invoiceNoNext transaction failed, falling back to local counter:', e);
    }
  }
  if (!invoiceNo) {
    // Firebase 미연결 또는 트랜잭션 실패 시 로컬 폴백
    if (!DB.settings.invoiceNoNext) DB.settings.invoiceNoNext = 200001;
    invoiceNo = String(DB.settings.invoiceNoNext++);
  }
  o.invoiceNo = invoiceNo;
  o.status = 'invoiced';
  o.invoicedAt = new Date().toISOString();

  // Phase 2 동시성: 이 주문의 status/invoiceNo/invoicedAt 만 부분 업데이트
  saveEntityFields('orders', orderId, {
    status: o.status,
    invoicedAt: o.invoicedAt,
    invoiceNo: o.invoiceNo
  });
  saveLocalDB();
  location.hash = '#invoice?id=' + orderId;
  autoSaveInvoice(orderId).catch(e => console.warn('autoSaveInvoice error:', e));
}

function markDelivered(id) {
  const o = DB.orders.find(x => x.id === id);
  o.status = 'delivered'; o.deliveredAt = new Date().toISOString();
  // Phase 2 동시성: 이 주문의 status/deliveredAt 만 부분 업데이트
  saveEntityFields('orders', id, { status: o.status, deliveredAt: o.deliveredAt });
  alert('배송완료로 변경되었습니다.'); route();
}
function sendInvoice(id) {
  const o = DB.orders.find(x => x.id === id);
  const cust = DB.customers.find(c => c.id === o.customerId);
  const totals = computeTotals(o);
  let msg = `[ALL THAT MEAT] ${cust.name} 사장님\n\n`;
  msg += `인보이스 ${o.invoiceNo}\n\n`;
  msg += `--- 품목 ---\n`;
  o.items.forEach(it => {
    const p = DB.products.find(x => x.id === it.productId);
    const w = it.actualWeightKg;
    const price = lineUnitPrice(it, p, cust);
    const orderText = it.unit === '작업중량' ? `${it.quantity}kg 작업` : `${it.quantity}${unitEn(it.unit)}`;
    if (w == null) {
      msg += `· ${p.name}(${p.brand}) ${orderText} → 계근 대기\n`;
    } else {
      msg += `· ${p.name}(${p.brand}) ${orderText} → ${w.toFixed(2)}kg × $${fmtMoney(price)} = $${fmtMoney(w*price)}\n`;
    }
  });
  msg += `\n총중량 ${totals.totalKg.toFixed(2)}kg\n`;
  msg += `합계 $${fmtMoney(totals.grand)} (GST 포함)\n`;
  if (navigator.share) navigator.share({title:'ATM Invoice', text:msg}).catch(()=>{});
  else navigator.clipboard.writeText(msg).then(()=>alert('인보이스 내용이 복사되었습니다. 카톡/이메일에 붙여넣으세요.\n\n'+msg));
}
function shareOrder(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o) return;
  const cust = DB.customers.find(c => c.id === o.customerId);
  let msg = '[ALL THAT MEAT] ' + (cust ? cust.name : '') + ' 사장님\n\n';
  msg += '✅ 주문이 접수되었습니다!\n';
  msg += '주문번호: ' + o.orderNo + '\n';
  msg += '주문일: ' + (o.orderDate||'').slice(0,10) + '\n';
  if (o.deliveryDate) msg += '희망 배송일: ' + o.deliveryDate + '\n';
  msg += '\n--- 주문 품목 ---\n';
  o.items.forEach(function(it) {
    const p = DB.products.find(x => x.id === it.productId);
    if (!p) return;
    const display = it.unit === '작업중량' ? it.quantity + 'kg (작업)' : it.quantity + it.unit;
    msg += '· ' + p.name + '(' + p.brand + ') ' + display;
    if (it.notes) msg += ' — ' + it.notes;
    msg += '\n';
  });
  if (o.deliveryNotes) msg += '\n요청사항: ' + o.deliveryNotes + '\n';
  msg += '\n정확한 중량·금액은 작업 완료 후 인보이스로 안내드립니다.';
  if (navigator.share) {
    navigator.share({title: 'ATM 주문 ' + o.orderNo, text: msg}).catch(function(){});
  } else {
    navigator.clipboard.writeText(msg).then(function() {
      alert('주문 내용이 복사되었습니다!\n카카오톡에 붙여넣으세요 😊\n\n' + msg);
    });
  }
}

// -------- IndexedDB helpers (for persisting directory handle) --------
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('atm_app_meta', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const r = db.transaction('kv','readonly').objectStore('kv').get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const r = db.transaction('kv','readwrite').objectStore('kv').put(value, key);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

let _invoiceBackupDirHandle = null;

async function getInvoiceBackupDirHandle() {
  if (_invoiceBackupDirHandle) {
    try {
      const perm = await _invoiceBackupDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return _invoiceBackupDirHandle;
      const req = await _invoiceBackupDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return _invoiceBackupDirHandle;
    } catch(e) {}
  }
  try {
    const handle = await idbGet('invoiceBackupDirHandle');
    if (handle) {
      let perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _invoiceBackupDirHandle = handle; return handle; }
    }
  } catch(e) {}
  return null;
}

async function setInvoiceBackupFolder() {
  if (!window.showDirectoryPicker) {
    return alert('이 브라우저는 폴더 선택을 지원하지 않습니다.\nChrome 또는 Edge를 사용해 주세요.');
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('invoiceBackupDirHandle', handle);
    _invoiceBackupDirHandle = handle;
    alert('✅ 인보이스 PDF 저장 폴더 설정 완료!\n📁 ' + handle.name + '\n\n이제 📄 인보이스 PDF 클릭 시 이 폴더에 자동 저장됩니다.');
  } catch(e) {
    if (e.name !== 'AbortError') alert('폴더 선택 실패: ' + e.message);
  }
}

// 지정한 루트 폴더 아래로 segments 경로를 따라 디렉터리를 만들고 파일을 기록한다.
// ⚠️ 2중 폴더 방지: 사용자가 선택한 폴더 이름이 최상위 목표 폴더명(segments[0])과 같으면
//    그 폴더를 다시 만들지 않고 그대로 사용한다. (예: 'ATM Invoice' 폴더를 직접 선택했을 때
//    'ATM Invoice/ATM Invoice/...' 로 중첩 생성되던 버그 수정)
async function writeToFolderPath(rootHandle, segments, filename, data) {
  let dir = rootHandle;
  for (let i = 0; i < segments.length; i++) {
    const seg = (segments[i] || '').toString().trim();
    if (!seg) continue;
    // 현재 폴더와 같은 이름의 하위 폴더는 만들지 않음 (예: 사용자가 "거래처 백업" 폴더를 선택한 경우 중복 방지)
    if (dir.name === seg) continue;
    dir = await dir.getDirectoryHandle(seg, { create: true });
  }
  const fileHandle = await dir.getFileHandle(filename, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(data);
  await writable.close();
}

async function exportOrderPDFs(silent = false) {
  const orders = DB.orders.filter(o => o.status !== 'cancelled');
  if (orders.length === 0) {
    if (!silent) alert('백업할 주문서가 없습니다.');
    return { saved: 0, failed: 0, skipped: '주문 없음' };
  }
  if (typeof window.jspdf === 'undefined' || typeof window.html2canvas === 'undefined') {
    if (!silent) alert('PDF 라이브러리를 불러오는 중입니다.\n잠시 후 다시 시도해 주세요.');
    return { saved: 0, failed: 0, skipped: 'PDF 라이브러리 로딩 중' };
  }
  const { jsPDF } = window.jspdf;
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
  document.body.appendChild(container);
  const dirHandle = await getBackupDirHandle();
  let saved = 0, failed = 0;
  for (const o of orders) {
    try {
      const cust = DB.customers.find(c => c.id === o.customerId) || { name:'미확인', contact:'', phone:'', address:'', terms:'' };
      container.innerHTML = buildOrderSheetHTML(o, cust);
      await new Promise(r => setTimeout(r, 80));
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pageW = 210, pageH = 297;
      const imgH = canvas.height * pageW / canvas.width;
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      if (imgH <= pageH) {
        doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
      } else {
        let yOff = 0;
        while (yOff < imgH) {
          if (yOff > 0) doc.addPage();
          doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
          yOff += pageH;
        }
      }
      const dateStr = (o.orderDate || '').slice(0,10);
      const dateCompact = dateStr.replace(/-/g, '');
      const custName = cust.name.replace(/[\/:*?"<>|]/g, '_');
      const pdfFilename = `주문서_${dateCompact}_${o.orderNo}.pdf`;
      if (dirHandle) {
        try {
          const buf = doc.output('arraybuffer');
          // (선택한 거래처 백업 폴더) > ATM 주문서 > {날짜} > {거래처} > PDF
          await writeToFolderPath(dirHandle, ['ATM 주문서', dateStr || 'unknown', custName], pdfFilename, buf);
        } catch(e) {
          console.warn('주문서 폴더 저장 실패, 다운로드 대체:', e);
          doc.save(pdfFilename);
        }
      } else {
        doc.save(pdfFilename);
      }
      saved++;
      await new Promise(r => setTimeout(r, 300));
    } catch(e) {
      console.error('주문서 PDF 저장 실패:', o.orderNo, e);
      failed++;
    }
  }
  document.body.removeChild(container);
  if (!silent) {
    const msg = dirHandle
      ? `✅ 주문서 ${saved}건 → 📁 거래처 백업/ATM 주문서/날짜/거래처/ 저장` + (failed > 0 ? ` / ${failed}건 실패` : '')
      : `✅ 주문서 ${saved}건 다운로드 완료` + (failed > 0 ? ` / ${failed}건 실패` : '');
    alert(msg);
  }
  return { saved, failed };
}

async function setBackupFolder() {
  if (!window.showDirectoryPicker) {
    return alert('이 브라우저는 폴더 선택을 지원하지 않습니다.\nChrome 또는 Edge를 사용해 주세요.');
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('backupDirHandle', handle);
    _backupDirHandle = handle;
    showToast('✅ 백업 폴더 설정 완료: 📁 ' + handle.name);
    // 백업 탭이 열려 있으면 새로고침
    const hash = location.hash;
    if (hash.includes('tab=backup')) renderBackupAdmin();
  } catch(e) {
    if (e.name !== 'AbortError') alert('폴더 선택 실패: ' + e.message);
  }
}

async function getBackupDirHandle() {
  // 1. 메모리 캐시 확인
  if (_backupDirHandle) {
    try {
      const perm = await _backupDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return _backupDirHandle;
      const req = await _backupDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return _backupDirHandle;
    } catch(e) {}
  }
  // 2. IndexedDB 저장 핸들 복구
  try {
    const handle = await idbGet('backupDirHandle');
    if (handle) {
      let perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _backupDirHandle = handle; return handle; }
    }
  } catch(e) {}
  return null;
}

async function exportAll(silent = false) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const filename = `ATM_backup_${ts}.json`;
  const json = JSON.stringify(DB, null, 2);
  const dirHandle = await getBackupDirHandle();
  if (dirHandle) {
    try {
      await writeToFolderPath(dirHandle, ['_백업(JSON)', dateStr], filename, json);
      if (!silent) showToast(`✅ 백업 저장 완료 — 📁 _백업(JSON)/${dateStr}/${filename}`);
      return { success: true, filename, folder: `_백업(JSON)/${dateStr}` };
    } catch(e) { console.warn('폴더 저장 실패, 다운로드로 대체:', e); }
  } else {
    if (!silent) {
      const go = confirm('💡 백업 저장 폴더가 설정되지 않았습니다.\n\n지금 폴더를 선택하시겠습니까?\n\n(취소 시 다운로드 폴더로 저장됩니다)');
      if (go) { await setBackupFolder(); return await exportAll(silent); }
    }
  }
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  if (!silent) showToast(`💾 백업 다운로드 완료 — ${filename}`);
  return { success: true, filename, folder: null };
}

function importAll() {
  // 1차 잠금: 관리자만 가능
  if (!ADMIN_UNLOCKED) {
    return alert('⚠️ 복원은 관리자만 가능합니다.\n관리자 메뉴에서 먼저 로그인 후 진행해주세요.');
  }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const incoming = JSON.parse(ev.target.result);
        // 2차 잠금: 현재 vs 복원 후 데이터량 비교 미리보기
        const curC = (DB.customers||[]).length;
        const curO = (DB.orders||[]).length;
        const curP = (DB.products||[]).length;
        const curPay = (DB.payments||[]).length;
        const newC = (incoming.customers||[]).length;
        const newO = (incoming.orders||[]).length;
        const newP = (incoming.products||[]).length;
        const newPay = (incoming.payments||[]).length;

        function diffLabel(a, b) {
          if (a === b) return `${a}곳 (변동 없음)`;
          if (a > b)   return `${a}곳 → ${b}곳  ⚠️ ${a-b}곳 감소`;
          return `${a}곳 → ${b}곳  (+${b-a})`;
        }
        const dangerFlags = [];
        if (newC < curC) dangerFlags.push(`거래처 ${curC-newC}곳 손실`);
        if (newO < curO) dangerFlags.push(`주문 ${curO-newO}건 손실`);
        if (newP < curP) dangerFlags.push(`품목 ${curP-newP}개 손실`);
        if (newPay < curPay) dangerFlags.push(`결제기록 ${curPay-newPay}건 손실`);

        const warning = dangerFlags.length > 0
          ? `\n🚨 데이터 손실 경고:\n  · ${dangerFlags.join('\n  · ')}\n`
          : '';

        const msg = `📂 복원 확인\n\n` +
                    `[현재 → 복원 후]\n` +
                    `거래처: ${diffLabel(curC, newC)}\n` +
                    `주문:   ${diffLabel(curO, newO)}\n` +
                    `품목:   ${diffLabel(curP, newP)}\n` +
                    `결제:   ${diffLabel(curPay, newPay)}\n` +
                    warning + `\n` +
                    `⚠️ Firebase 동기화로 9개 기기 모두 데이터가 바뀝니다.\n` +
                    `(되돌릴 수 없음)\n\n` +
                    `진행하려면 정확히 "복원"을 입력하세요:`;
        const typed = prompt(msg);
        if (typed !== '복원') return alert('취소되었습니다. (입력값이 "복원"과 일치해야 진행)');

        // 3차 잠금: 마지막 확인
        if (!confirm(`정말 진행할까요?\n\n현재 거래처 ${curC}곳 → ${newC}곳\n현재 주문 ${curO}건 → ${newO}건`)) {
          return alert('취소되었습니다.');
        }

        DB = incoming;
        saveDB();
        alert(`✅ 복원 완료!\n거래처 ${newC}곳, 주문 ${newO}건, 품목 ${newP}개`);
        route();
      } catch (err) { alert('파일을 읽을 수 없습니다: ' + err.message); }
    };
    r.readAsText(f);
  };
  input.click();
}

function viewPayment(params) {
  if (!ADMIN_UNLOCKED && !STAFF_UNLOCKED) { showStaffLogin(); return; }
  const app = document.getElementById('app');
  const preCid = (params && params.cid) ? params.cid : '';
  const today = new Date().toISOString().slice(0, 10);

  function balanceFor(cid) {
    if (!cid) return null;
    const invoiced = DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid)
      .reduce((s, o) => s + computeTotals(o).grand, 0);
    const paid = DB.payments.filter(p => p.customerId === cid)
      .reduce((s, p) => s + p.amount, 0);
    return invoiced - paid;
  }

  function renderBalance(cid) {
    const bal = balanceFor(cid);
    if (bal === null) return '';
    return `<div style="margin-top:8px; padding:10px 14px; background:var(--surface); border-radius:6px; border:1px solid var(--line);">
      현재 미수금: <b style="color:${bal > 0 ? 'var(--warn)' : 'var(--success)'};">$${fmtMoney(bal)}</b>

window.savePayment = function() {
  const cid = document.getElementById('payCustomer').value;
  const date = document.getElementById('payDate').value;
  const amount = parseFloat(document.getElementById('payAmount').value);
  const method = document.getElementById('payMethod').value;
  const ref = document.getElementById('payRef').value.trim();
  const notes = document.getElementById('payNotes').value.trim();

  if (!cid) { alert('거래처를 선택하세요.'); return; }
  if (!date) { alert('입금일을 입력하세요.'); return; }
  if (isNaN(amount) || amount <= 0) { alert('올바른 금액을 입력하세요.'); return; }

  const payment = {
    id: uid('pay'),
    customerId: cid,
    date,
    amount,
    method,
    reference: ref,
    notes,
    createdAt: new Date().toISOString()
  };
  DB.payments.push(payment);
  // Phase 2 동시성: 다른 입금 작업과 충돌 없이 push
  pushEntityToFirebase('payments', payment);

  // Show success, reset amount/ref/notes for next entry
  document.getElementById('payAmount').value = '';
  document.getElementById('payRef').value = '';
  document.getElementById('payNotes').value = '';
  const succ = document.getElementById('paySuccess');
  succ.style.display = 'block';
  setTimeout(() => { succ.style.display = 'none'; }, 3000);
  // Refresh balance display
  id2 = document.getElementById('payCustomer').value;
  document.getElementById('payBalanceBox').innerHTML = window.renderPaymentBalance(cid2);
};

function viewStatement(params) {
  if (!ADMIN_UNLOCKED && !STAFF_UNLOCKED) { showStaffLogin(); return; }
  const app = document.getElementById('app');
  const today = new Date().toISOString().slice(0, 10);
  const firstDate = new Date(new Date().getFullYear(), 0, 1).toISOString().slice(0,10); // 올해 1월 1일
  const preCid = (params && params.cid) || '';

  function buildStatement(cid, dateFrom, dateTo) {
    const cust = DB.customers.find(c => c.id === cid);
    if (!cust) return '<p style="color:var(--muted); padding:8px;">거래처를 선택하고 [조회]를 누르세요.</p>';

    // 이월 잔액 = 시작일 이전의 모든 인보이스 - 입금
    const openInv = DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid && (o.invoicedAt||o.orderDate||'').slice(0,10) < dateFrom)
      .reduce((s,o) => s + computeTotals(o).grand, 0);
    const openPaid = DB.payments.filter(p => p.customerId === cid && p.date < dateFrom)
      .reduce((s,p) => s + p.amount, 0);
    const opening = openInv - openPaid;

    // 기간 내 인보이스 + 입금을 한 줄씩 이벤트로 모아 날짜순 정렬
    const events = [];
    DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid).forEach(o => {
      const d = (o.invoicedAt||o.orderDate||'').slice(0,10);
      if (d >= dateFrom && d <= dateTo) events.push({ date: d, kind: 'inv', no: (o.invoiceNo||o.orderNo||'-'), amount: computeTotals(o).grand });
    });
    DB.payments.filter(p => p.customerId === cid).forEach(p => {
      if (p.date >= dateFrom && p.date <= dateTo) events.push({ date: p.date, kind: 'pay', amount: p.amount });
    });
    events.sort((a,b) => { if (a.date !== b.date) return a.date < b.date ? -1 : 1; return a.kind === 'inv' ? -1 : 1; });

    let bal = opening, totInv = 0, totPay = 0;
    let rows = '<tr style="color:var(--muted);"><td>' + dateFrom + '</td><td>이월 잔액</td><td class="num">—</td><td class="num">—</td><td class="num"><b>$' + fmtMoney(opening) + '</b></td></tr>';
    events.forEach(e => {
      if (e.kind === 'inv') {
        bal += e.amount; totInv += e.amount;
        rows += '<tr><td>' + e.date + '</td><td>' + e.no + '</td><td class="num">$' + fmtMoney(e.amount) + '</td><td class="num">—</td><td class="num"><b>$' + fmtMoney(bal) + '</b></td></tr>';
      } else {
        bal -= e.amount; totPay += e.amount;
        rows += '<tr><td>' + e.date + '</td><td style="color:var(--muted);">입금</td><td class="num">—</td><td class="num" style="color:var(--success);">$' + fmtMoney(e.amount) + '</td><td class="num"><b>$' + fmtMoney(bal) + '</b></td></tr>';
      }
    });
    const balColor = bal > 0 ? 'var(--warn)' : 'var(--success)';

    return '<div id="statementPrintArea">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">' +
        '<div>' +
          '<div style="font-size:20px;font-weight:800;color:var(--brand-dark);">' + cust.name + '</div>' +
          '<div style="font-size:13px;color:var(--muted);margin-top:2px;">거래내역서 (Statement) · 기준일: ' + today + '</div>' +
          (cust.contact ? '<div style="font-size:12px;color:var(--muted);">' + cust.contact + ' · ' + (cust.phone||'') + '</div>' : '') +
        '</div>' +
        '<div style="text-align:right;font-size:12px;color:var(--muted);">' +
          '<div style="font-weight:700;color:var(--brand-dark);">ALL THAT MEAT WHOLESALE PTY LTD</div>' +
          '<div>기간: ' + dateFrom + ' ~ ' + dateTo + '</div>' +
        '</div>' +
      '</div>' +
      '<table class="t"><thead><tr><th>날짜</th><th>인보이스 번호</th><th class="num">금액</th><th class="num">입금</th><th class="num">발란스</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="margin-top:18px;padding:14px 18px;background:var(--surface);border-radius:8px;border:1px solid var(--line);display:flex;gap:32px;flex-wrap:wrap;">' +
        '<div><span style="color:var(--muted);font-size:12px;">총 인보이스</span><br><b style="font-size:18px;">$' + fmtMoney(totInv) + '</b></div>' +
        '<div><span style="color:var(--muted);font-size:12px;">총 입금</span><br><b style="font-size:18px;color:var(--success);">$' + fmtMoney(totPay) + '</b></div>' +
        '<div><span style="color:var(--muted);font-size:12px;">기말 미수금</span><br><b style="font-size:20px;color:' + balColor + ';">$' + fmtMoney(bal) + '</b></div>' +
      '</div></div>' +
      '<div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;" class="no-print">' +
        '<button class="btn" onclick="window.print()">🖨️ 출력 / PDF</button>' +
        '<button class="btn secondary" onclick="shareStatementKakao(\'' + cid + '\',\'' + dateFrom + '\',\'' + dateTo + '\')">📤 카톡/이메일 공유</button>' +
      '</div>';
  }

  app.innerHTML =
    '<h2 class="page-title">📄 거래내역서 (Statement)' +
      '<button class="btn sm secondary" style="float:right;" onclick="location.hash=\'#office\'">← 사무실로</button></h2>' +
    '<div class="card no-print" style="margin-bottom:12px;">' +
      '<div class="grid-3" style="align-items:flex-end;">' +
        '<div class="field"><label>거래처</label>' +
          renderCustomerSearchSelect({ selectId: 'stmtCust', selectedId: preCid, placeholder: '— 선택하세요 —' }) +
        '</div>' +
        '<div class="field"><label>시작일</label><input type="date" id="stmtFrom" value="' + firstDate + '"></div>' +
        '<div class="field"><label>종료일</label><input type="date" id="stmtTo" value="' + today + '"></div>' +
      '</div>' +
      '<div style="margin-top:10px;"><button class="btn sm" onclick="refreshStatement()">조회</button></div>' +
    '</div>' +
    '<div class="card" id="stmtBody">' + (preCid ? buildStatement(preCid, firstDate, today) : '<p style="color:var(--muted); padding:8px;">거래처와 기간을 선택하고 [조회]를 누르세요.</p>') + '</div>';

  window.refreshStatement = function() {
    const cid = document.getElementById('stmtCust').value;
    const from = document.getElementById('stmtFrom').value || firstDate;
    const to = document.getElementById('stmtTo').value || today;
    if (!cid) { alert('거래처를 선택하세요.'); return; }
    document.getElementById('stmtBody').innerHTML = buildStatement(cid, from, to);
  };
}

window.shareStatementKakao = function(cid, dateFrom, dateTo) {
  const cust = DB.customers.find(c => c.id === cid);
  const custName = cust ? cust.name : cid;
  const today = new Date().toISOString().slice(0, 10);
  const methodLabel = { cash: '현금', cheque: '체크', bank: '은행이체' };

  const invoices = DB.orders.filter(o =>
    ['invoiced','delivered'].includes(o.status) &&
    o.customerId === cid &&
    (o.invoicedAt || o.orderDate || '').slice(0,10) >= dateFrom &&
    (o.invoicedAt || o.orderDate || '').slice(0,10) <= dateTo
  ).sort((a,b) => (a.invoicedAt||a.orderDate||'') > (b.invoicedAt||b.orderDate||'') ? 1 : -1);

  const payments = DB.payments.filter(p =>
    p.customerId === cid && p.date >= dateFrom && p.date <= dateTo
  ).sort((a,b) => a.date > b.date ? 1 : -1);

  const totalInvoiced = invoices.reduce((s, o) => s + computeTotals(o).grand, 0);
  const totalPaid = payments.reduce((s, p) => s + p.amount, 0);
  const balance = totalInvoiced - totalPaid;

  let txt = '[ALL THAT MEAT] ' + custName + ' 거래내역서\n기준일: ' + today + '\n';
  if (dateFrom !== '2000-01-01' || dateTo !== today) txt += '기간: ' + dateFrom + ' ~ ' + dateTo + '\n';
  txt += '\n--- 인보이스 ---\n';
  if (invoices.length === 0) { txt += '(없음)\n'; }
  else { invoices.forEach(function(o) { txt += (o.invoicedAt||o.orderDate||'').slice(0,10) + ' ' + (o.invoiceNo||o.orderNo) + ' $' + fmtMoney(computeTotals(o).grand) + '\n'; }); }
  txt += '\n--- 입금 ---\n';
  if (payments.length === 0) { txt += '(없음)\n'; }
  else { payments.forEach(function(p) { txt += p.date + ' ' + (methodLabel[p.method]||p.method) + ' $' + fmtMoney(p.amount) + (p.reference ? ' (' + p.reference + ')' : '') + '\n'; }); }
  txt += '\n미수금: $' + fmtMoney(balance);

  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() {
      alert('거래내역이 클립보드에 복사됐습니다.\n카카오톡 또는 이메일에 붙여넣기 하세요.\n\n' + txt);
    }).catch(function() { prompt('아래 내용을 복사하세요 (Ctrl+A → Ctrl+C):', txt); });
  } else {
    prompt('아래 내용을 복사하세요 (Ctrl+A → Ctrl+C):', txt);
  }
};

// =========================================================================
//  AUTO-BACKUP: 매일 정해진 시각에 JSON 자동 백업 (디바이스 단위)
// =========================================================================
const AUTO_BACKUP_KEY = 'atm_last_auto_backup_date';
async function checkAutoBackup(opts) {
  opts = opts || {};
  try {
    const settings = (DB && DB.settings) || {};
    const enabled = settings.autoBackupEnabled !== false; // 기본 ON
    const mode = settings.autoBackupMode || 'both'; // 'scheduled' | 'onOpen' | 'both'
    const hour = (typeof settings.autoBackupHour === 'number') ? settings.autoBackupHour : 22;
    if (!enabled) return;
    if (!_backupDirHandle) return; // 폴더 미설정이면 자동 백업 skip (조용히)

    const today = new Date().toISOString().slice(0,10);
    const last = localStorage.getItem(AUTO_BACKUP_KEY) || '';
    if (last === today) return; // 오늘 이미 자동 백업 완료

    const now = new Date();
    const isOpenTrigger = !!opts.onOpen;

    // 트리거 게이트:
    // - onOpen 호출이면 모드가 'onOpen' 또는 'both'일 때 즉시 실행 (시각 무시)
    // - 인터벌(주기) 호출이면 모드가 'scheduled' 또는 'both'일 때 설정 시각 이후만 실행
    if (isOpenTrigger) {
      if (mode === 'scheduled') return; // 스케줄 전용 모드면 onOpen 무시
    } else {
      if (mode === 'onOpen') return; // onOpen 전용 모드면 인터벌 무시
      if (now.getHours() < hour) return; // 설정 시각 이전이면 대기
    }

    const result = await exportAll(true); // silent=true
    if (result && result.success) {
      localStorage.setItem(AUTO_BACKUP_KEY, today);
      showToast(`🔄 자동 백업 완료 (${isOpenTrigger?'앱 열림':'스케줄'}) — ${result.filename}`);
    }
  } catch(e) {
    console.warn('자동 백업 실패:', e);
  }
}
function setAutoBackupMode(mode) {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupMode = mode;
  saveDB();
  const label = { scheduled:'정해진 시각', onOpen:'앱 열 때', both:'둘 다' }[mode] || mode;
  showToast(`✅ 자동 백업 동작: ${label}`);
  route();
}
function setAutoBackupTime(hour) {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupHour = hour;
  saveDB();
  showToast(`✅ 자동 백업 시각이 ${hour}:00로 변경되었습니다.`);
  route();
}
function toggleAutoBackup() {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupEnabled = !(DB.settings.autoBackupEnabled !== false);
  saveDB();
  showToast(DB.settings.autoBackupEnabled ? '✅ 자동 백업 ON' : '⏸️ 자동 백업 OFF');
  route();
}

// =========================================================================
//  AUTO-SAVE: 인보이스 발행 시 OneDrive 폴더에 JSON + PDF 자동 저장
// =========================================================================
async function autoSaveInvoice(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o) return;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const dirHandle = await getBackupDirHandle();

  // 1. JSON 백업
  try {
    const json = JSON.stringify(DB, null, 2);
    const jsonFilename = `ATM_backup_${ts}.json`;
    if (dirHandle) {
      await writeToFolderPath(dirHandle, ['_백업(JSON)', dateStr], jsonFilename, json);
    } else {
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = jsonFilename; a.click();
      URL.revokeObjectURL(url);
    }
  } catch(e) { console.warn('JSON 백업 실패:', e); }

  // 2. 인보이스 PDF
  if (typeof window.jspdf !== 'undefined' && typeof window.html2canvas !== 'undefined') {
    try {
      const cust = DB.customers.find(c => c.id === o.customerId) || { name:'미확인', contact:'', phone:'', address:'', terms:'' };
      const totals = computeTotals(o);
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
      document.body.appendChild(container);
      container.innerHTML = buildInvoiceHTML(o, cust, totals);
      await new Promise(r => setTimeout(r, 120));
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
      });
      document.body.removeChild(container);
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pageW = 210, pageH = 297;
      const imgH = canvas.height * pageW / canvas.width;
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      if (imgH <= pageH) {
        doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
      } else {
        let yOff = 0;
        while (yOff < imgH) {
          if (yOff > 0) doc.addPage();
          doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
          yOff += pageH;
        }
      }
      const custName = cust.name.replace(/[\/:*?"<>|]/g, '_');
      const pdfFilename = `${o.invoiceNo || o.orderNo}_${dateStr}_${custName}.pdf`;
      if (dirHandle) {
        const buf = doc.output('arraybuffer');
        // exportInvoicePDFs 와 동일한 단일 구조로 저장
        // (선택한 거래처 백업 폴더) > ATM Invoice > {날짜} > {거래처} > PDF
        await writeToFolderPath(dirHandle, ['ATM Invoice', dateStr, custName], pdfFilename, buf);
        showToast(`✅ JSON + 인보이스 PDF 저장 완료 — 📁 ATM Invoice/날짜/거래처/`);
      } else {
        doc.save(pdfFilename);
        showToast('💾 JSON + PDF 다운로드 완료');
      }
    } catch(e) {
      console.warn('PDF 저장 실패:', e);
      showToast(dirHandle ? '💾 JSON 저장 완료 (PDF 실패)' : '💾 JSON 백업 다운로드 완료');
    }
  } else {
    showToast(dirHandle ? '💾 JSON 백업 저장 완료' : '💾 JSON 백업 다운로드 완료');
  }
}


if (FIREBASE_READY && DB_REF) {
  // 로딩 화면 표시 후 Firebase 데이터 수신 대기
  document.getElementById('app').innerHTML = `
    <div style="text-align:center; padding:80px 20px; color:var(--muted);">
      <div style="font-size:56px;">🥩</div>
      <div style="margin-top:16px; font-size:16px; font-weight:700; color:var(--brand-dark);">ALL THAT MEAT</div>
      <div style="margin-top:8px; font-size:13px;">실시간 연결 중... / Connecting...</div>
    </div>`;

  // Phase 2-D: 어떤 화면에서 입력 중이면 자동 새로고침으로 입력값이 사라지는 걸 방지
  function isSensitiveEntryScreen() {
    const hash = location.hash || '';
    return _isOrderEntry
      || hash.indexOf('#weigh') === 0
      || hash.indexOf('#invoicePrep') === 0
      || hash.indexOf('#payment') === 0
      || hash.indexOf('#admin') === 0
      || document.getElementById('modalBg') !== null;
  }

  // Phase 2-D: 충돌 인지도 향상 — 다른 기기 업데이트 시 항상 배너 표시
  function showSyncBanner(isSensitive) {
    let banner = document.getElementById('sync-banner');
    if (banner) banner.remove();
    banner = document.createElement('div');
    banner.id = 'sync-banner';
    if (isSensitive) {
      // 입력 중이면 빨간 경고 (자동 새로고침 안 함, 사용자가 직접 새로고침)
      banner.style.cssText = 'position:fixed;top:52px;left:0;right:0;background:#C0392B;color:#fff;text-align:center;padding:10px 14px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;';
      banner.innerHTML = '⚠️ 다른 사용자가 데이터를 업데이트했습니다 — 입력 중이면 저장 후 새로고침 (클릭하여 닫기)';
      banner.onclick = () => banner.remove();
      // 입력 중에는 자동으로 안 사라짐 — 사용자가 인지 후 닫아야 함
    } else {
      // 일반 화면은 짧은 파란 정보 배너
      banner.style.cssText = 'position:fixed;top:52px;left:0;right:0;background:#2E5C8A;color:#fff;text-align:center;padding:6px;font-size:12px;z-index:9999;';
      banner.innerHTML = '🔄 다른 기기에서 데이터가 업데이트되었습니다.';
      setTimeout(() => { banner && banner.remove(); }, 4000);
    }
    document.body.appendChild(banner);
  }

  let _firstLoad = true;
  // 버그 수정 (2026-06-12): isSelf 윈도우 3초 → 8초. 트랜잭션 서버 round-trip 이
  // 느린 네트워크에서 3초를 넘기면 자기 저장도 외부 업데이트로 오인됨.
  const SELF_WRITE_WINDOW_MS = 8000;
  DB_REF.on('value', snapshot => {
    const isSelf = (Date.now() - _lastSaveTime) < SELF_WRITE_WINDOW_MS;
    const data = snapshot.val();

    if (_firstLoad) {
      _firstLoad = false;
      initApp(data);
      return;
    }

    // 다른 기기에서 업데이트 — 자기가 방금 저장한 게 아니면 반영
    if (!isSelf) {
      // 버그 수정: 사용자가 입력 중인 화면이면 메모리도 덮어쓰지 말 것.
      // 그렇지 않으면 입력 중인 폼이 referencing 하던 객체가 사라져 "(품목없음)
      // undefined" 같은 깨진 표시가 발생.
      const sensitive = isSensitiveEntryScreen();
      if (!sensitive && data) {
        DB = data;
        saveLocalDB();
      }
      showSyncBanner(sensitive);
      if (!sensitive) {
        route(); // 입력 중이 아닐 때만 자동 새로고침
      }
    }
  });
} else {
  // Firebase 미설정 — localStorage 단독 모드
  initApp(loadLocalDB());
  if (!FIREBASE_READY) {
    console.info('Firebase 미설정 — localStorage 모드로 실행 중');
  }
}
</script>

<!-- PWA: Service Worker 등록 + 설치 안내 배너                          -->
<!-- =============================================================== -->
<script>
(function setupPWA() {
  // ---------------- Service Worker 등록 ----------------
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.info('[PWA] Service Worker 등록 완료:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', () => {
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              sw.postMessage('SKIP_WAITING');
            }
          });
        });
      }).catch(err => console.warn('[PWA] SW 등록 실패:', err));

      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        if (typeof window.showToast === 'function') {
          window.showToast('🆕 새 버전이 적용됩니다. 잠시 후 새로고침됩니다.');
        }
        setTimeout(() => location.reload(), 4000);
      });
    });
  }

  // ---------------- 환경 감지 ----------------
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
  }
  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  }
  function recentlyDismissed() {
    try {
      const v = localStorage.getItem('atm_install_dismissed');
      if (!v) return false;
      const days = (Date.now() - parseInt(v, 10)) / (1000*60*60*24);
      return days < 14; // 14일 쿨다운
    } catch (_) { return false; }
  }
  function markDismissed() {
    try { localStorage.setItem('atm_install_dismissed', String(Date.now())); } catch(_){}
  }

  // ---------------- 설치 배너 ----------------
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // 진입 직후 바로 띄우지 말고 살짝 지연 — 사용자 첫 화면 보고 나서
    setTimeout(showInstallBanner, 2500);
  });

  window.addEventListener('appinstalled', () => {
    markDismissed();
    deferredPrompt = null;
    const b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
    if (typeof window.showToast === 'function') {
      window.showToast('✅ ATM 주문 앱이 설치되었습니다!');
    }
  });

  // iOS 는 beforeinstallprompt 미지원 — 직접 안내
  window.addEventListener('load', () => {
    setTimeout(() => { if (isIOS()) showInstallBanner(); }, 5000);
  });

  function showInstallBanner() {
    if (isStandalone()) return;
    if (recentlyDismissed()) return;
    if (document.getElementById('pwa-install-banner')) return;

    const ios = isIOS();
    const promptable = !!deferredPrompt;
    if (!ios && !promptable) return; // 데스크탑 + Chrome 외 — skip

    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = [
      'position:fixed','left:12px','right:12px','bottom:16px','z-index:10000',
      'background:#fff','color:#2A1A1A',
      'border:2px solid #5C0F0F','border-radius:14px',
      'box-shadow:0 8px 24px rgba(0,0,0,0.22)',
      'padding:14px 16px','display:flex','align-items:flex-start','gap:12px',
      'font-size:13px','line-height:1.5',
      'max-width:480px','margin:0 auto',
      'animation:pwaSlideUp 0.35s ease-out'
    ].join(';');

    const iconHtml = '<img src="icon-192.png" alt="ATM" style="width:48px;height:48px;border-radius:10px;flex-shrink:0;">';
    const closeBtn = '<button id="pwa-install-close" aria-label="닫기" style="background:none;border:none;color:#999;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;align-self:flex-start;">×</button>';

    if (ios) {
      banner.innerHTML = `
        ${iconHtml}
        <div style="flex:1;">
          <div style="font-weight:700; color:#5C0F0F; font-size:14px; margin-bottom:4px;">
            🏠 홈 화면에 추가 / Add to Home Screen
          </div>
          <div style="color:#555; font-size:12px;">
            하단의 <b>공유 버튼 <span style="display:inline-block;border:1px solid #888;border-radius:4px;padding:0 4px;font-size:11px;">⬆️</span></b> → <b>"홈 화면에 추가"</b>를 눌러 앱처럼 사용하세요.
          </div>
          <div style="margin-top:8px;">
            <button id="pwa-install-later" style="background:#F2EEE8;border:1px solid #ddd;color:#666;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;">14일 후 다시 보기</button>
          </div>
        </div>
        ${closeBtn}
      `;
    } else {
      banner.innerHTML = `
        ${iconHtml}
        <div style="flex:1;">
          <div style="font-weight:700; color:#5C0F0F; font-size:14px; margin-bottom:4px;">
            🥩 ATM 주문 앱 설치 / Install App
          </div>
          <div style="color:#555; font-size:12px;">
            홈 화면에 추가하면 더 빠르게 접속할 수 있고, 오프라인에서도 작동해요.
          </div>
          <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
            <button id="pwa-install-now" style="background:#5C0F0F;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📲 설치 / Install</button>
            <button id="pwa-install-later" style="background:#F2EEE8;border:1px solid #ddd;color:#666;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;">나중에 / Later</button>
          </div>
        </div>
        ${closeBtn}
      `;
    }

    document.body.appendChild(banner);

    const remove = () => { markDismissed(); banner.remove(); };
    document.getElementById('pwa-install-close')?.addEventListener('click', remove);
    document.getElementById('pwa-install-later')?.addEventListener('click', remove);
    document.getElementById('pwa-install-now')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      try {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        console.info('[PWA] 사용자 선택:', choice.outcome);
      } catch(e) { console.warn('[PWA] prompt 실패:', e); }
      deferredPrompt = null;
      banner.remove();
    });
  }
})();
</script>
