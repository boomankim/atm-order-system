function saveCustomerMapping() {
  // Firebase-safe 저장 포맷:
  //   key = customerId (Firebase-safe, c_xxx 형식)
  //   value = 엑셀 거래처명 원문 (점·슬래시 등 제약 없음)
  //   customerId 가 없으면 (rare) sanitize 된 엑셀명을 키로 사용
  // 동일 customerId 가 여러 엑셀명에 매핑되면 마지막 항목이 우선 — 다른 엑셀명은
  // 일괄 import 시 fuzzy match 로 fallback 됨 (점수 30+ 후보)
  const map = {};
  let count = 0;
  for (const e of CUST_MAP_STATE.entries) {
    if (!e.selectedId) continue;
    const key = e.selectedId || _favSafeKey(e.excelName);
    map[key] = e.excelName;
    count++;
  }
  DB.settings = DB.settings || {};
  DB.settings.favsCustMap = map;
  try { saveDB(); } catch(err) { console.warn(err); alert('저장 실패: ' + err.message); return; }
  closeCustomerMappingModal();
  alert('💾 거래처 매핑 저장 완료\n\n' + count + '개 매핑 저장됨\n\n이제 「📊 엑셀에서 일괄 가져오기」 실행 시 이 매핑이 자동 적용됩니다.');
}

// =========================================================================
//  ITEM NAME MAPPING TOOL  (Excel 품목명 ↔ 시스템 product 매핑)
//  매핑은 DB.settings.favsItemMap 에 저장되며 일괄 import 시 자동 사용됨.
//  엑셀 중복 품목은 dedupe — 동일 문자열은 한 행으로 모임 (사용 거래처 수 표시)
//
//  ⚠️ Firebase 키 제약: '.', '#', '$', '/', '[', ']' 사용 불가
//  → favsItemMap 키로 품목 id를 사용 (id 없으면 안전 치환 키)
//  → 값은 엑셀 품목명 원문 (역방향 조회용)
//  → 읽기는 _favsItemNameToId() 가 양쪽 포맷 모두 호환
// =========================================================================
const _FB_BAD_KEY_RE = /[.#$/\[\]]/g;
function _favSafeKey(s) {
  return (s == null ? '' : String(s)).replace(_FB_BAD_KEY_RE, '_');
}
// 저장 형식 양쪽 모두 지원하는 역방향 조회:
//   신규: { productId: excelName, ... }
//   구버전: { excelName: productId, ... }
//   폴백: { safeName: productId, ... }  (id가 없는 경우)
// 반환: { excelName: productId } — 룩업용
function _favsItemNameToId() {
  const raw = (DB.settings && DB.settings.favsItemMap) || {};
  const result = {};
  if (!Array.isArray(DB.products)) return result;
  const idSet = new Set(DB.products.map(p => p.id));
  for (const k in raw) {
    const v = raw[k];
    if (typeof v !== 'string' || !v) continue;
    if (idSet.has(k)) {
      // 신규 포맷: k=productId, v=excelName
      result[v] = k;
    } else if (idSet.has(v)) {
      // 구버전 포맷: k=excelName, v=productId
      result[k] = v;
    }
    // 어느 쪽도 아니면 skip (orphan)
  }
  return result;
}
// favsCustMap 동일 패턴 — Firebase 키 제약 우회
//   신규: { customerId: excelName, ... }
//   구버전: { excelName: customerId, ... }
// 반환: { excelName: customerId } — 룩업용
function _favsCustNameToId() {
  const raw = (DB.settings && DB.settings.favsCustMap) || {};
  const result = {};
  if (!Array.isArray(DB.customers)) return result;
  const idSet = new Set(DB.customers.map(c => c.id));
  for (const k in raw) {
    const v = raw[k];
    if (typeof v !== 'string' || !v) continue;
    if (idSet.has(k)) {
      // 신규 포맷: k=customerId, v=excelName
      result[v] = k;
    } else if (idSet.has(v)) {
      // 구버전 포맷: k=excelName, v=customerId
      result[k] = v;
    }
  }
  return result;
}
let ITEM_MAP_STATE = null;

function openItemMappingTool() {
  // Build dedup'd unique items list (excelItemStr → { count, customers })
  const uniq = {};
  for (const excelName in ATM_FAVS_IMPORT_DATA) {
    for (const it of ATM_FAVS_IMPORT_DATA[excelName]) {
      const key = it.item;
      if (!uniq[key]) uniq[key] = { item: key, custCount: 0, totalCount: 0, customers: [] };
      uniq[key].custCount++;
      uniq[key].totalCount += (it.count || 0);
      uniq[key].customers.push(excelName);
    }
  }
  const savedMap = _favsItemNameToId();
  const entries = Object.values(uniq).map(function(u) {
    const cands = favFindProductMatches(u.item, 8);
    const saved = savedMap[u.item];
    let selected = '';
    if (saved && DB.products.find(function(p){return p.id === saved;})) {
      selected = saved;
    } else if (cands[0] && cands[0].score >= 7) {
      selected = cands[0].id;
    }
    return { item: u.item, custCount: u.custCount, totalCount: u.totalCount,
             customers: u.customers, candidates: cands, selectedId: selected };
  });
  // Sort by usage (custCount desc, totalCount desc) so frequent items come first
  entries.sort(function(a,b){
    if (b.custCount !== a.custCount) return b.custCount - a.custCount;
    return b.totalCount - a.totalCount;
  });
  ITEM_MAP_STATE = { entries: entries, filter: 'all', search: '' };
  renderItemMappingModal();
}

function renderItemMappingModal() {
  const s = ITEM_MAP_STATE;
  if (!s) return;
  let modal = document.getElementById('itemMapModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'itemMapModal';
    modal.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.55); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;';
    document.body.appendChild(modal);
  }

function renderItemMappingList() {
  const s = ITEM_MAP_STATE;
  const body = document.getElementById('itemMapListBody');
  if (!body) return;
  const q = (s.search || '').toLowerCase().replace(/\s+/g, '');
  const filtered = s.entries.filter(function(e){
    if (s.filter === 'mapped' && !e.selectedId) return false;
    if (s.filter === 'unmapped' && e.selectedId) return false;
    if (s.filter === 'lowconf') {
      const topScore = e.candidates[0] ? e.candidates[0].score : 0;
      if (topScore >= 7 && e.selectedId) return false;
    }
    if (q) {
      const nm = e.item.toLowerCase().replace(/\s+/g, '');
      if (nm.indexOf(q) < 0) return false;
    }
    return true;
  });
  if (filtered.length === 0) {
    body.innerHTML = '<div style="padding:30px; text-align:center; color:#888;">조건에 맞는 품목 없음</div>';
    return;
  }
  body.innerHTML = `
    <table style="width:100%; font-size:13px; border-collapse:collapse;">
      <thead style="position:sticky; top:0; background:#F0F0F0; z-index:1;">
        <tr>
          <th style="padding:8px; text-align:left;">엑셀 품목명</th>
          <th style="padding:8px; text-align:center; width:80px;">사용</th>
          <th style="padding:8px; text-align:left; width:45%;">시스템 품목</th>
          <th style="padding:8px; text-align:center; width:50px;"></th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(function(e){
          const idx = s.entries.indexOf(e);
          const matched = e.selectedId ? DB.products.find(function(p){return p.id===e.selectedId;}) : null;
          const topScore = e.candidates[0] ? e.candidates[0].score : 0;
          let icon, color;
          if (matched) {
            if (topScore >= 7) { icon = '✅'; color = '#2E7D32'; }
            else { icon = '⚠️'; color = '#EF6C00'; }
          } else {
            icon = '❌'; color = '#C62828';
          }
          const custTooltip = e.customers.slice(0, 10).join(', ') + (e.customers.length > 10 ? '...' : '');
          return `<tr style="border-top:1px solid #eee;">
            <td style="padding:8px;">
              <div style="color:${color}; font-weight:600;">${icon} ${e.item}</div>
              <div style="font-size:11px; color:#888; margin-top:2px;" title="${custTooltip.replace(/"/g,'&quot;')}">
                ${e.customers.slice(0,4).join(', ')}${e.customers.length > 4 ? ` +${e.customers.length-4}개` : ''}
              </div>
            </td>
            <td style="padding:8px; text-align:center; color:#666;">
              <div style="font-weight:700;">${e.custCount}</div>
              <div style="font-size:11px; color:#999;">${e.totalCount}건</div>
            </td>
            <td style="padding:8px;">
              <select onchange="itemMapSet(${idx}, this.value)"
                      style="width:100%; padding:5px 8px; border:1px solid #ccc; border-radius:5px; font-size:13px;">
                <option value="">— 매핑없음 (스킵) —</option>
                ${e.candidates.map(function(c){
                  const star = c.score >= 10 ? ' ★강추' : (c.score >= 7 ? ' (높음)' : '');
                  return `<option value="${c.id}" ${c.id===e.selectedId?'selected':''}>${c.name}${c.brand?' / '+c.brand:''} (${c.score}점)${star}</option>`;
                }).join('')}
                <optgroup label="── 전체 품목 ──">
                  ${DB.products.filter(function(p){return p.active;}).map(function(p){
                    if (e.candidates.some(function(x){return x.id===p.id;})) return '';
                    return `<option value="${p.id}" ${p.id===e.selectedId?'selected':''}>${p.name}${p.brand?' / '+p.brand:''}</option>`;
                  }).join('')}
                </optgroup>
              </select>
            </td>
            <td style="padding:8px; text-align:center;">
              ${e.selectedId ? `<button class="btn sm secondary" onclick="itemMapClear(${idx})" title="매핑 해제">✕</button>` : ''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function itemMapSet(idx, prodId) {
  ITEM_MAP_STATE.entries[idx].selectedId = prodId;
  renderItemMappingModal();
}
function itemMapClear(idx) {
  ITEM_MAP_STATE.entries[idx].selectedId = '';

}
function itemMapClearAll() {
  if (!confirm('모든 품목 매핑을 초기화하시겠습니까?')) return;
  ITEM_MAP_STATE.entries.forEach(function(e){ e.selectedId = ''; });

function itemMapAutoFillAll() {
  let filled = 0;
  ITEM_MAP_STATE.entries.forEach(function(e){
    if (e.selectedId) return;
    if (e.candidates[0] && e.candidates[0].score >= 7) {
      e.selectedId = e.candidates[0].id;
      filled++;
    }
  });
  renderItemMappingModal();
  alert(filled + '개 빈 항목에 자동매칭 적용됨 (점수 7+ 후보만)');
}

  ITEM_MAP_STATE.filter = v;

  ITEM_MAP_STATE.search = v;

function saveItemMapping() {
  // Firebase-safe 저장 포맷:
  //   key = productId (Firebase-safe, 항상 [a-z0-9_가-힣] 영역)
  //   value = 엑셀 품목명 원문 (값에는 Firebase 제약 없음 — 슬래시 OK)
  //   productId 가 없으면 (rare) sanitize 된 엑셀명을 키로 사용
  // 동일 productId 가 여러 엑셀명에 매핑되면 마지막 항목이 우선 — 다른 엑셀명은
  // 일괄 import 시 fuzzy match 로 fallback 됨 (점수 7+ 후보)
  const map = {};
  let count = 0;
  for (const e of ITEM_MAP_STATE.entries) {
    if (!e.selectedId) continue;
    const key = e.selectedId || _favSafeKey(e.item);
    map[key] = e.item;
    count++;
  }
  DB.settings = DB.settings || {};
  DB.settings.favsItemMap = map;
  try { saveDB(); } catch(err) { console.warn(err); alert('저장 실패: ' + err.message); return; }
  closeItemMappingModal();
  alert('💾 품목 매핑 저장 완료\n\n' + count + '개 매핑 저장됨\n\n이제 「📊 엑셀에서 일괄 가져오기」 실행 시 이 매핑이 자동 적용됩니다.');
}

function normalizeSearch(s) {
  // 1. 소문자 + 공백 제거
  let n = (s || '').toLowerCase().replace(/\s+/g, '');
  // 2. 한/영 동의어 치환 (양방향)
  const pairs = [
    ['bbq','바베큐'], ['bar','바'], ['chicken','치킨'], ['house','하우스'],
    ['garden','가든'], ['mart','마트'], ['market','마켓'], ['king','킹'],
    ['star','스타'], ['cafe','카페'], ['coffee','커피'], ['korean','한국'],
    ['restaurant','레스토랑'], ['shop','샵'], ['food','푸드'], ['fresh','프레쉬'],
    ['plus','플러스'], ['super','슈퍼'], ['happy','해피'], ['big','빅']
  ];
  // 영→한, 한→영 두 버전 모두 생성
  let variants = new Set([n]);
  for (const [en, ko] of pairs) {
    for (const v of [...variants]) {
      if (v.includes(en)) variants.add(v.replace(new RegExp(en,'g'), ko));
      if (v.includes(ko)) variants.add(v.replace(new RegExp(ko,'g'), en));
    }
  }
  return variants;
}

function findCustomerMatch(input) {
  const inpVariants = normalizeSearch(input);
  // 1순위: 코드 일치
  let m = DB.customers.find(c => {
    const code = (c.code || '').toLowerCase().replace(/\s+/g, '');
    return [...inpVariants].some(v => v === code);
  });
  if (m) return m;
  // 2순위: 상호명 완전 일치 (공백·대소문자·한영 무시)
  m = DB.customers.find(c => {
    const nameVariants = normalizeSearch(c.name);
    return [...inpVariants].some(iv => [...nameVariants].some(nv => iv === nv));
  });
  if (m) return m;
  // 3순위: 포함 검색 (입력값이 상호명에 포함되거나 상호명이 입력값에 포함)
  m = DB.customers.find(c => {
    const nameVariants = normalizeSearch(c.name);
    return [...inpVariants].some(iv =>
      [...nameVariants].some(nv => nv.includes(iv) || iv.includes(nv))
    );
  });
  return m || null;
}

// ── 거래처 실시간 자동완성 ────────────────────────────────
var _enterMatchId = null;

function liveSearchCustomer() {
  var inp = document.getElementById('entryCode');
  var div = document.getElementById('liveResult');
  if (!inp || !div) return;
  var raw = (inp.value || '').trim();
  _enterMatchId = null;

  if (!raw) { div.innerHTML = ''; return; }

  // 공백/대소문자 무시 매칭 (예: "강남 정육점" === "강남정육점")
  var q = raw.toLowerCase().replace(/\s+/g, '');
  var matches = DB.customers.filter(function(c) {
    var nm = (c.name    || '').toLowerCase().replace(/\s+/g, '');
    var cd = (c.code    || '').toLowerCase().replace(/\s+/g, '');
    var ct = (c.contact || '').toLowerCase().replace(/\s+/g, '');
    return nm.indexOf(q) !== -1 || cd.indexOf(q) !== -1 || ct.indexOf(q) !== -1;
  });

  if (matches.length === 0) {
    div.innerHTML = '<div style="padding:10px 14px;background:#FFF3E0;border-left:4px solid #FF9800;border-radius:6px;font-size:13px;color:#BF6900;margin-top:8px;">'
      + '❌ 일치하는 거래처 없음 — 상호명 또는 코드를 다시 확인해 주세요</div>';

  } else if (matches.length === 1) {
    var matched = matches[0];
    var nm = (matched.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (matched.active === false) {
      // 차단된 거래처
      div.innerHTML = '<div style="padding:14px;background:#FFEBEE;border:2px solid #E53935;border-radius:8px;margin-top:8px;text-align:center;">'
        + '<div style="font-size:18px;font-weight:700;color:#B71C1C;">⛔&nbsp;' + nm + '</div>'
        + '<div style="font-size:13px;color:#C62828;margin-top:6px;">주문 접근이 차단된 거래처입니다</div>'
        + '<div style="font-size:12px;color:#888;margin-top:4px;">문의: ' + ((DB.company && DB.company.phone) || 'ATM 사무실') + '</div>'
        + '</div>';
    } else {
      _enterMatchId = matched.id;
      div.innerHTML = '<div onclick="selectEnterMatch()" style="'
        + 'padding:16px 14px;background:#E8F5E9;border:2px solid #43A047;border-radius:8px;'
        + 'margin-top:8px;text-align:center;cursor:pointer;'
        + 'transition:background 0.15s;" '
        + 'onmouseover="this.style.background=\'#C8E6C9\'" '
        + 'onmouseout="this.style.background=\'#E8F5E9\'">'
        + '<div style="font-size:20px;font-weight:700;color:#1B5E20;letter-spacing:0.3px;">✅&nbsp;' + nm + '</div>'
        + '<div style="font-size:12px;color:#43A047;margin-top:6px;">👆 여기를 클릭하거나 아래 확인 버튼을 누르세요</div>'
        + '</div>';
    }

  } else {
    div.innerHTML = '<div style="padding:10px 14px;background:#E3F2FD;border-left:4px solid #2196F3;border-radius:6px;font-size:13px;color:#1565C0;margin-top:8px;">'
      + '🔍&nbsp;<b>' + matches.length + '개</b> 거래처 일치 — 상호명을 더 입력하면 좁혀집니다</div>';
  }
}

function selectEnterMatch() {
  if (!_enterMatchId) return;
  var c = DB.customers.find(function(x) { return x.id === _enterMatchId; });
  if (c) {
    var inp = document.getElementById('entryCode');
    if (inp) inp.value = c.name;
    submitEntry();
  }
}

function submitEntry() {
  const raw = (val('entryCode') || '').trim();
  if (!raw) return alert('거래처 코드 또는 상호명을 입력해 주세요.\nPlease enter your customer code or store name.');
  const match = findCustomerMatch(raw);
  if (!match) {
    return alert('일치하는 거래처를 찾을 수 없습니다.\nNo matching customer found.\n\n' +
      '· 띄어쓰기, 대소문자는 달라도 괜찮습니다.\n' +
      '· 문의: ' + (DB.company.phone || 'ATM 사무실'));
  }
  if (match.active === false) {
    return alert('⛔ 주문 접근이 차단된 거래처입니다.\nOrder access has been suspended.\n\n' +
      '문의: ' + (DB.company.phone || 'ATM 사무실로 연락 주세요'));
  }
  setCustomerMode(match.id);
  location.hash = '#order?c=' + match.id;
}

function renderFavQuick(cust) {
  const div = document.getElementById('favList');
  const card = document.getElementById('favCard');
  // 짝(productId + notes) 단위로 카드 분리. 유효한 활성 품목만.
  const pairs = (Array.isArray(cust.favoritePairs) ? cust.favoritePairs : [])
    .map(pair => {
      if (!pair || !pair.productId) return null;
      const p = DB.products.find(x => x.id === pair.productId);
      if (!p || !p.active) return null;
      return { product: p, notes: normalizeFavNotes(pair.notes) };
    })
    .filter(Boolean);
  // 분류 우선순위 (와규 → 소고기 → 돼지고기 → 작업육 → 가공육 → 오리 → 양고기 → 공산품)
  // 같은 분류 안에서는 품목명 가나다순, 그 다음 요청사항순.
  pairs.sort((a, b) => {
    const c = compareCut(a.product.cut, b.product.cut);
    if (c !== 0) return c;
    const n = (a.product.name || '').localeCompare(b.product.name || '', 'ko-KR');
    if (n !== 0) return n;
    return a.notes.localeCompare(b.notes, 'ko-KR');
  });
  if (card) card.style.display = '';  // always show the card
  if (pairs.length === 0) {
    div.innerHTML = `<div style="color:var(--muted); font-size:13px; padding:6px 4px;">
      주문하면 자동으로 여기에 추가됩니다. / Items you order will appear here automatically.
    </div>`;
    return;
  }
  div.innerHTML = pairs.map(({product: p, notes}) => {
    const cutLabel = CUT_DISPLAY[p.cut] || p.cut;
    const notesAttr = notes.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    const notesPart = notes
      ? `<br><small style="color:var(--brand-dark); font-weight:600; margin-left:8px;">📝 ${notes}</small>`
      : '';
    return `<div onclick="addToCart('${p.id}', '${notesAttr}')"
         onmouseover="this.style.background='#FFF5D6'"
         onmouseout="this.style.background='transparent'"
         style="cursor:pointer; padding:5px 4px; font-size:14px; text-align:left; line-height:1.5; border-bottom:1px dashed var(--line);">
      <span style="color:var(--brand); font-weight:600; font-size:11px; letter-spacing:0.3px;">${cutLabel}</span>
      <span style="color:var(--ink); font-weight:700;"> ${p.name}</span>
      ${p.brand ? '<span style="font-weight:400; color:var(--muted); font-size:12px;"> · ' + p.brand + '</span>' : ''}
      ${notesPart}
    </div>`;
  }).join('');
}
function renderCatalog(q, custId) {
  const div = document.getElementById('catalog');
  const filt = DB.products.filter(p => p.active && (!q || (p.name+' '+p.brand+' '+p.cut).toLowerCase().includes(q.toLowerCase())));
  const cuts = [...new Set(filt.map(p => p.cut))];
  const cust = custId ? DB.customers.find(c => c.id === custId) : null;
  const isStaff = STAFF_UNLOCKED && !CUSTOMER_MODE;
  div.innerHTML = cuts.map(cut => `
    <h4 style="margin-top:14px; margin-bottom:4px; color:var(--brand); font-size:12px; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--line); padding-bottom:4px;">${CUT_DISPLAY[cut] || cut}</h4>
    <div>
      ${filt.filter(p => p.cut === cut).map(p => {
        const isFav = cust ? getFavoriteProductIds(cust).includes(p.id) : false;
        const favBtn = (isStaff && custId)
          ? `<button onclick="event.stopPropagation(); toggleCatalogFav('${custId}','${p.id}',this)"
               title="${isFav ? 'Remove from Favourites / 자주 주문에서 제거' : 'Add to Favourites / 자주 주문에 추가'}"
               style="background:none; border:none; cursor:pointer; font-size:16px; padding:0 4px 0 6px; color:${isFav?'#F0B400':'#bbb'}; vertical-align:middle;"
             >${isFav ? '⭐' : '☆'}</button>`
          : '';
        const cutLabel = CUT_DISPLAY[p.cut] || p.cut;
        return `<div onclick="addToCart('${p.id}')"
              onmouseover="this.style.background='#F5E8DD'"
              onmouseout="this.style.background='transparent'"
              style="cursor:pointer; padding:3px 4px; font-size:14px; color:var(--ink); text-align:left; line-height:1.5; display:flex; align-items:center; justify-content:space-between;">
          <span>
            <span style="color:var(--brand); font-weight:600; font-size:11px; letter-spacing:0.3px;">${cutLabel}</span>
            <span style="color:var(--ink); font-weight:700;"> ${p.name}</span>
            ${p.brand ? `<span style="font-weight:400; color:var(--muted); font-size:12px;"> · ${p.brand}</span>` : ''}
          </span>
          ${favBtn}
        </div>`;
      }).join('')}
    </div>
  `).join('') || `<div class="empty">검색 결과 없음</div>`;
}
function addToCart(prodId, notes) {
  const p = DB.products.find(x => x.id === prodId);
  if (!p) return;
  CART.push({
    productId: prodId, unit: '박스', quantity: null, actualWeightKg: null,
    notes: (notes == null ? '' : String(notes))
  });
  renderCart();
}

// Staff: toggle a product into/out of the current customer's favourites from the catalogue
// 카탈로그에는 요청사항 컨텍스트가 없으므로 빈 notes 짝으로 추가/모든 짝 제거.
function toggleCatalogFav(custId, prodId, btn) {
  const cust = DB.customers.find(c => c.id === custId);
  if (!cust) return;
  cust.favoritePairs = Array.isArray(cust.favoritePairs) ? cust.favoritePairs : [];
  const isFav = getFavoriteProductIds(cust).includes(prodId);
  if (isFav) {
    // Remove ALL pairs for this product
    removeFavoritePair(cust, prodId);
    btn.textContent = '☆';
    btn.title = 'Add to Favourites / 자주 주문에 추가';
    btn.style.color = '#aaa';
  } else {
    addFavoritePair(cust, prodId, '');
    btn.textContent = '⭐';
    btn.title = 'Remove from Favourites / 자주 주문에서 제거';
    btn.style.color = '#F0B400';
  }
  // Phase 2 동시성: 이 거래처의 favorites 만 부분 업데이트
  saveEntityField('customers', custId, 'favoritePairs');
  // Refresh favourites panel without re-rendering whole page
  const custObj = DB.customers.find(c => c.id === custId);
  if (custObj) renderFavQuick(custObj);
}
function renderCart() {
  const div = document.getElementById('cart');
  if (CART.length === 0) {
    div.innerHTML = `<div class="empty"><div class="icon">🛒</div>아래에서 품목을 선택해 추가하세요.<br><small style="font-weight:400; opacity:0.7;">Select items below to add / Click to add</small></div>`;
  } else {
    div.innerHTML = CART.map((item, idx) => {
      const p = DB.products.find(x => x.id === item.productId);
      const qtyLabel = item.unit === '작업중량'
        ? '중량(kg)'
        : '수량';
      const qtyStep = item.unit === '작업중량' ? 0.1 : 1;
      // 작업육 분류 → [박스, 작업중량], 그 외 → [박스, 팩]
      const isProcMeat = (p.cut === '작업육') || (p.name && p.name.includes('작업'));
      const allowedUnits = isProcMeat ? ['박스','작업중량'] : ['박스','팩'];
      const qtyDisp = (item.quantity == null || item.quantity === '' || isNaN(item.quantity)) ? '' : item.quantity;
      return `
        <div class="cart-item">
          <div class="top">
            <div><span class="name">${p.name}</span><span class="brand-tag">(${p.brand})</span></div>
            <button class="del" onclick="CART.splice(${idx},1); renderCart();">×</button>
          </div>
          <div class="unit-row">
            ${allowedUnits.map(u => {
              const lbl = u==='박스' ? '박스/box' : u==='팩' ? '팩/pack' : '작업중량(kg)';
              return `<button class="${item.unit===u?'active':''}" onclick="CART[${idx}].unit='${u}'; renderCart();">${lbl}</button>`;
            }).join('')}
          </div>
          <div style="display:flex; gap:8px; align-items:flex-end; margin-top:8px;">
            <div style="flex:0 0 90px;">
              <label style="display:block; font-size:11px; color:var(--muted); margin-bottom:2px;">${qtyLabel}</label>
              <input type="number" min="0" step="${qtyStep}" value="${qtyDisp}" placeholder=""
                style="width:100%; padding:6px 8px; font-size:14px; text-align:right;"
                onchange="CART[${idx}].quantity=(this.value===''?null:parseFloat(this.value)); renderCart();"
                onblur="if(this.value!=='')this.value=parseFloat(this.value||0).toFixed(2)">
            </div>
            <div style="flex:1;">
              <label style="display:block; font-size:11px; color:var(--muted); margin-bottom:2px;">품목 요청사항 (예: 3mm 슬라이스, 진공포장)</label>
              <input placeholder="다음 주문에 기억됩니다" value="${(item.notes||'').replace(/"/g,'&quot;')}"
                style="width:100%; padding:6px 8px; font-size:13px;"
                onchange="CART[${idx}].notes=this.value;">
            </div>
          </div>
        </div>
      `;
    }).join('');
  }
  document.getElementById('cartCount').textContent = CART.length + '개';
  document.getElementById('totalQty').textContent = CART.length;
}
function estWeight(item, p) {
  if (item.unit === '박스') return (item.quantity||0) * p.boxKg;
  if (item.unit === '팩') return (item.quantity||0) * p.packKg;
  return (item.quantity||0); // 작업중량
}
// 배송일 뱃지 표시 — 오늘/내일/지난날짜를 색상으로 강조
function renderDeliveryBadge(dateISO) {
  if (!dateISO) return '<span style="color:var(--muted); font-size:11px;">미지정</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateISO + 'T00:00:00');
  const diff = Math.round((target.getTime() - today.getTime()) / (24*60*60*1000));
  const dmy = formatDateDMY(dateISO);
  let label, color, bg;
  if (diff === 0) { label = '오늘'; color = '#fff'; bg = '#D32F2F'; }
  else if (diff === 1) { label = '내일'; color = '#fff'; bg = '#F57C00'; }
  else if (diff < 0) { label = `${Math.abs(diff)}일 지남`; color = '#fff'; bg = '#9E9E9E'; }
  else if (diff <= 3) { label = `${diff}일 후`; color = '#5C0F0F'; bg = '#FFE082'; }
  else { label = `${diff}일 후`; color = 'var(--muted)'; bg = 'var(--surface)'; }
  return `<span style="display:inline-block; padding:2px 8px; border-radius:10px; background:${bg}; color:${color}; font-size:11px; font-weight:700; margin-right:4px;">${label}</span><span style="font-size:12px;">${dmy}</span>`;
}

// =========================================================================

window.confirmAndSubmitOrder = function(custId) {
  if (!Array.isArray(CART) || CART.length === 0) {
    return alert('주문 내역이 비어 있습니다.\nCart is empty.');
  }
  // 수량 미입력 / 0 품목 검증 — 빈칸 기본값으로 인한 사고 방지
  const emptyQty = CART.filter(it => it.quantity == null || it.quantity === '' || isNaN(it.quantity) || Number(it.quantity) <= 0);
  if (emptyQty.length > 0) {
    const names = emptyQty.map(it => {
      const p = DB.products.find(x => x.id === it.productId);
      return p ? p.name : '(품목)';
    }).join(', ');
    return alert('❌ 수량 미입력 품목이 있습니다:\n' + names + '\n\n수량을 입력해 주세요.');
  }
  const todayISO = todayLocalISO();
  const tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
  const tomorrowISO = toLocalISODate(tmr);
  const tomorrowDMY = formatDateDMY(tomorrowISO);
  const tmrDow = tmr.getDay(); // 0=일, 6=토
  const isWeekend = (tmrDow === 0 || tmrDow === 6);

    : `🚚 <b>내일 배송 / Tomorrow</b><div style="font-weight:400; font-size:12px; opacity:0.9; margin-top:2px;">${tomorrowDMY}</div>`;
  // 지정일 기본값: 모레
  const day3 = new Date(); day3.setDate(day3.getDate() + 2);
  const day3ISO = toLocalISODate(day3);

  openModal(`
    <h3 style="margin-top:0;">🚚 배송일 선택 / Choose Delivery Date</h3>
    <p style="font-size:13px; color:var(--muted); margin:0 0 16px 0;">

      <span style="font-size:12px;">When would you like to receive this order?</span>
    </p>
    <div style="display:grid; grid-template-columns: 1fr; gap:10px;">
      ${!CUSTOMER_MODE ? `

      </button>` : ''}
      <button class="btn" style="padding:14px; font-size:15px; text-align:left;" onclick="handleTomorrowDelivery('${custId}')">

window.submitCustomDate = function(custId) {
  const v = (document.getElementById('customDeliveryDate') || {}).value || '';
  if (!v) return alert('날짜를 선택해 주세요.\nPlease pick a date.');
  setDeliveryAndSubmit(custId, v);

window.setDeliveryAndSubmit = function(custId, dateISO) {
  // viewOrder 의 hidden input #deliveryDate 채우기 — 기존 submitOrder 가 그대로 읽어감
  const el = document.getElementById('deliveryDate');
  if (el) el.value = dateISO;
  closeModal();
  submitOrder(custId);
};

// 내일 배송 클릭 처리 — 내일이 토/일이면 월요일 배송 확인 팝업
window.handleTomorrowDelivery = function(custId) {
  const tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
  const dow = tmr.getDay(); // 0=일, 6=토
  if (dow === 0 || dow === 6) {
    const dayName = (dow === 0) ? '일요일' : '토요일';
    // 토요일이면 +2일, 일요일이면 +1일 후가 월요일
    const addDays = (dow === 6) ? 2 : 1;
    const mon = new Date(); mon.setDate(mon.getDate() + 1 + addDays);
    const monISO = toLocalISODate(mon);
    const monDMY = formatDateDMY(monISO);
    const ok = confirm(
      '내일은 ' + dayName + '입니다.\n' +
      '월요일(' + monDMY + ') 배송으로 진행됩니다.\n\n' +
      '확인하시겠습니까?'
    );
    if (ok) setDeliveryAndSubmit(custId, monISO);
    // 취소 시 모달 유지 — 사용자가 지정일 배송 선택 가능
    return;
  }
  setDeliveryAndSubmit(custId, toLocalISODate(tmr));
};

async function submitOrder(custId) {
  if (CART.length === 0) return alert('주문 품목을 추가해주세요.');

  // Phase 2 동시성: 트랜잭션으로 orderSeq 를 안전하게 증가시켜 주문번호 중복 방지
  // (두 거래처가 동시에 주문 제출해도 서로 다른 번호 보장)
  let orderSeq = 0;
  if (DB_REF) {
    // 버그 수정 (2026-06-12): 트랜잭션 *전* 에 _lastSaveTime 설정 — 그렇지 않으면
    // local-apply 단계에서 value 리스너가 isSelf=false 로 잘못 판단해 빨간 배너 + DB 덮어쓰기.
    _lastSaveTime = Date.now();
    try {
      const result = await DB_REF.child('settings/orderSeq').transaction(curr => {
        const next = (typeof curr === 'number' && curr > 0) ? curr : 1;
        return next + 1;
      });
      // 서버 확정 후에도 _lastSaveTime 재설정 (네트워크 지연 시 후속 리스너 발사 방어)
      _lastSaveTime = Date.now();
      if (result && result.committed) {
        const newVal = result.snapshot.val();
        if (typeof newVal === 'number') {
          orderSeq = newVal - 1;
          if (!DB.settings) DB.settings = {};
          DB.settings.orderSeq = newVal;
        }
      }
    } catch(e) {
      console.warn('orderSeq transaction failed, using local counter:', e);
    }
  }
  if (!orderSeq) {
    orderSeq = (DB.settings.orderSeq || 1);
    DB.settings.orderSeq = orderSeq + 1;
  }

  const order = {
    id: uid('o'),
    orderNo: 'ATM-' + todayLocalISO().replace(/-/g,'') + '-' + String(orderSeq).padStart(3,'0'),
    customerId: custId,
    orderDate: new Date().toISOString(),
    deliveryDate: val('deliveryDate'),
    deliveryNotes: val('deliveryNotes'),
    items: CART.map(i => ({...i, actualWeightKg: null})), // 박스육·작업육 모두 계근 후 직원이 입력
    status: 'new',
    createdAt: new Date().toISOString()
  };
  DB.orders.push(order);

  // Auto-add ordered (productId + notes) pairs to customer favourites
  // Same product with different notes => separate favorite cards.
  const custForFav = DB.customers.find(c => c.id === custId);
  if (custForFav) {
    custForFav.favoritePairs = Array.isArray(custForFav.favoritePairs) ? custForFav.favoritePairs : [];
    CART.forEach(item => {
      addFavoritePair(custForFav, item.productId, item.notes || '');
    });
  }

  // 항상 먼저 이 기기(localStorage)에 저장
  saveLocalDB();

  // 하나의 창에서 "전송 중 → 접수 완료"를 보여준다.
  // 확인 버튼은 서버(Firebase)가 주문을 실제로 받은 게 확인된 뒤에만 눌리도록 비활성화로 시작한다.
  openModal(
    '<style>@keyframes atmspin{to{transform:rotate(360deg)}}</style>' +
    '<div id="submitState" style="text-align:center; padding:6px 4px 2px;">' +
      '<div style="display:inline-flex; align-items:center; gap:10px; background:#2E7D32; color:#fff; padding:11px 18px; border-radius:9px; font-size:14px; font-weight:600;">' +
        '<span style="width:16px; height:16px; border:2.5px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; display:inline-block; animation:atmspin 0.8s linear infinite;"></span>' +
        '주문을 서버로 보내는 중…' +
      '</div>' +
    '</div>' +
    '<div class="btn-row" style="justify-content:center; margin-top:18px;">' +
      '<button id="submitOkBtn" class="btn" disabled style="opacity:0.45; cursor:not-allowed; min-width:96px;">확인</button>' +
    '</div>'
  );
  // 전송 중에는 바깥 영역 클릭으로 창이 닫히지 않도록 막는다.
  const _bg = document.getElementById('modalBg');
  if (_bg) _bg.onclick = null;

  // Phase 2 동시성: 전체 DB 덮어쓰기 대신 신규 주문을 트랜잭션으로 push.
  // 거래처 favorites 도 부분 업데이트 (다른 거래처 주문과 충돌 없음).
  const delivered = !DB_REF ? true : await new Promise(resolve => {
    let done = false;
    const finish = ok => { if (!done) { done = true; clearTimeout(timer); resolve(ok); } };
    const timer = setTimeout(() => finish(false), 12000); // 12초 내 확인 못하면 실패로 간주
    _lastSaveTime = Date.now();
    DB_REF.child('orders').transaction(currentList => {
      const list = Array.isArray(currentList) ? currentList.slice() : [];
      if (list.some(x => x && x.id === order.id)) return list; // 이미 추가됨
      list.push(order);
      return list;
    }, (error, committed) => {
      if (committed && !error) {
        // 거래처 favorites 부분 업데이트 (fire-and-forget)
        if (custForFav) saveEntityField('customers', custId, 'favoritePairs');
        finish(true);
      } else {
        // 트랜잭션 실패 시 전체 저장으로 폴백
        DB_REF.set(DB).then(() => finish(true)).catch(() => finish(false));
      }
    });
  });

  const stateEl = document.getElementById('submitState');
  const okBtn = document.getElementById('submitOkBtn');

  if (delivered) {
    if (stateEl) stateEl.innerHTML =
      '<div style="font-size:44px; line-height:1; margin-bottom:10px;">✅</div>' +
      '<div style="font-size:17px; font-weight:700; color:#2E7D32;">주문이 정상 접수되었습니다</div>' +
      '<div style="font-size:12px; color:var(--muted); margin-top:7px;">주문번호: ' + order.orderNo + '</div>';
    if (okBtn) {
      okBtn.disabled = false;
      okBtn.style.opacity = '1';
      okBtn.style.cursor = 'pointer';
      okBtn.classList.add('success');
      okBtn.onclick = function(){ closeModal(); CART = []; location.hash = '#orderDetail?id=' + order.id; };
    }
  } else {
    // 서버 전송이 확인되지 않음 → 중복 방지를 위해 방금 추가한 주문을 로컬에서 제거하고, 장바구니는 유지해 재시도 가능하게 둔다.
    DB.orders = DB.orders.filter(x => x.id !== order.id);
    saveLocalDB();
    if (stateEl) stateEl.innerHTML =
      '<div style="font-size:44px; line-height:1; margin-bottom:10px;">⚠️</div>' +
      '<div style="font-size:16px; font-weight:700; color:#C62828;">주문 전송이 확인되지 않았습니다</div>' +
      '<div style="font-size:12px; color:var(--muted); margin-top:7px;">인터넷 연결을 확인한 뒤<br>다시 [주문 제출]을 눌러 주세요.</div>';
    if (okBtn) {
      okBtn.disabled = false;
      okBtn.style.opacity = '1';
      okBtn.style.cursor = 'pointer';
      okBtn.textContent = '닫기';
      okBtn.onclick = function(){ closeModal(); }; // 장바구니 유지 → 바로 재시도 가능
    }
  }
}

function completeWeighing(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  const missing = o.items.filter(i => i.actualWeightKg == null || i.actualWeightKg <= 0);
  if (missing.length > 0) {
    if (!confirm(`${missing.length}개 품목의 중량이 미입력입니다. 그래도 진행할까요?`)) return;
  }
  o.status = 'weighed';
  o.weighedAt = new Date().toISOString();
  // Phase 2 동시성: 다른 주문 작업과 충돌 없이 status+weighedAt 동시 업데이트
  saveEntityFields('orders', orderId, { status: o.status, weighedAt: o.weighedAt });
  alert('계근 완료! 사무실로 전송되었습니다.');
  location.hash = '#warehouse';
}

function updateWeighing(orderId, idx, val) {
  const o = DB.orders.find(x => x.id === orderId);
  const v = parseFloat(val);
  o.items[idx].actualWeightKg = (isNaN(v) || v <= 0) ? null : v;
  // Phase 1 동시성: 전체 DB 덮어쓰지 않고 이 항목만 부분 업데이트
  saveOrderItemField(orderId, 'items', idx, 'actualWeightKg');
  renderWeighingTotal(o);
}

// ⭐ (2026-07-07) 창고↔사무실 메모 저장. 인보이스에는 절대 노출되지 않음 (invoice/PDF 렌더가 참조 X).
function updateWarehouseMemo(orderId, idx, val) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o || !o.items || !o.items[idx]) return;
  o.items[idx].warehouseMemo = (val || '').trim();
  saveOrderItemField(orderId, 'items', idx, 'warehouseMemo');
}
window.updateWarehouseMemo = updateWarehouseMemo;
function renderWeighingTotal(o) {
  let total = 0, weighed = 0;
  o.items.forEach(it => {
    if (it.actualWeightKg != null && it.actualWeightKg > 0) {
      total += it.actualWeightKg;
      weighed++;
    }
  });

// =========================================================================
//  매출 일보 (Daily Sales Report)
// =========================================================================
// 🔧 시간대 헬퍼 — toISOString()은 UTC 기준이라 시드니 야간/새벽엔 날짜가 하루 어긋남.
// 모든 "오늘" 비교는 로컬 시간 기준으로 통일해야 배송완료 직후 매출일보에 즉시 반영됨.
function todayLocalISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function toLocalISODate(input) {
  if (!input) return '';
  const s = String(input);
  // 이미 YYYY-MM-DD 형식이면 그대로
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s);
  if (isNaN(d.getTime())) return s.slice(0,10);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateDMY(iso) {
  if (!iso) return '-';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function dailyReportComputeRows(dateISO) {
  const custs = DB.customers.filter(c => c.active !== false);
  const todayCutoff = new Date(dateISO + 'T00:00:00');
  const rows = custs.map(c => {
    const days = termsDays(c.terms);
    // 매출일보는 '배송완료(delivered)' 주문만 집계 — 배송완료 시점 자동 반영
    // 날짜는 deliveredAt 우선 → invoicedAt → orderDate 순으로 폴백
    // ⚠️ toLocalISODate() 사용 — UTC ISO를 로컬 날짜로 변환해야 시드니 시각 기준으로 매칭됨
    const allInvoices = DB.orders
      .filter(o => o.status === 'delivered' && o.customerId === c.id)
      .map(o => ({
        dateISO: toLocalISODate(o.deliveredAt || o.invoicedAt || o.orderDate || ''),
        amount: computeTotals(o).grand
      }))
      .filter(x => x.dateISO);
    const allPayments = (DB.payments||[]).filter(p => p.customerId === c.id);

    // ⭐ (2026-07-07) 크레딧 노트 반영 — 매출/미수금에서 차감.
    //   전미수금은 이전 크레딧까지 차감, 당일 매출은 당일 크레딧 net으로 반영.
    const priorCredit = getCreditsForCustomerBefore(c.id, dateISO);
    const todayCredit = getCreditsForCustomerOnDate(c.id, dateISO);

    // 전미수금 = 선택일 이전(<)까지의 인보이스 - 입금 - 크레딧
    const priorInvoiced = allInvoices.filter(x => x.dateISO < dateISO).reduce((s,x)=>s+x.amount,0);
    const priorPaid = allPayments.filter(p => (p.date||'') < dateISO).reduce((s,p)=>s+p.amount,0);
    const priorBalance = priorInvoiced - priorPaid - priorCredit;

    // 당일 매출액 / 입금액 (크레딧은 매출에서 차감 → net sales로 표시)
    const todaySalesGross = allInvoices.filter(x => x.dateISO === dateISO).reduce((s,x)=>s+x.amount,0);
    const todaySales = todaySalesGross - todayCredit;
    const todayPaid = allPayments.filter(p => (p.date||'') === dateISO).reduce((s,p)=>s+p.amount,0);

    // 현잔액 = 전미수금 + 매출액(net) - 입금액
    const currentBalance = priorBalance + todaySales - todayPaid;

    // Overdue 정책 (2026-06-16 변경):
    //   - 외상 거래처: due date(인보이스 발행일 + 결제텀일) 이후 추가로 7일 grace period가 지나야 Overdue
    //     예) 7일 외상 → 발행일 + 14일 이후 미결제분, 14일 외상 → 발행일 + 21일 이후
    //   - 현금/계좌이체(termsDays=0): Overdue 계산 자체에서 제외 (사용자 정책)
    const GRACE_DAYS = 7;
    let overdue = 0;
    if (days > 0) {
      // 인보이스별로 연결된 크레딧 총액을 미리 매핑 (dateISO 이하만)
      const creditByOrderId = {};
      (DB.creditNotes || []).forEach(cn => {
        if (!cn || cn.customerId !== c.id) return;
        if (toLocalISODate(cn.issuedAt) > dateISO) return;
        creditByOrderId[cn.orderId] = (creditByOrderId[cn.orderId] || 0) + (computeCreditNoteTotals(cn).grand || 0);
      });
      // dateISO 기준 이 거래처의 인보이스 목록 (orderId 매핑용 원본 참조 필요)
      const invoicesAsOf = DB.orders
        .filter(o => o.status === 'delivered' && o.customerId === c.id)
        .map(o => ({
          orderId: o.id,
          dateISO: toLocalISODate(o.deliveredAt || o.invoicedAt || o.orderDate || ''),
          amount: computeTotals(o).grand
        }))
        .filter(x => x.dateISO && x.dateISO <= dateISO)
        .sort((a,b) => a.dateISO.localeCompare(b.dateISO));
      let totalPaymentAsOf = allPayments
        .filter(p => (p.date||'') <= dateISO)
        .reduce((s,p)=>s+p.amount,0);
      for (const inv of invoicesAsOf) {
        // ⭐ 크레딧으로 이미 상쇄된 부분 먼저 차감
        let unpaid = inv.amount - (creditByOrderId[inv.orderId] || 0);
        if (unpaid < 0) unpaid = 0;
        if (totalPaymentAsOf > 0 && unpaid > 0) {
          const applied = Math.min(totalPaymentAsOf, unpaid);
          unpaid -= applied;
          totalPaymentAsOf -= applied;
        }
        if (unpaid > 0.001) {
          const invDate = new Date(inv.dateISO + 'T00:00:00');
          const overdueDate = new Date(invDate.getTime());
          overdueDate.setDate(overdueDate.getDate() + days + GRACE_DAYS);
          if (overdueDate < todayCutoff) overdue += unpaid;
        }
      }
    }
    return { c, priorBalance, todaySales, todayPaid, currentBalance, overdue, todayCredit };
  });
  // 거래 활동 없는 거래처도 모두 표시 — overdue 큰 순 → 잔액 큰 순 → 이름 가나다순
  rows.sort((a,b) => (b.overdue - a.overdue) || (b.currentBalance - a.currentBalance) || a.c.name.localeCompare(b.c.name, 'ko'));
  return rows;
}

function dailyReportTotals(rows) {
  return rows.reduce((t, r) => ({
    priorBalance: t.priorBalance + r.priorBalance,
    todaySales: t.todaySales + r.todaySales,
    todayPaid: t.todayPaid + r.todayPaid,
    currentBalance: t.currentBalance + r.currentBalance,
    overdue: t.overdue + r.overdue,
  }), {priorBalance:0, todaySales:0, todayPaid:0, currentBalance:0, overdue:0});
}

  if (rows.length === 0) return '<div class="empty">표시할 거래내역이 없습니다.</div>';

  return `<table class="t">

      </tr>
    </thead>
    <tbody>
      <tr style="background:#FBF8F4; border-bottom:2px solid var(--brand); color:${txt};">

        <td class="num" style="font-weight:700; font-size:14px; color:${totals.todaySales > 0.001 ? 'var(--brand)' : 'var(--muted)'};">${totals.todaySales > 0.001 ? '$' + fmtMoney(totals.todaySales) : '–'}</td>
        <td class="num" style="font-weight:700; font-size:14px; color:${totals.todayPaid > 0.001 ? 'var(--success)' : 'var(--muted)'};">${totals.todayPaid > 0.001 ? '$' + fmtMoney(totals.todayPaid) : '–'}</td>
        <td class="num" style="font-weight:700; font-size:14px; color:${totals.currentBalance > 0 ? 'var(--warn)' : (totals.currentBalance < -0.001 ? 'var(--success)' : txt)};">$${fmtMoney(totals.currentBalance)}</td>
        <td class="num" style="font-weight:700; font-size:14px; color:${totals.overdue > 0.001 ? '#D32F2F' : 'var(--muted)'};">${totals.overdue > 0.001 ? '🔴 $' + fmtMoney(totals.overdue) : '–'}</td>
      </tr>
      ${rows.map(r => {
        const balColor = r.currentBalance > 0 ? 'var(--warn)' : (r.currentBalance < -0.001 ? 'var(--success)' : txt);
        return `<tr>
          <td><b>${r.c.name}</b>${r.c.contact ? `<br><small style="color:var(--muted);">${r.c.contact}</small>` : ''}</td>
          <td><small style="color:var(--muted);">${termsLabel(r.c.terms)}</small></td>
          <td class="num">$${fmtMoney(r.priorBalance)}</td>
          <td class="num" style="color:${r.todaySales > 0.001 ? 'var(--brand)' : 'var(--muted)'};">${r.todaySales > 0.001 ? '$' + fmtMoney(r.todaySales) : '–'}</td>
          <td class="num" style="color:${r.todayPaid > 0.001 ? 'var(--success)' : 'var(--muted)'};">${r.todayPaid > 0.001 ? '$' + fmtMoney(r.todayPaid) : '–'}</td>
          <td class="num" style="font-weight:700; color:${balColor};">$${fmtMoney(r.currentBalance)}</td>
          <td class="num" style="font-weight:700; color:${r.overdue > 0.001 ? '#D32F2F' : 'var(--muted)'};">${r.overdue > 0.001 ? '🔴 $' + fmtMoney(r.overdue) : '–'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

window.setDrDateToday = function() {
  const el = document.getElementById('drDate');

window.renderDailyReport = function() {
  const dateEl = document.getElementById('drDate');
  if (!dateEl) return;
  const dateISO = dateEl.value || todayLocalISO();
  const rows = dailyReportComputeRows(dateISO);
  const wrap = document.getElementById('drTableWrap');
  if (wrap) wrap.innerHTML = dailyReportScreenTableHTML(rows);
  const dateLbl = document.getElementById('drDateLabel');
  if (dateLbl) dateLbl.textContent = formatDateDMY(dateISO);
  // 오늘 날짜 스냅샷만 자동 저장 (과거/미래 일자 조회는 저장 안 함)
  const todayISO = todayLocalISO();
  if (dateISO === todayISO) saveDailySalesSnapshot(dateISO, rows);
  // 저장 폴더 정보 표시 (비동기)
  refreshDailyReportFolderInfo(dateISO);
};

async function refreshDailyReportFolderInfo(dateISO) {
  const el = document.getElementById('drFolderInfo');
  if (!el) return;
  try {
    const handle = await idbGet('dailyReportDirHandle');
    if (handle) {
      const ym = (dateISO || todayLocalISO()).slice(0,7);
      el.innerHTML = `📁 PDF 저장 폴더: <b style="color:var(--brand);">${handle.name}/${ym}/</b>ATM_매출일보_${dateISO}.pdf`;
    } else {
      el.innerHTML = `<span style="color:var(--warn);">⚠️ PDF 저장 폴더 미설정</span> — "📁 폴더 변경" 버튼으로 1회만 지정하면 이후 자동 저장됩니다`;
    }
  } catch(e) {
    el.innerHTML = `<span style="color:var(--muted);">📁 저장 폴더 정보 로딩 실패</span>`;
  }
}

function saveDailySalesSnapshot(dateISO, rows) {
  try {
    const key = 'atm_daily_sales_log';
    const log = JSON.parse(localStorage.getItem(key) || '{}');
    const totals = dailyReportTotals(rows);
    log[dateISO] = {
      date: dateISO,
      savedAt: new Date().toISOString(),
      totals,
      rows: rows.map(r => ({
        custId: r.c.id,
        custName: r.c.name,
        terms: r.c.terms,
        priorBalance: r.priorBalance,
        todaySales: r.todaySales,
        todayPaid: r.todayPaid,
        currentBalance: r.currentBalance,
        overdue: r.overdue,
      })),
    };
    localStorage.setItem(key, JSON.stringify(log));
  } catch (e) { console.warn('일보 스냅샷 저장 실패', e); }
}

  function colTableHTML(colRows) {

    return `<table class="pt">
      <colgroup>

let _dailyReportDirHandle = null;

async function getDailyReportDirHandle() {
  if (_dailyReportDirHandle) {
    try {
      const perm = await _dailyReportDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return _dailyReportDirHandle;
      const req = await _dailyReportDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return _dailyReportDirHandle;
    } catch(e) {}
  }
  try {
    const handle = await idbGet('dailyReportDirHandle');
    if (handle) {
      let perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _dailyReportDirHandle = handle; return handle; }
    }
  } catch(e) {}
  return null;
}

window.saveDailyReportPDF = async function() {
  const dateEl = document.getElementById('drDate');
  const dateISO = (dateEl && dateEl.value) || todayLocalISO();
  const rows = dailyReportComputeRows(dateISO);
  const totals = dailyReportTotals(rows);

  if (typeof window.jspdf === 'undefined' || typeof window.html2canvas === 'undefined') {
    return alert('PDF 라이브러리를 불러오는 중입니다.\n잠시 후 다시 시도해 주세요.');
  }

  if (typeof showToast === 'function') showToast('💾 PDF 생성 중...');

  const dirHandle = await getDailyReportDirHandle();

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
  container.innerHTML = buildDailyReportPDFHTML(rows, totals, dateISO);
  document.body.appendChild(container);

  try {
    await new Promise(r => setTimeout(r, 120));
    const canvas = await html2canvas(container.firstElementChild, {
      scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const pageW = 210, pageH = 297;
    const imgH = canvas.height * pageW / canvas.width;
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    if (imgH <= pageH) {
      doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
    } else {
      let yOff = 0;
      while (yOff < imgH) {
        if (yOff > 0) doc.addPage();
        doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
        yOff += pageH;
      }
    }

    const yearMonth = dateISO.slice(0,7);
    const filename = `ATM_매출일보_${dateISO}.pdf`;

    if (dirHandle) {
      try {
        const buf = doc.output('arraybuffer');
        await writeToFolderPath(dirHandle, [yearMonth], filename, buf);
        if (typeof showToast === 'function') showToast(`✅ 매출일보 저장 완료 — 📁 ${dirHandle.name}/${yearMonth}/${filename}`);
      } catch(e) {
        console.warn('폴더 저장 실패, 다운로드 대체:', e);
        doc.save(filename);
        if (typeof showToast === 'function') showToast(`💾 매출일보 다운로드 완료 (폴더 쓰기 실패)`);
      }
    } else {
      doc.save(filename);
      setTimeout(() => alert('💾 매출일보 다운로드 완료!\n\n📁 매번 같은 폴더에 자동 저장하려면\n"📁 폴더 변경" 버튼을 한 번 눌러서\n저장 폴더를 지정해 주세요.\n\n이후부터는 클릭만 하면\n자동으로 그 폴더에 "년-월" 하위폴더가 만들어지고\n그 안에 PDF가 저장됩니다.'), 300);
    }
  } catch(e) {
    console.error('매출일보 PDF 저장 실패:', e);
    alert('PDF 저장 실패: ' + e.message);
  } finally {
    document.body.removeChild(container);
  }
};

function lineUnitPrice(it, p, cust) {
  // 우선순위: 1) 라인별 명시 (인보이스 준비 시 사장님이 수정한 값)
  //          2) 거래처 맞춤 단가 (customPrices — 품목+요청사항 짝별)
  //          3) 품목 마스터 단가
  if (it.lineUnitPrice != null) return it.lineUnitPrice;
  if (cust && it.productId) {
    const cp = customerCustomPrice(cust, it.productId, it.notes);
    if (cp != null) return cp;
  }
  return p ? p.priceKg : 0;
}
// 거래처 맞춤 단가 — 품목+요청사항 짝 단위.
// 데이터: customPrices[productId] = { '': price, '진공포장': price, ... }
// 레거시 number 값도 자동 호환 (모든 요청사항에 동일 적용).
function customerCustomPrice(cust, productId, notes) {
  if (!cust || !cust.customPrices || !productId) return null;
  const entry = cust.customPrices[productId];
  if (entry == null) return null;
  // Legacy: number → default for any notes
  if (typeof entry === 'number') return entry;
  if (typeof entry !== 'object') return null;
  const n = normalizeFavNotes(notes);
  if (entry[n] != null) return entry[n];
  // Fallback: empty-notes (default for product)
  if (entry[''] != null) return entry[''];
  return null;
}
function setCustomerCustomPrice(cust, productId, notes, price) {
  if (!cust || !productId) return;
  cust.customPrices = cust.customPrices || {};
  let entry = cust.customPrices[productId];
  // Migrate legacy number → object
  if (typeof entry === 'number') {
    entry = { '': entry };
    cust.customPrices[productId] = entry;
  }
  if (typeof entry !== 'object' || entry === null) {
    entry = {};
    cust.customPrices[productId] = entry;
  }
  entry[normalizeFavNotes(notes)] = price;
}
function clearCustomerCustomPrice(cust, productId, notes) {
  if (!cust || !cust.customPrices || !productId) return;
  const entry = cust.customPrices[productId];
  if (entry == null) return;
  if (typeof entry === 'object') {
    delete entry[normalizeFavNotes(notes)];
    if (Object.keys(entry).length === 0) delete cust.customPrices[productId];
  } else {
    // Legacy number — drop entirely (legacy didn't track notes)
    delete cust.customPrices[productId];
  }
}
function hasCustomerCustomPrice(cust, productId, notes) {
  return customerCustomPrice(cust, productId, notes) != null;
}

  html += '<input type="text" id="' + searchId + '" placeholder="🔍 거래처 검색 (이름·코드·담당자)"';
  html += ' autocomplete="off"';
  html += ' style="width:100%;padding:6px 9px;border:1px solid var(--line);border-radius:4px;font-size:13px;margin-bottom:5px;box-sizing:border-box;"';
  html += ' oninput="filterCustomerSelect(\'' + selId + '\', this.value)">';
  html += '<select id="' + selId + '" data-include-inactive="' + (includeInactive ? '1' : '0') + '"';
  if (onChange) html += ' onchange="' + onChange + '"';
  html += '>';
  html += '<option value="">' + placeholder + '</option>';
  list.forEach(c => {
    const sel = (c.id === selected) ? ' selected' : '';
    html += '<option value="' + c.id + '"' + sel + '>' + (c.name || '') + ' (' + (c.code || '') + ')</option>';
  });
  html += '</select></div>';

}

window.filterCustomerSelect = function(selId, query) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  const q = (query || '').toLowerCase().trim();
  const includeInactive = sel.dataset.includeInactive === '1';
  const list = DB.customers.filter(c => includeInactive || c.active !== false);
  const allOpt = sel.querySelector('option[value=""]');
  const placeholder = allOpt ? allOpt.textContent : '— 선택하세요 —';
  const currentVal = sel.value;
  const filtered = q
    ? list.filter(c => {
        const hay = ((c.name || '') + ' ' + (c.code || '') + ' ' + (c.contact || '')).toLowerCase();
        return hay.indexOf(q) >= 0;
      })
    : list;
  let html = '<option value="">' + placeholder + '</option>';
  filtered.forEach(c => {
    const sel2 = (c.id === currentVal) ? ' selected' : '';
    html += '<option value="' + c.id + '"' + sel2 + '>' + (c.name || '') + ' (' + (c.code || '') + ')</option>';
  });
  sel.innerHTML = html;
  // 현재 선택값이 필터에서 사라지면 placeholder 로 리셋되지 않음 — 선택 유지를 위해 보존
  if (currentVal && !filtered.some(c => c.id === currentVal)) {
    // 검색에서 빠졌더라도 사용자가 선택한 거래처 옵션은 보존해서 보여준다
    const c = list.find(x => x.id === currentVal);
    if (c) {
      const extra = document.createElement('option');
      extra.value = c.id;
      extra.selected = true;
      extra.textContent = (c.name || '') + ' (' + (c.code || '') + ')  ✓ 선택됨';
      sel.appendChild(extra);
    }
  }
  // onchange 콜백이 있으면, 검색만으로는 트리거되지 않음 (사용자가 직접 선택해야).
};
// 금액 천단위 쉼표 (예: 1234.5 → "1,234.50")
function fmtMoney(n) {
  return (Number(n) || 0).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
// 주문 단위 영문 표기 (박스→box, 팩→pack)
function unitEn(u) {
  return { '박스': 'box', '팩': 'pack' }[u] || u;
}
// 결제조건 표기 (현금/Cash, 7day 등)
function termsLabel(t) {
  return { '현금': '현금/Cash', '계좌이체': '계좌이체/Transfer', '7일 외상': '7day', '14일 외상': '14day', '30일 외상': '30day' }[t] || (t || '-');
}
// 결제조건 → 일수 (현금/계좌이체는 0일 = 당일)
function termsDays(t) {
  if (!t) return 7;
  if (t === '현금' || t === '계좌이체') return 0;
  const m = (t + '').match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 7;
}
// 인보이스 발행일 기준 듀데이트 ("10 Jul 2026" 형식)
function dueDateText(baseISO, terms) {
  const base = new Date(baseISO);
  if (isNaN(base.getTime())) return '-';
  const d = new Date(base.getTime());
  d.setDate(d.getDate() + termsDays(terms));
  return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
}
// HTML 이스케이프 + 멀티라인 → <div>줄 (사용자 입력 본문용)
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function multilineToDivs(s) {
  if (!s) return '';
  return String(s).split(/\r?\n/).map(line => `<div>${escHtml(line) || '&nbsp;'}</div>`).join('');
}

// 인보이스 footer 기본값 — 회사 정보에서 비워두면 이 값으로 대체

// 인보이스 하단 표준 약관 HTML (화면/인쇄/PDF 공용)
function invoiceFooterHTML(o, cust) {
  const baseISO = o.invoicedAt || o.orderDate || new Date().toISOString();

  const days = termsDays(cust && cust.terms);

  const noticeText = (co.invoiceNoticeText && co.invoiceNoticeText.trim()) || DEFAULT_INVOICE_NOTICE;

  const announcementBlock = announcement ? `

  // 은행 정보는 굵게(700) + 진한 색으로 강조. Due Date는 TOTAL과 줄간격 좁힘.
  const bankBlock = `<div style="font-weight:700; color:#1A1A1A; font-size:10.5px; line-height:1.5;">${multilineToDivs(bankInfo)}</div>`;
  return `
    <div style="margin-top:8px; padding:8px 12px; border:1px solid #5C0F0F; border-radius:4px; background:#ffffff; font-size:9.5px; color:#3A2A2A; line-height:1.45;">

      ${bankBlock}
      <div style="margin-top:3px;"><b>PAYMENT TERM:</b> ${termLine}</div>
      <div style="margin-top:4px; font-weight:700; color:#5C0F0F;">NOTICE</div>
      ${multilineToDivs(noticeText)}
    </div>

}
// 회사 주소 표기 ('Australia' 기본값은 인보이스에 표시하지 않음)
function companyAddrLine() {
  var a = DB.company.address;
  return (a && a !== 'Australia') ? a : '';
}
function computeTotals(order) {
  // Only weighed items contribute to totals — no fake estimates for 박스/팩.
  let subtotal = 0, totalKg = 0, unweighedCount = 0;
  const cust = DB.customers.find(c => c.id === order.customerId);
  getInvoiceItems(order).forEach(it => {
    if (it._status === 'cancelled') return;
    const p = DB.products.find(x => x.id === it.productId);
    if (it.actualWeightKg == null) { unweighedCount++; return; }
    totalKg += it.actualWeightKg;
    subtotal += it.actualWeightKg * lineUnitPrice(it, p, cust);
  });
  // Treat priceKg as GST-inclusive (common AU wholesale convention)
  const gst = subtotal * (DB.company.gstRate / (1 + DB.company.gstRate));
  return { subtotal: subtotal - gst, gst, grand: subtotal, totalKg, unweighedCount };
}

function setHistQuickRange(range) {
  if (!range) return;
  const today = new Date();
  let from, to;
  switch(range) {
    case 'today': from = to = today; break;
    case 'yesterday':
      from = to = new Date(today); from.setDate(today.getDate()-1); to = new Date(from); break;
    case 'week':
      from = new Date(today); from.setDate(today.getDate() - today.getDay()); to = today; break;
    case 'month':
      from = new Date(today.getFullYear(), today.getMonth(), 1); to = today; break;
    case 'lastmonth':
      from = new Date(today.getFullYear(), today.getMonth()-1, 1);
      to = new Date(today.getFullYear(), today.getMonth(), 0); break;
    case 'ytd':
      from = new Date(today.getFullYear(), 0, 1); to = today; break;
  }
  document.getElementById('histFrom').value = toLocalISODate(from);
  document.getElementById('histTo').value = toLocalISODate(to);
}

function applyHistory() {
  HISTORY_FILTER.dateFrom = val('histFrom');

function exportHistoryCSV(detailed) {
  const orders = getFilteredHistory();
  if (orders.length === 0) return alert('내보낼 데이터가 없습니다.');
  const rows = [];
  if (detailed) {
    rows.push(['주문일','주문번호','거래처코드','거래처','상태','인보이스번호','발행일','품목','브랜드','분류','주문단위','주문수량','실측중량_kg','단가_per_kg','금액_GST포함','품목요청사항']);
    orders.forEach(o => {
      const c = DB.customers.find(x => x.id === o.customerId);
      o.items.forEach(it => {
        const p = DB.products.find(x => x.id === it.productId);
        const price = lineUnitPrice(it, p, c);
        const w = it.actualWeightKg;
        const amt = (w != null) ? w * price : '';
        rows.push([
          (o.orderDate||'').slice(0,10),
          o.orderNo,
          c ? c.code : '',
          c ? c.name : '',
          statusLabel(o.status),
          o.invoiceNo || '',
          (o.invoicedAt||'').slice(0,10),
          p ? p.name : '',
          p ? p.brand : '',
          p ? p.cut : '',
          it.unit,
          it.quantity,
          w != null ? w.toFixed(2) : '',
          price.toFixed(2),
          amt !== '' ? amt.toFixed(2) : '',
          (it.notes || '').replace(/[\r\n]+/g, ' ')
        ]);
      });
    });
  } else {
    rows.push(['주문일','주문번호','거래처코드','거래처','품목수','총중량_kg','총금액_GST포함','상태','인보이스번호','희망배송일','배송요청사항']);
    orders.forEach(o => {
      const c = DB.customers.find(x => x.id === o.customerId);
      const t = computeTotals(o);
      rows.push([
        (o.orderDate||'').slice(0,10),
        o.orderNo,
        c ? c.code : '',
        c ? c.name : '',
        o.items.length,
        t.totalKg.toFixed(2),
        t.grand.toFixed(2),
        statusLabel(o.status),
        o.invoiceNo || '',
        o.deliveryDate || '',
        (o.deliveryNotes || '').replace(/[\r\n]+/g, ' ')
      ]);
    });
  }
  // CSV with UTF-8 BOM for Excel/한글 호환
  const csv = '﻿' + rows.map(row =>
    row.map(cell => {
      const s = String(cell == null ? '' : cell);
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',')
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const tag = detailed ? 'detail' : 'summary';
  const fname = `ATM_history_${HISTORY_FILTER.dateFrom||'all'}_${HISTORY_FILTER.dateTo||'all'}_${tag}.csv`;
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

function viewInvoicePrep(params) {
  const id = params.get('id');
  const o = DB.orders.find(x => x.id === id);
  if (!o) return location.hash = '#office';
  if (o.status === 'invoiced' || o.status === 'delivered') {
    // Already issued — open readonly invoice instead
    location.hash = '#invoice?id=' + o.id; return;
  }
  const cust = DB.customers.find(c => c.id === o.customerId);

  // ⭐ invoiceItems 초기화 — 원본 o.items 절대 수정 안 함.
  // 최초 생성 시 거래처 맞춤단가(customP) 무조건 우선 적용 → 다음 인보이스 단가 자동 인식.
  let _prepAutoCount = 0;
  if (!o.invoiceItems) {
    o.invoiceItems = o.items.map(function(it) {
      var newIt = Object.assign({}, it, {_source: 'original'});
      var p = DB.products.find(function(x) { return x.id === it.productId; });
      var customP = customerCustomPrice(cust, it.productId, it.notes);
      // ⭐ 신규 주문: 항상 거래처 맞춤단가 우선 (라인의 기존 lineUnitPrice 무시).
      //    customP 가 없으면 마스터 단가로 폴백.
      if (customP != null) {
        newIt.lineUnitPrice = customP;
        _prepAutoCount++;
      } else {
        newIt.lineUnitPrice = (p ? p.priceKg : 0);
      }
      console.log('[viewInvoicePrep:init]', p ? p.name : '?', 'notes=', JSON.stringify(it.notes || ''),
        'customP=', customP, 'master=', p ? p.priceKg : 0, '→ applied=', newIt.lineUnitPrice);
      return newIt;
    });
    saveEntityField('orders', o.id, 'invoiceItems');
    if (_prepAutoCount > 0 && typeof showToast === 'function') {
      setTimeout(() => showToast(`💡 거래처 최근 단가 ${_prepAutoCount}건 자동 적용됨`), 350);
    }
  } else {
    // 재진입 — 비어있는 라인만 customP/마스터로 채움 (사용자 설정값 보존)
    o.invoiceItems.forEach(function(it) {
      if (it.lineUnitPrice == null || it.lineUnitPrice === 0) {
        var p = DB.products.find(function(x) { return x.id === it.productId; });
        var customP = customerCustomPrice(cust, it.productId, it.notes);
        it.lineUnitPrice = (customP != null) ? customP : (p ? p.priceKg : 0);
      }
    });
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <h2 class="page-title">📋 인보이스 준비 — ${o.orderNo}
      <span class="sub">${cust?cust.name:''}</span></h2>

    <div class="card">
      <div class="grid-3" style="font-size:13px;">
        <div><b>Customer / 거래처</b><br>${cust?cust.name:'-'}<br><span style="color:var(--muted);">${cust?(cust.contact||''):''} ${cust?(cust.phone||''):''}</span></div>
        <div><b>Order Date / 주문일</b><br>${(o.orderDate||'').slice(0,10)}<br><b>Requested Delivery / 희망 배송</b> ${o.deliveryDate||'-'}</div>
        <div><b>Payment Terms / 결제조건</b><br>${cust?termsLabel(cust.terms):'-'}<br><b>Address / 주소</b><br><small style="color:var(--muted);">${cust?(cust.address||'-'):'-'}</small></div>
      </div>
      ${o.deliveryNotes ? `<div class="notice" style="margin-top:10px;">📝 ${o.deliveryNotes}</div>` : ''}
    </div>

    <div class="card">
      <h3>📂 Order Items / 주문 품목 — Review &amp; Adjust Prices / 단가 확인</h3>
      <div class="notice" style="border-left-color:var(--info); background:#F0F5FB;">
        Unit prices pre-filled from product master. Adjust if needed before issuing. <b>Changes apply to this order only / 이 주문에만 적용</b> — master price unchanged.
      </div>
      <div id="invoiceChangeNotice"></div>
      <table class="t" id="prepTable">
        <thead><tr>
          <th>품목</th><th>구분</th><th>주문</th>
          <th class="num">실측중량(kg)</th><th class="num">단가(/kg)</th>
          <th class="num">금액</th><th style="width:32px;"></th>
        </tr></thead>
        <tbody id="prepTbody"></tbody>
      </table>

      <div id="prepTotals" style="display:flex; justify-content:flex-end; margin-top:14px;"></div>

      <div style="margin-top:16px; padding:12px 14px; background:#F8F8F8; border-radius:8px; border:1px dashed var(--brand);">
        <div style="font-weight:700; font-size:13px; color:var(--brand); margin-bottom:8px;">➕ 품목 추가 / Add Item</div>
        <input id="prepAddSearch" type="text" placeholder="🔍 품목명 검색 후 클릭해서 추가..."
          style="width:100%; padding:8px; border:1px solid var(--line); border-radius:6px; font-size:14px; box-sizing:border-box;"
          oninput="renderPrepAddResults('${o.id}', this.value)">
        <div id="prepAddResults" style="margin-top:6px; max-height:180px; overflow-y:auto;"></div>
      </div>

      <div class="btn-row" style="margin-top:18px;">
        <button class="btn success" onclick="issueInvoice('${o.id}')">✅ 인보이스 발행 확정</button>
        <button class="btn" style="background:var(--info);color:#fff;" onclick="applyCustomerPricesToPrep('${o.id}')">💡 거래처 최근 단가 적용</button>
        <button class="btn secondary" onclick="resetPrepPricesToMaster('${o.id}')">🔄 마스터값으로 초기화</button>
        <button class="btn secondary" onclick="location.hash='#office'">← 사무실로</button>
        <button class="btn danger" style="margin-left:auto;" onclick="deleteOrderFromPrep('${o.id}')">🗑 주문 삭제</button>
      </div>
    </div>
  `;
  renderPrepTbody(o);
  renderPrepTotals(o);
  renderInvoiceChangeNotice(o);
}

function renderInvoiceChangeNotice(o) {
  var el = document.getElementById('invoiceChangeNotice');
  if (!el) return;
  var items = getInvoiceItems(o);
  var added     = items.filter(function(it){ return it._source === 'added' && it._status !== 'cancelled'; }).length;
  var cancelled = items.filter(function(it){ return it._status === 'cancelled'; }).length;
  var removed   = cancelled;
  if (added > 0 || cancelled > 0) {
    el.innerHTML = '<div class="notice" style="border-left-color:#E67E22;background:#FEF9F0;margin-bottom:12px;">'
      + '⚠️ 원본 주문과 인보이스 품목이 다릅니다'
      + (added     ? ' &nbsp;|&nbsp; <span style="color:#27AE60;">추가요청 ' + added + '건</span>'     : '')
      + (cancelled ? ' &nbsp;|&nbsp; <span style="color:#E74C3C;">취소요청 ' + cancelled + '건</span>' : '')
      + ' &nbsp;&nbsp;<button onclick="resetInvoiceItems(document.querySelector(\"[data-oid]\").dataset.oid)"'
      + ' style="background:none;border:1px solid #E67E22;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px;">원본으로 되돌리기</button></div>';
    document.getElementById('prepTable').setAttribute('data-oid', o.id);
  } else {
    el.innerHTML = '';
  }
}

function renderPrepTbody(o) {
  var tbody = document.getElementById('prepTbody');
  if (!tbody) return;
  window._prepOid = o.id;
  window._prepCustId = o.customerId;
  var items = getInvoiceItems(o);
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var isCancelled = it._status === 'cancelled';
    var isAdded     = it._source === 'added';
    var p = DB.products.find(function(x){ return x.id === it.productId; });
    var w = isCancelled ? 0 : it.actualWeightKg;
    var wDisplay = isCancelled ? '0.00' : (w != null ? parseFloat(w).toFixed(2) : '');
    var orderDisplay = it.unit === '작업중량'
      ? it.quantity + ' kg <small>작업</small>'
      : it.quantity + ' ' + it.unit;
    var rowBg = isCancelled ? 'background:#FFF0F0;' : isAdded ? 'background:#F0FAF0;' : '';
    var badge = isCancelled
      ? '<span style="background:#E74C3C;color:#fff;font-size:10px;border-radius:4px;padding:1px 5px;margin-right:4px;">취소요청</span>'
      : isAdded
      ? '<span style="background:#27AE60;color:#fff;font-size:10px;border-radius:4px;padding:1px 5px;margin-right:4px;">추가요청</span>'
      : '';
    var cancelNote = isCancelled && it._cancelNote ? '<br><small style="color:#E74C3C;">사유: ' + it._cancelNote + '</small>' : '';
    var addNote    = !isCancelled && it._addNote   ? '<br><small style="color:var(--muted);">📝 ' + it._addNote + '</small>' : '';
    // 품목 요청사항: 편집 가능. 저장 시 거래처 자주 주문 짝도 동기화됨.
    var notesValueAttr = (it.notes || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    var itemNote = isCancelled ? '' :
      '<div style="margin-top:4px;">'
      + '<input type="text" value="' + notesValueAttr + '"'
      +   ' placeholder="📝 품목 요청사항 (수정하면 다음 주문에 기억됨)"'
      +   ' style="width:100%; padding:5px 7px; border:1px dashed var(--line); border-radius:4px;'
      +          ' font-size:11px; color:var(--brand-dark); background:#FFFCF5; box-sizing:border-box;"'
      +   ' onchange="updatePrepItemNotes(window._prepOid,' + i + ',this.value)">'
      + '</div>';
    // ⭐ (2026-07-07) 창고 메모 — 읽기 전용, 인보이스에는 노출 안 됨.
    // invoiceItems 에도 warehouseMemo 를 복사하지 않으므로 원본 items 를 참조.
    var _wm = '';
    if (o && Array.isArray(o.items) && it.productId) {
      var _srcIt = o.items.find(function(x){ return x && x.productId === it.productId; });
      if (_srcIt && _srcIt.warehouseMemo) _wm = _srcIt.warehouseMemo;
    }
    if (!_wm && it.warehouseMemo) _wm = it.warehouseMemo;
    var _wmEsc = String(_wm).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var warehouseMemoLine = _wm
      ? '<div style="margin-top:4px; padding:6px 10px; background:#FFFCE8; border-left:3px solid #E5C158; border-radius:3px; font-size:11px; color:#8B6914;">'
        + '🗒️ <b>창고 메모:</b> ' + _wmEsc
        + ' <small style="color:#B0954B;">(인보이스 미노출)</small>'
        + '</div>'
      : '';
    var pName  = p ? p.name         : '(품목없음)';
    var pBrand = p ? (p.brand || '') : '';
    var lineP  = isCancelled ? 0 : (it.lineUnitPrice || 0);
    var masterP = p ? p.priceKg : 0;
    // 거래처 맞춤 단가 / 마스터 차이 시 표시
    var _custForRow = DB.customers.find(function(x){ return x.id === window._prepCustId; });
    var hasCustomPrice = hasCustomerCustomPrice(_custForRow, it.productId, it.notes);
    var priceDiff = '';
    if (!isCancelled && Math.abs(lineP - masterP) > 0.001) {
      var labelText = hasCustomPrice ? '거래처 맞춤 · 마스터 $' : '마스터 $';
      priceDiff = '<small style="color:var(--warn);display:block;font-size:10px;">' + labelText + fmtMoney(masterP) + '</small>';
    }
    var amt = fmtMoney(isCancelled ? 0 : ((w != null ? parseFloat(w) : 0) * lineP));
    var nameStyle = isCancelled ? 'text-decoration:line-through;color:#999;' : '';
    var btnTitle  = isCancelled ? '취소 복원 (클릭)' : '취소 처리';
    var btnIcon   = isCancelled ? '↩️' : '❌';
    var wCell = isCancelled
      ? '<span style="color:#999;">0.00</span>'
      : '<input type="number" step="0.01" value="' + wDisplay + '"'
      +   ' style="width:90px;padding:6px;border:1px solid var(--line);border-radius:4px;text-align:right;"'
      +   ' oninput="livePrepWeightUpdate(' + i + ',this.value)"'
      +   ' onblur="if(this.value)this.value=parseFloat(this.value).toFixed(2)"'
      +   ' onchange="updatePrepWeight(window._prepOid,' + i + ',this.value)">';
    var pCell = isCancelled
      ? '<span style="color:#999;">0.00</span>'
      : '<input type="number" step="0.01" value="' + lineP.toFixed(2) + '"'
      +   ' style="width:90px;padding:6px;border:2px solid var(--warn);border-radius:4px;text-align:right;font-weight:600;"'
      +   ' oninput="livePrepPriceUpdate(' + i + ',this.value)"'
      +   ' onblur="this.value=parseFloat(this.value||0).toFixed(2)"'
      +   ' onchange="updatePrepPrice(window._prepOid,' + i + ',this.value)">' + priceDiff;
    var amtCell = isCancelled ? '<span style="color:#999;">$0.00</span>' : '$' + amt;
    html += '<tr style="' + rowBg + '">'
      + '<td>' + badge + '<b style="' + nameStyle + '">' + pName + '</b>' + cancelNote + addNote + itemNote + warehouseMemoLine + '</td>'
      + '<td style="font-size:11px;color:var(--muted);">' + pBrand + '</td>'
      + '<td>' + orderDisplay + '</td>'
      + '<td class="num">' + wCell + '</td>'
      + '<td class="num">' + pCell + '</td>'
      + '<td class="num"><b id="prep_amt_' + i + '">' + amtCell + '</b></td>'
      + '<td style="text-align:center;"><button onclick="removeInvoiceItem(window._prepOid,' + i + ')"'
      +   ' title="' + btnTitle + '" style="background:none;border:none;cursor:pointer;font-size:15px;">' + btnIcon + '</button></td>'
      + '</tr>';
  }
  tbody.innerHTML = html;
}

function removeInvoiceItem(orderId, idx) {
  var oid = orderId || window._prepOid;
  var o   = DB.orders.find(function(x){ return x.id === oid; });
  var item = getInvoiceItems(o)[idx];
  var p    = DB.products.find(function(x){ return x.id === item.productId; });
  var name = p ? p.name : '해당 품목';
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  if (item._status === 'cancelled') {
    // 복원
    item._status = ''; item._cancelNote = '';
    // Phase 2 동시성: 부분 업데이트
    saveOrderItemField(oid, listKey, idx, '_status');
    saveOrderItemField(oid, listKey, idx, '_cancelNote');
    saveLocalDB();
    renderPrepTbody(o); renderPrepTotals(o); renderInvoiceChangeNotice(o);
    return;
  }
  var reason = prompt('"' + name + '" 취소 처리합니다.\n사유 입력 (예: 재고없음, 고객취소):');
  if (reason === null) return;
  item._status = 'cancelled';
  item._cancelNote = reason || '취소';
  // Phase 2 동시성: 부분 업데이트
  saveOrderItemField(oid, listKey, idx, '_status');
  saveOrderItemField(oid, listKey, idx, '_cancelNote');
  saveLocalDB();
  renderPrepTbody(o); renderPrepTotals(o); renderInvoiceChangeNotice(o);
}

function addInvoiceItem(orderId, productId, note) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  var p = DB.products.find(function(x){ return x.id === productId; });
  if (!o || !p) return;
  if (!o.invoiceItems) {
    o.invoiceItems = o.items.map(function(it){
      return Object.assign({}, it, {_source: 'original'});
    });
  }
  // 신규 추가 라인도 거래처 맞춤 단가 우선 (빈 요청사항 짝의 기본값 사용)
  var custForAdd = DB.customers.find(function(x){ return x.id === o.customerId; });
  var customPForAdd = customerCustomPrice(custForAdd, productId, '');
  var initialPrice = (customPForAdd != null) ? customPForAdd : (p.priceKg || 0);
  o.invoiceItems.push({
    productId: productId, unit: '박스', quantity: 1,
    actualWeightKg: null, notes: '',
    lineUnitPrice: initialPrice,
    _source: 'added', _addNote: note || ''
  });
  // Phase 2 동시성: 이 주문의 invoiceItems 만 부분 업데이트
  saveEntityField('orders', orderId, 'invoiceItems');
  document.getElementById('prepAddSearch').value = '';
  document.getElementById('prepAddResults').innerHTML = '';
  renderPrepTbody(o);
  renderPrepTotals(o);
  renderInvoiceChangeNotice(o);
}

function renderPrepAddResults(orderId, q) {
  var div = document.getElementById('prepAddResults');
  if (!q || q.length < 1) { div.innerHTML = ''; return; }
  var results = DB.products.filter(function(p){
    return p.active && (p.name + ' ' + p.cut).toLowerCase().indexOf(q.toLowerCase()) >= 0;
  }).slice(0, 20);
  if (!results.length) {
    div.innerHTML = '<div style="color:var(--muted);padding:6px;font-size:13px;">결과 없음</div>';
    return;
  }
  var html = '';
  for (var j = 0; j < results.length; j++) {
    var p   = results[j];
    var lbl = CUT_DISPLAY[p.cut] || p.cut;
    var pid = p.id;
    html += '<div'
      + ' onclick="var n=prompt(\'추가 사유 (예: 긴급 전화 추가주문):\') || \'\';addInvoiceItem(\'' + orderId + '\',\'' + pid + '\',n)"'
      + ' onmouseover="this.style.background=\'#FFF5D6\'"'
      + ' onmouseout="this.style.background=\'transparent\'"'
      + ' style="cursor:pointer;padding:6px 8px;font-size:13px;border-bottom:1px solid var(--line);">'
      + '<span style="color:var(--brand);font-size:11px;">' + lbl + '</span>'
      + ' <b>' + p.name + '</b></div>';
  }
  div.innerHTML = html;
}

function resetInvoiceItems(orderId) {
  if (!confirm('인보이스 품목을 원본 주문으로 되돌릴까요?')) return;
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  delete o.invoiceItems;
  // Phase 2 동시성: invoiceItems 만 null 처리 (다른 주문 영향 없음)
  saveEntityField('orders', orderId, 'invoiceItems');
  route();
}

function updatePrepWeight(orderId, idx, val) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  if (!o) return;
  getInvoiceItems(o)[idx].actualWeightKg = parseFloat(val) || 0;
  // Phase 1 동시성: 인보이스 준비 화면도 부분 업데이트
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  saveOrderItemField(orderId, listKey, idx, 'actualWeightKg');
  // Re-render the amount cell directly
  var amtEl = document.getElementById('prep_amt_' + idx);
  var it = getInvoiceItems(o)[idx];
  if (amtEl) amtEl.textContent = '$' + fmtMoney((it.actualWeightKg||0) * (it.lineUnitPrice||0));
  renderPrepTotals(o);
}
function updatePrepPrice(orderId, idx, val) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  if (!o) return;
  var newPrice = parseFloat(val) || 0;
  getInvoiceItems(o)[idx].lineUnitPrice = newPrice;
  // Phase 1 동시성: 단가 변경도 부분 업데이트
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  saveOrderItemField(orderId, listKey, idx, 'lineUnitPrice');
  // Feature 1: 거래처 맞춤 단가 자동 학습 — 품목+요청사항 짝 단위
  var it = getInvoiceItems(o)[idx];
  var cust = DB.customers.find(function(x){ return x.id === o.customerId; });
  if (cust && it.productId) {
    var p = DB.products.find(function(x){ return x.id === it.productId; });
    var masterP = p ? (p.priceKg || 0) : 0;
    // 마스터 단가와 같으면 이 짝의 맞춤 단가를 제거 (마스터를 따라가게)
    if (Math.abs(newPrice - masterP) < 0.001) {
      clearCustomerCustomPrice(cust, it.productId, it.notes);
    } else {
      setCustomerCustomPrice(cust, it.productId, it.notes, newPrice);
    }
    // Phase 2 동시성: 이 거래처 customPrices 만 부분 업데이트
    saveEntityField('customers', cust.id, 'customPrices');
  }
  var amtEl = document.getElementById('prep_amt_' + idx);
  if (amtEl) amtEl.textContent = '$' + fmtMoney((it.actualWeightKg||0) * (it.lineUnitPrice||0));
  // 단가 변경 직후 마스터 차이 표시도 새로고침
  renderPrepTbody(o);
  renderPrepTotals(o);
}
// 사무실: 인보이스 준비 단계에서 품목 요청사항(notes) 수정.
// 이 주문 라인 + 해당 거래처의 자주 주문 짝(같은 품목+이전 요청사항) 동기화.
function updatePrepItemNotes(orderId, idx, newVal) {
  var o = DB.orders.find(function(x){ return x.id === orderId; });
  if (!o) return;
  var item = getInvoiceItems(o)[idx];
  if (!item) return;
  var oldN = normalizeFavNotes(item.notes);
  var newN = normalizeFavNotes(newVal);
  if (oldN === newN) return;
  item.notes = newN;
  // 1) 주문 라인 부분 업데이트
  var listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  saveOrderItemField(orderId, listKey, idx, 'notes');
  // 2) 거래처 자주 주문 짝 동기화
  var cust = DB.customers.find(function(x){ return x.id === o.customerId; });
  if (cust && item.productId) {
    cust.favoritePairs = Array.isArray(cust.favoritePairs) ? cust.favoritePairs : [];
    var oldIdx = findFavoritePair(cust, item.productId, oldN);
    if (oldIdx >= 0) {
      // 기존 짝의 요청사항을 정리된 버전으로 교체 (중복 시 dedup)
      updateFavoritePairNotes(cust, item.productId, oldN, newN);
    } else {
      // 짝이 아직 없으면 새 짝으로 추가 (자동 학습)
      addFavoritePair(cust, item.productId, newN);
    }
    saveEntityField('customers', cust.id, 'favoritePairs');
  }
  if (typeof showToast === 'function') showToast('✏️ 품목 요청사항 저장 — 다음 주문에 기억됩니다');
}
