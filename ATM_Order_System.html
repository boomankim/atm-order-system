    msg += `📄 인보이스: ${pdfResult.saved}건 저장 / ${pdfResult.failed}건 실패 (거래처 백업/ATM Invoice/날짜/거래처)\n`;
  } else {
    msg += `📄 인보이스: ${pdfResult.saved}건 → 거래처 백업/ATM Invoice/날짜/거래처\n`;
  }
  if (orderResult.skipped) {
    msg += `📄 주문서: ${orderResult.skipped}`;
  } else if (orderResult.failed > 0) {
    msg += `📄 주문서: ${orderResult.saved}건 저장 / ${orderResult.failed}건 실패 (거래처 백업/ATM 주문서/날짜/거래처)`;
  } else {
    msg += `📄 주문서: ${orderResult.saved}건 → 거래처 백업/ATM 주문서/날짜/거래처`;
  }
  alert(msg);
}

function importAll() {
  // 1차 잠금: 관리자만 가능
  if (!ADMIN_UNLOCKED) {
    return alert('⚠️ 복원은 관리자만 가능합니다.\n관리자 메뉴에서 먼저 로그인 후 진행해주세요.');
  }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const incoming = JSON.parse(ev.target.result);
        // 2차 잠금: 현재 vs 복원 후 데이터량 비교 미리보기
        const curC = (DB.customers||[]).length;
        const curO = (DB.orders||[]).length;
        const curP = (DB.products||[]).length;
        const curPay = (DB.payments||[]).length;
        const newC = (incoming.customers||[]).length;
        const newO = (incoming.orders||[]).length;
        const newP = (incoming.products||[]).length;
        const newPay = (incoming.payments||[]).length;

        function diffLabel(a, b) {
          if (a === b) return `${a}곳 (변동 없음)`;
          if (a > b)   return `${a}곳 → ${b}곳  ⚠️ ${a-b}곳 감소`;
          return `${a}곳 → ${b}곳  (+${b-a})`;
        }
        const dangerFlags = [];
        if (newC < curC) dangerFlags.push(`거래처 ${curC-newC}곳 손실`);
        if (newO < curO) dangerFlags.push(`주문 ${curO-newO}건 손실`);
        if (newP < curP) dangerFlags.push(`품목 ${curP-newP}개 손실`);
        if (newPay < curPay) dangerFlags.push(`결제기록 ${curPay-newPay}건 손실`);

        const warning = dangerFlags.length > 0
          ? `\n🚨 데이터 손실 경고:\n  · ${dangerFlags.join('\n  · ')}\n`
          : '';

        const msg = `📂 복원 확인\n\n` +
                    `[현재 → 복원 후]\n` +
                    `거래처: ${diffLabel(curC, newC)}\n` +
                    `주문:   ${diffLabel(curO, newO)}\n` +
                    `품목:   ${diffLabel(curP, newP)}\n` +
                    `결제:   ${diffLabel(curPay, newPay)}\n` +
                    warning + `\n` +
                    `⚠️ Firebase 동기화로 9개 기기 모두 데이터가 바뀝니다.\n` +
                    `(되돌릴 수 없음)\n\n` +
                    `진행하려면 정확히 "복원"을 입력하세요:`;
        const typed = prompt(msg);
        if (typed !== '복원') return alert('취소되었습니다. (입력값이 "복원"과 일치해야 진행)');

        // 3차 잠금: 마지막 확인
        if (!confirm(`정말 진행할까요?\n\n현재 거래처 ${curC}곳 → ${newC}곳\n현재 주문 ${curO}건 → ${newO}건`)) {
          return alert('취소되었습니다.');
        }

        DB = incoming;
        saveDB();
        alert(`✅ 복원 완료!\n거래처 ${newC}곳, 주문 ${newO}건, 품목 ${newP}개`);
        route();
      } catch (err) { alert('파일을 읽을 수 없습니다: ' + err.message); }
    };
    r.readAsText(f);
  };
  input.click();
}

function viewPayment(params) {
  if (!ADMIN_UNLOCKED && !STAFF_UNLOCKED) { showStaffLogin(); return; }
  const app = document.getElementById('app');
  const preCid = (params && params.cid) ? params.cid : '';
  const today = new Date().toISOString().slice(0, 10);

  function balanceFor(cid) {
    if (!cid) return null;
    const invoiced = DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid)
      .reduce((s, o) => s + computeTotals(o).grand, 0);
    const paid = DB.payments.filter(p => p.customerId === cid)
      .reduce((s, p) => s + p.amount, 0);
    return invoiced - paid;
  }

  function renderBalance(cid) {
    const bal = balanceFor(cid);
    if (bal === null) return '';
    return `<div style="margin-top:8px; padding:10px 14px; background:var(--surface); border-radius:6px; border:1px solid var(--line);">
      현재 미수금: <b style="color:${bal > 0 ? 'var(--warn)' : 'var(--success)'};">$${fmtMoney(bal)}</b>
    </div>`;
  }

  app.innerHTML = `
    <h2 class="page-title">💳 입금 처리
      <button class="btn sm secondary" style="float:right;" onclick="history.back()">← 뒤로</button>
    </h2>
    <div class="card" style="max-width:560px;">
      <div class="field">
        <label>거래처</label>
        <select id="payCustomer" onchange="document.getElementById('payBalanceBox').innerHTML=renderPaymentBalance(this.value)">
          <option value="">— 선택하세요 —</option>
          ${DB.customers.filter(c => c.active !== false).map(c =>
            `<option value="${c.id}" ${c.id === preCid ? 'selected' : ''}>${c.name} (${c.code})</option>`
          ).join('')}
        </select>
        <div id="payBalanceBox">${renderBalance(preCid)}</div>
      </div>
      <div class="field">
        <label>입금일</label>
        <input type="date" id="payDate" value="${today}">
      </div>
      <div class="field">
        <label>금액 ($)</label>
        <input type="number" id="payAmount" min="0" step="0.01" placeholder="0.00"
          onblur="if(this.value!=='')this.value=parseFloat(this.value||0).toFixed(2)">
      </div>
      <div class="field">
        <label>입금 방법</label>
        <select id="payMethod">
          <option value="cash">현금</option>
          <option value="cheque">체크</option>
          <option value="bank">은행이체</option>
        </select>
      </div>
      <div class="field">
        <label>참조번호 (체크번호 / 은행 참조)</label>
        <input type="text" id="payRef" placeholder="선택 입력">
      </div>
      <div class="field">
        <label>메모</label>
        <input type="text" id="payNotes" placeholder="선택 입력">
      </div>
      <div style="margin-top:16px; display:flex; gap:8px;">
        <button class="btn success" onclick="savePayment()">💾 저장</button>
        <button class="btn secondary" onclick="history.back()">취소</button>
      </div>
      <div id="paySuccess" style="display:none; margin-top:12px; padding:10px 14px; background:#e6f9ee; border-radius:6px; color:#1a6b3a; font-weight:600;">
        ✅ 입금이 기록됐습니다.
      </div>
    </div>
  `;
  // Expose helpers to global for inline handlers
  window.renderPaymentBalance = function(cid) { return renderBalance(cid); };
}

window.savePayment = function() {
  const cid = document.getElementById('payCustomer').value;
  const date = document.getElementById('payDate').value;
  const amount = parseFloat(document.getElementById('payAmount').value);
  const method = document.getElementById('payMethod').value;
  const ref = document.getElementById('payRef').value.trim();
  const notes = document.getElementById('payNotes').value.trim();

  if (!cid) { alert('거래처를 선택하세요.'); return; }
  if (!date) { alert('입금일을 입력하세요.'); return; }
  if (isNaN(amount) || amount <= 0) { alert('올바른 금액을 입력하세요.'); return; }

  const payment = {
    id: uid('pay'),
    customerId: cid,
    date,
    amount,
    method,
    reference: ref,
    notes,
    createdAt: new Date().toISOString()
  };
  DB.payments.push(payment);
  // Phase 2 동시성: 다른 입금 작업과 충돌 없이 push
  pushEntityToFirebase('payments', payment);

  // Show success, reset amount/ref/notes for next entry
  document.getElementById('payAmount').value = '';
  document.getElementById('payRef').value = '';
  document.getElementById('payNotes').value = '';
  const succ = document.getElementById('paySuccess');
  succ.style.display = 'block';
  setTimeout(() => { succ.style.display = 'none'; }, 3000);
  // Refresh balance display
  id2 = document.getElementById('payCustomer').value;
  document.getElementById('payBalanceBox').innerHTML = window.renderPaymentBalance(cid2);
};

function viewStatement(params) {
  if (!ADMIN_UNLOCKED && !STAFF_UNLOCKED) { showStaffLogin(); return; }
  const app = document.getElementById('app');
  const today = new Date().toISOString().slice(0, 10);
  const firstDate = new Date(new Date().getFullYear(), 0, 1).toISOString().slice(0,10); // 올해 1월 1일
  const preCid = (params && params.cid) || '';

  function buildStatement(cid, dateFrom, dateTo) {
    const cust = DB.customers.find(c => c.id === cid);
    if (!cust) return '<p style="color:var(--muted); padding:8px;">거래처를 선택하고 [조회]를 누르세요.</p>';

    // 이월 잔액 = 시작일 이전의 모든 인보이스 - 입금
    const openInv = DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid && (o.invoicedAt||o.orderDate||'').slice(0,10) < dateFrom)
      .reduce((s,o) => s + computeTotals(o).grand, 0);
    const openPaid = DB.payments.filter(p => p.customerId === cid && p.date < dateFrom)
      .reduce((s,p) => s + p.amount, 0);
    const opening = openInv - openPaid;

    // 기간 내 인보이스 + 입금을 한 줄씩 이벤트로 모아 날짜순 정렬
    const events = [];
    DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid).forEach(o => {
      const d = (o.invoicedAt||o.orderDate||'').slice(0,10);
      if (d >= dateFrom && d <= dateTo) events.push({ date: d, kind: 'inv', no: (o.invoiceNo||o.orderNo||'-'), amount: computeTotals(o).grand });
    });
    DB.payments.filter(p => p.customerId === cid).forEach(p => {
      if (p.date >= dateFrom && p.date <= dateTo) events.push({ date: p.date, kind: 'pay', amount: p.amount });
    });
    events.sort((a,b) => { if (a.date !== b.date) return a.date < b.date ? -1 : 1; return a.kind === 'inv' ? -1 : 1; });

    let bal = opening, totInv = 0, totPay = 0;
    let rows = '<tr style="color:var(--muted);"><td>' + dateFrom + '</td><td>이월 잔액</td><td class="num">—</td><td class="num">—</td><td class="num"><b>$' + fmtMoney(opening) + '</b></td></tr>';
    events.forEach(e => {
      if (e.kind === 'inv') {
        bal += e.amount; totInv += e.amount;
        rows += '<tr><td>' + e.date + '</td><td>' + e.no + '</td><td class="num">$' + fmtMoney(e.amount) + '</td><td class="num">—</td><td class="num"><b>$' + fmtMoney(bal) + '</b></td></tr>';
      } else {
        bal -= e.amount; totPay += e.amount;
        rows += '<tr><td>' + e.date + '</td><td style="color:var(--muted);">입금</td><td class="num">—</td><td class="num" style="color:var(--success);">$' + fmtMoney(e.amount) + '</td><td class="num"><b>$' + fmtMoney(bal) + '</b></td></tr>';
      }
    });
    const balColor = bal > 0 ? 'var(--warn)' : 'var(--success)';

    return '<div id="statementPrintArea">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">' +
        '<div>' +
          '<div style="font-size:20px;font-weight:800;color:var(--brand-dark);">' + cust.name + '</div>' +
          '<div style="font-size:13px;color:var(--muted);margin-top:2px;">거래내역서 (Statement) · 기준일: ' + today + '</div>' +
          (cust.contact ? '<div style="font-size:12px;color:var(--muted);">' + cust.contact + ' · ' + (cust.phone||'') + '</div>' : '') +
        '</div>' +
        '<div style="text-align:right;font-size:12px;color:var(--muted);">' +
          '<div style="font-weight:700;color:var(--brand-dark);">ALL THAT MEAT WHOLESALE PTY LTD</div>' +
          '<div>기간: ' + dateFrom + ' ~ ' + dateTo + '</div>' +
        '</div>' +
      '</div>' +
      '<table class="t"><thead><tr><th>날짜</th><th>인보이스 번호</th><th class="num">금액</th><th class="num">입금</th><th class="num">발란스</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="margin-top:18px;padding:14px 18px;background:var(--surface);border-radius:8px;border:1px solid var(--line);display:flex;gap:32px;flex-wrap:wrap;">' +
        '<div><span style="color:var(--muted);font-size:12px;">총 인보이스</span><br><b style="font-size:18px;">$' + fmtMoney(totInv) + '</b></div>' +
        '<div><span style="color:var(--muted);font-size:12px;">총 입금</span><br><b style="font-size:18px;color:var(--success);">$' + fmtMoney(totPay) + '</b></div>' +
        '<div><span style="color:var(--muted);font-size:12px;">기말 미수금</span><br><b style="font-size:20px;color:' + balColor + ';">$' + fmtMoney(bal) + '</b></div>' +
      '</div></div>' +
      '<div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;" class="no-print">' +
        '<button class="btn" onclick="window.print()">🖨️ 출력 / PDF</button>' +
        '<button class="btn secondary" onclick="shareStatementKakao(\'' + cid + '\',\'' + dateFrom + '\',\'' + dateTo + '\')">📤 카톡/이메일 공유</button>' +
      '</div>';
  }

  app.innerHTML =
    '<h2 class="page-title">📄 거래내역서 (Statement)' +
      '<button class="btn sm secondary" style="float:right;" onclick="location.hash=\'#office\'">← 사무실로</button></h2>' +
    '<div class="card no-print" style="margin-bottom:12px;">' +
      '<div class="grid-3" style="align-items:flex-end;">' +
        '<div class="field"><label>거래처</label><select id="stmtCust"><option value="">— 선택하세요 —</option>' +
          DB.customers.filter(c => c.active !== false).map(c => '<option value="' + c.id + '"' + (c.id === preCid ? ' selected' : '') + '>' + c.name + ' (' + c.code + ')</option>').join('') +
        '</select></div>' +
        '<div class="field"><label>시작일</label><input type="date" id="stmtFrom" value="' + firstDate + '"></div>' +
        '<div class="field"><label>종료일</label><input type="date" id="stmtTo" value="' + today + '"></div>' +
      '</div>' +
      '<div style="margin-top:10px;"><button class="btn sm" onclick="refreshStatement()">조회</button></div>' +
    '</div>' +
    '<div class="card" id="stmtBody">' + (preCid ? buildStatement(preCid, firstDate, today) : '<p style="color:var(--muted); padding:8px;">거래처와 기간을 선택하고 [조회]를 누르세요.</p>') + '</div>';

  window.refreshStatement = function() {
    const cid = document.getElementById('stmtCust').value;
    const from = document.getElementById('stmtFrom').value || firstDate;
    const to = document.getElementById('stmtTo').value || today;
    if (!cid) { alert('거래처를 선택하세요.'); return; }
    document.getElementById('stmtBody').innerHTML = buildStatement(cid, from, to);
  };
}

window.shareStatementKakao = function(cid, dateFrom, dateTo) {
  const cust = DB.customers.find(c => c.id === cid);
  const custName = cust ? cust.name : cid;
  const today = new Date().toISOString().slice(0, 10);
  const methodLabel = { cash: '현금', cheque: '체크', bank: '은행이체' };

  const invoices = DB.orders.filter(o =>
    ['invoiced','delivered'].includes(o.status) &&
    o.customerId === cid &&
    (o.invoicedAt || o.orderDate || '').slice(0,10) >= dateFrom &&
    (o.invoicedAt || o.orderDate || '').slice(0,10) <= dateTo
  ).sort((a,b) => (a.invoicedAt||a.orderDate||'') > (b.invoicedAt||b.orderDate||'') ? 1 : -1);

  const payments = DB.payments.filter(p =>
    p.customerId === cid && p.date >= dateFrom && p.date <= dateTo
  ).sort((a,b) => a.date > b.date ? 1 : -1);

  const totalInvoiced = invoices.reduce((s, o) => s + computeTotals(o).grand, 0);
  const totalPaid = payments.reduce((s, p) => s + p.amount, 0);
  const balance = totalInvoiced - totalPaid;

  let txt = '[ALL THAT MEAT] ' + custName + ' 거래내역서\n기준일: ' + today + '\n';
  if (dateFrom !== '2000-01-01' || dateTo !== today) txt += '기간: ' + dateFrom + ' ~ ' + dateTo + '\n';
  txt += '\n--- 인보이스 ---\n';
  if (invoices.length === 0) { txt += '(없음)\n'; }
  else { invoices.forEach(function(o) { txt += (o.invoicedAt||o.orderDate||'').slice(0,10) + ' ' + (o.invoiceNo||o.orderNo) + ' $' + fmtMoney(computeTotals(o).grand) + '\n'; }); }
  txt += '\n--- 입금 ---\n';
  if (payments.length === 0) { txt += '(없음)\n'; }
  else { payments.forEach(function(p) { txt += p.date + ' ' + (methodLabel[p.method]||p.method) + ' $' + fmtMoney(p.amount) + (p.reference ? ' (' + p.reference + ')' : '') + '\n'; }); }
  txt += '\n미수금: $' + fmtMoney(balance);

  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() {
      alert('거래내역이 클립보드에 복사됐습니다.\n카카오톡 또는 이메일에 붙여넣기 하세요.\n\n' + txt);
    }).catch(function() { prompt('아래 내용을 복사하세요 (Ctrl+A → Ctrl+C):', txt); });
  } else {
    prompt('아래 내용을 복사하세요 (Ctrl+A → Ctrl+C):', txt);
  }
};

function initApp(data) {
  if (data) {
    DB = data;
  } else {
    // Nothing in Firebase yet — migrate from localStorage or start fresh
    DB = loadLocalDB() || seed();
    saveDB(); // push existing data up to Firebase
  }
  // 방어적 배열 초기화 — Firebase 데이터 누락 필드 보완
  if (!DB.products)  DB.products  = seed().products;
  if (!DB.customers) DB.customers = [];
  if (!DB.orders)    DB.orders    = [];
  if (!DB.payments)  DB.payments  = [];
  if (!DB.settings)  DB.settings  = seed().settings;
  if (!DB.company)   DB.company   = seed().company;
  migrateProducts();
  route();
  // 자동 백업: 1) 앱 열림 트리거 (태블릿/핸드폰용), 2) 30분마다 스케줄 트리거 (PC용)
  setTimeout(() => checkAutoBackup({ onOpen: true }), 3000); // 3초 후 — 폴더 권한·DB 로드 안정화 대기
  if (!window._autoBackupTimer) {
    window._autoBackupTimer = setInterval(() => checkAutoBackup({ onOpen: false }), 30 * 60 * 1000);
  }
}

// =========================================================================
//  AUTO-BACKUP: 매일 정해진 시각에 JSON 자동 백업 (디바이스 단위)
// =========================================================================
const AUTO_BACKUP_KEY = 'atm_last_auto_backup_date';
async function checkAutoBackup(opts) {
  opts = opts || {};
  try {
    const settings = (DB && DB.settings) || {};
    const enabled = settings.autoBackupEnabled !== false; // 기본 ON
    const mode = settings.autoBackupMode || 'both'; // 'scheduled' | 'onOpen' | 'both'
    const hour = (typeof settings.autoBackupHour === 'number') ? settings.autoBackupHour : 22;
    if (!enabled) return;
    if (!_backupDirHandle) return; // 폴더 미설정이면 자동 백업 skip (조용히)

    const today = new Date().toISOString().slice(0,10);
    const last = localStorage.getItem(AUTO_BACKUP_KEY) || '';
    if (last === today) return; // 오늘 이미 자동 백업 완료

    const now = new Date();
    const isOpenTrigger = !!opts.onOpen;

    // 트리거 게이트:
    // - onOpen 호출이면 모드가 'onOpen' 또는 'both'일 때 즉시 실행 (시각 무시)
    // - 인터벌(주기) 호출이면 모드가 'scheduled' 또는 'both'일 때 설정 시각 이후만 실행
    if (isOpenTrigger) {
      if (mode === 'scheduled') return; // 스케줄 전용 모드면 onOpen 무시
    } else {
      if (mode === 'onOpen') return; // onOpen 전용 모드면 인터벌 무시
      if (now.getHours() < hour) return; // 설정 시각 이전이면 대기
    }

    const result = await exportAll(true); // silent=true
    if (result && result.success) {
      localStorage.setItem(AUTO_BACKUP_KEY, today);
      showToast(`🔄 자동 백업 완료 (${isOpenTrigger?'앱 열림':'스케줄'}) — ${result.filename}`);
    }
  } catch(e) {
    console.warn('자동 백업 실패:', e);
  }
}
function setAutoBackupMode(mode) {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupMode = mode;
  saveDB();
  const label = { scheduled:'정해진 시각', onOpen:'앱 열 때', both:'둘 다' }[mode] || mode;
  showToast(`✅ 자동 백업 동작: ${label}`);
  route();
}
function setAutoBackupTime(hour) {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupHour = hour;
  saveDB();
  showToast(`✅ 자동 백업 시각이 ${hour}:00로 변경되었습니다.`);
  route();
}
function toggleAutoBackup() {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupEnabled = !(DB.settings.autoBackupEnabled !== false);
  saveDB();
  showToast(DB.settings.autoBackupEnabled ? '✅ 자동 백업 ON' : '⏸️ 자동 백업 OFF');
  route();
}

// =========================================================================
//  TOAST NOTIFICATION
// =========================================================================
function showToast(msg, duration = 4000) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a3a1a;color:#e8f5e8;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.35);pointer-events:none;';
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.5s'; setTimeout(() => el.remove(), 500); }, duration);
}

// =========================================================================
//  AUTO-SAVE: 인보이스 발행 시 OneDrive 폴더에 JSON + PDF 자동 저장
// =========================================================================
async function autoSaveInvoice(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o) return;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const dirHandle = await getBackupDirHandle();

  // 1. JSON 백업
  try {
    const json = JSON.stringify(DB, null, 2);
    const jsonFilename = `ATM_backup_${ts}.json`;
    if (dirHandle) {
      await writeToFolderPath(dirHandle, ['_백업(JSON)', dateStr], jsonFilename, json);
    } else {
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = jsonFilename; a.click();
      URL.revokeObjectURL(url);
    }
  } catch(e) { console.warn('JSON 백업 실패:', e); }

  // 2. 인보이스 PDF
  if (typeof window.jspdf !== 'undefined' && typeof window.html2canvas !== 'undefined') {
    try {
      const cust = DB.customers.find(c => c.id === o.customerId) || { name:'미확인', contact:'', phone:'', address:'', terms:'' };
      const totals = computeTotals(o);
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
      document.body.appendChild(container);
      container.innerHTML = buildInvoiceHTML(o, cust, totals);
      await new Promise(r => setTimeout(r, 120));
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
      });
      document.body.removeChild(container);
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pageW = 210, pageH = 297;
      const imgH = canvas.height * pageW / canvas.width;
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      if (imgH <= pageH) {
        doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
      } else {
        let yOff = 0;
        while (yOff < imgH) {
          if (yOff > 0) doc.addPage();
          doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
          yOff += pageH;
        }
      }
      const custName = cust.name.replace(/[\/:*?"<>|]/g, '_');
      const pdfFilename = `${o.invoiceNo || o.orderNo}_${dateStr}_${custName}.pdf`;
      if (dirHandle) {
        const buf = doc.output('arraybuffer');
        // exportInvoicePDFs 와 동일한 단일 구조로 저장
        // (선택한 거래처 백업 폴더) > ATM Invoice > {날짜} > {거래처} > PDF
        await writeToFolderPath(dirHandle, ['ATM Invoice', dateStr, custName], pdfFilename, buf);
        showToast(`✅ JSON + 인보이스 PDF 저장 완료 — 📁 ATM Invoice/날짜/거래처/`);
      } else {
        doc.save(pdfFilename);
        showToast('💾 JSON + PDF 다운로드 완료');
      }
    } catch(e) {
      console.warn('PDF 저장 실패:', e);
      showToast(dirHandle ? '💾 JSON 저장 완료 (PDF 실패)' : '💾 JSON 백업 다운로드 완료');
    }
  } else {
    showToast(dirHandle ? '💾 JSON 백업 저장 완료' : '💾 JSON 백업 다운로드 완료');
  }
}


if (FIREBASE_READY && DB_REF) {
  // 로딩 화면 표시 후 Firebase 데이터 수신 대기
  document.getElementById('app').innerHTML = `
    <div style="text-align:center; padding:80px 20px; color:var(--muted);">
      <div style="font-size:56px;">🥩</div>
      <div style="margin-top:16px; font-size:16px; font-weight:700; color:var(--brand-dark);">ALL THAT MEAT</div>
      <div style="margin-top:8px; font-size:13px;">실시간 연결 중... / Connecting...</div>
    </div>`;

  // Phase 2-D: 어떤 화면에서 입력 중이면 자동 새로고침으로 입력값이 사라지는 걸 방지
  function isSensitiveEntryScreen() {
    const hash = location.hash || '';
    return _isOrderEntry
      || hash.indexOf('#weigh') === 0
      || hash.indexOf('#invoicePrep') === 0
      || hash.indexOf('#payment') === 0
      || hash.indexOf('#admin') === 0
      || document.getElementById('modalBg') !== null;
  }

  // Phase 2-D: 충돌 인지도 향상 — 다른 기기 업데이트 시 항상 배너 표시
  function showSyncBanner(isSensitive) {
    let banner = document.getElementById('sync-banner');
    if (banner) banner.remove();
    banner = document.createElement('div');
    banner.id = 'sync-banner';
    if (isSensitive) {
      // 입력 중이면 빨간 경고 (자동 새로고침 안 함, 사용자가 직접 새로고침)
      banner.style.cssText = 'position:fixed;top:52px;left:0;right:0;background:#C0392B;color:#fff;text-align:center;padding:10px 14px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;';
      banner.innerHTML = '⚠️ 다른 사용자가 데이터를 업데이트했습니다 — 입력 중이면 저장 후 새로고침 (클릭하여 닫기)';
      banner.onclick = () => banner.remove();
      // 입력 중에는 자동으로 안 사라짐 — 사용자가 인지 후 닫아야 함
    } else {
      // 일반 화면은 짧은 파란 정보 배너
      banner.style.cssText = 'position:fixed;top:52px;left:0;right:0;background:#2E5C8A;color:#fff;text-align:center;padding:6px;font-size:12px;z-index:9999;';
      banner.innerHTML = '🔄 다른 기기에서 데이터가 업데이트되었습니다.';
      setTimeout(() => { banner && banner.remove(); }, 4000);
    }
    document.body.appendChild(banner);
  }

  let _firstLoad = true;
  DB_REF.on('value', snapshot => {
    const isSelf = (Date.now() - _lastSaveTime) < 3000;
    const data = snapshot.val();

    if (_firstLoad) {
      _firstLoad = false;
      initApp(data);
      return;
    }

    // 다른 기기에서 업데이트 — 자기가 방금 저장한 게 아니면 반영
    if (!isSelf) {
      if (data) DB = data;
      saveLocalDB();
      const sensitive = isSensitiveEntryScreen();
      // 항상 배너 표시 — 사용자가 다른 기기 변경을 인지하도록
      showSyncBanner(sensitive);
      if (!sensitive) {
        // 입력 중이 아니면 자동 새로고침으로 최신 데이터 반영
        route();
      }
      // 입력 중이면 데이터는 메모리에 반영되지만 화면은 그대로 유지
      // (사용자가 저장 후 직접 새로고침해야 깨끗한 최신 화면을 봄)
    }
  });
} else {
  // Firebase 미설정 — localStorage 단독 모드
  initApp(loadLocalDB());
  if (!FIREBASE_READY) {
    console.info('Firebase 미설정 — localStorage 모드로 실행 중');
  }
}
