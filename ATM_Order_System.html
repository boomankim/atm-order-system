// ⭐ 거래처의 마지막 인보이스 단가를 모든 라인에 강제 재적용. 자동 인식이 안 됐을 때 수동 적용용.
window.applyCustomerPricesToPrep = function(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o) { alert('주문을 찾을 수 없습니다.'); return; }
  const cust = DB.customers.find(c => c.id === o.customerId);
  if (!cust) { alert('거래처를 찾을 수 없습니다.'); return; }
  if (!cust.customPrices || Object.keys(cust.customPrices).length === 0) {
    alert(`${cust.name} 의 저장된 단가 학습 내역이 없습니다.\n\n인보이스 발행 시 단가가 자동 저장되므로,\n첫 인보이스를 한 번 발행하시면 다음부터 자동 적용됩니다.`);
    return;
  }
  const lines = getInvoiceItems(o);
  let applied = 0, masterFallback = 0;
  lines.forEach(it => {
    if (it._status === 'cancelled') return;
    const customP = customerCustomPrice(cust, it.productId, it.notes);
    if (customP != null) {
      it.lineUnitPrice = customP;
      applied++;
    } else {
      const p = DB.products.find(x => x.id === it.productId);
      it.lineUnitPrice = p ? p.priceKg : 0;
      masterFallback++;
    }
  });
  const listKey = o.invoiceItems ? 'invoiceItems' : 'items';
  saveEntityField('orders', orderId, listKey);
  alert(`✅ 거래처 단가 재적용 완료\n\n거래처: ${cust.name}\n맞춤 단가 적용: ${applied}건\n마스터 폴백: ${masterFallback}건`);
  route();
};
async function issueInvoice(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o) { alert('주문을 찾을 수 없습니다.'); return; }
  const t = computeTotals(o);
  if (t.unweighedCount > 0) {
    if (!confirm(`${t.unweighedCount}건의 품목이 계근되지 않았습니다.\n그래도 인보이스를 발행하시겠습니까?`)) return;
  }
  if (!confirm(`인보이스를 발행합니다.\n총액: $${fmtMoney(t.grand)} (GST 포함)\n\n발행 후에는 단가 수정이 불가합니다. 진행할까요?`)) return;

  // 1) 인보이스 번호 결정 — Firebase 트랜잭션 시도 (3초 타임아웃) + 실패 시 로컬 폴백.
  let invoiceNo;
  if (DB_REF) {
    _lastSaveTime = Date.now();
    try {
      const txnPromise = DB_REF.child('settings/invoiceNoNext').transaction(curr => {
        const next = (typeof curr === 'number' && curr >= 200001) ? curr : 200001;
        return next + 1;
      });
      // Firebase 응답이 없어도 3초 후 로컬 폴백 — 화면 멈춤 방지
      const result = await Promise.race([
        txnPromise,
        new Promise((_, rej) => setTimeout(() => rej(new Error('invoiceNoNext timeout')), 3000))
      ]);
      _lastSaveTime = Date.now();
      const committed = result && result.committed;
      const newVal = result && result.snapshot && result.snapshot.val();
      if (committed && typeof newVal === 'number') {
        invoiceNo = String(newVal - 1);
        if (!DB.settings) DB.settings = {};
        DB.settings.invoiceNoNext = newVal;
      }
    } catch(e) {
      console.warn('invoiceNoNext transaction failed/timeout, falling back:', e);
    }
  }
  if (!invoiceNo) {
    if (!DB.settings) DB.settings = {};
    if (!DB.settings.invoiceNoNext) DB.settings.invoiceNoNext = 200001;
    invoiceNo = String(DB.settings.invoiceNoNext++);
  }
  o.invoiceNo = invoiceNo;
  o.status = 'invoiced';
  o.invoicedAt = new Date().toISOString();

  // 2) ⭐ 거래처 맞춤 단가 저장 (다음 인보이스 자동 인식의 핵심). 라인 단가가 0/마스터든 무관 — 무조건 잠금.
  const cust = DB.customers.find(x => x.id === o.customerId);
  let savedPriceCount = 0;
  if (cust) {
    const lines = getInvoiceItems(o);
    lines.forEach(it => {
      if (!it || !it.productId) return;
      if (it._status === 'cancelled') return;
      const price = parseFloat(it.lineUnitPrice);
      if (!isFinite(price) || price <= 0) return;
      setCustomerCustomPrice(cust, it.productId, it.notes, price);
      savedPriceCount++;
    });
    if (savedPriceCount > 0) {
      try { saveEntityField('customers', cust.id, 'customPrices'); }
      catch(e){ console.warn('customPrices save failed:', e); }
    }
    console.log('[issueInvoice] 거래처 맞춤 단가 저장:', cust.name, '라인 수:', savedPriceCount, 'customPrices:', cust.customPrices);
  }

  // 3) 로컬 즉시 저장 — 이후 작업이 실패해도 발행 결과는 유지
  try { saveLocalDB(); } catch(e){ console.warn('saveLocalDB failed:', e); }
  try {
    saveEntityFields('orders', orderId, {
      status: o.status,
      invoicedAt: o.invoicedAt,
      invoiceNo: o.invoiceNo
    });
  } catch(e){ console.warn('saveEntityFields failed:', e); }

  // 4) ⭐ 즉시 화면 전환 (인보이스 페이지로). 발행 즉시 확인/인쇄 가능. PDF 자동 저장은 백그라운드.
  if (typeof showToast === 'function') {
    showToast(`✅ 인보이스 ${invoiceNo} 발행 완료 — 거래처 단가 ${savedPriceCount}건 학습됨`);
  }
  const _invoiceHash = '#invoice?id=' + orderId;
  location.hash = _invoiceHash;
  // setTimeout 폴백 — 어떤 이유로든 hash 변경 실패 시 강제 재시도
  setTimeout(() => {
    if (location.hash.indexOf('#invoicePrep') === 0) {
      location.hash = _invoiceHash;
    }
  }, 200);

  // 5) PDF/JSON 자동 백업은 페이지 전환 후 백그라운드
  autoSaveInvoice(orderId).catch(e => console.warn('autoSaveInvoice error:', e));
}

function sendInvoice(id) {
  const o = DB.orders.find(x => x.id === id);
  const cust = DB.customers.find(c => c.id === o.customerId);

  let msg = `[ALL THAT MEAT] ${cust.name} 사장님\n\n`;

  msg += `--- 품목 ---\n`;
  o.items.forEach(it => {
    const p = DB.products.find(x => x.id === it.productId);
    const w = it.actualWeightKg;
    const price = lineUnitPrice(it, p, cust);
    const orderText = it.unit === '작업중량' ? `${it.quantity}kg 작업` : `${it.quantity}${unitEn(it.unit)}`;
    if (w == null) {
      msg += `· ${p.name}(${p.brand}) ${orderText} → 계근 대기\n`;
    } else {
      msg += `· ${p.name}(${p.brand}) ${orderText} → ${w.toFixed(2)}kg × $${fmtMoney(price)} = $${fmtMoney(w*price)}\n`;
    }
  });
  msg += `\n총중량 ${totals.totalKg.toFixed(2)}kg\n`;
  msg += `합계 $${fmtMoney(totals.grand)} (GST 포함)\n`;
  if (navigator.share) navigator.share({title:'ATM Invoice', text:msg}).catch(()=>{});
  else navigator.clipboard.writeText(msg).then(()=>alert('인보이스 내용이 복사되었습니다. 카톡/이메일에 붙여넣으세요.\n\n'+msg));
}
function shareOrder(orderId) {

// ⭐ CREDIT NOTE (2026-07-07) — 반품/취소용 크레딧 노트 (사무실 전용)
// -------------------------------------------------------------------------
// 원본 인보이스는 절대 수정 안 함. 별도 문서(DB.creditNotes)로 관리.
// 인보이스와 번호 시퀀스 공유(invoiceNoNext). PDF 자동 저장.
// =========================================================================

// 크레딧 노트 합계 계산 — 인보이스와 동일 GST 방식(가격은 GST inclusive 관례).
function computeCreditNoteTotals(cn) {
  let subtotal = 0;
  let totalKg = 0;
  (cn.items || []).forEach(it => {
    subtotal += Number(it.amount) || 0;
    totalKg  += Number(it.returnKg) || 0;
  });
  const gstRate = (DB.company && DB.company.gstRate) || 0;
  const gst = subtotal * (gstRate / (1 + gstRate));
  return { subtotal: subtotal - gst, gst, grand: subtotal, totalKg };
}

// 주문에 연결된 모든 크레딧 노트
function getCreditNotesForOrder(orderId) {
  return (DB.creditNotes || []).filter(c => c && c.orderId === orderId);
}
// 거래처의 특정 날짜 크레딧 합계 (매출일보용)
function getCreditsForCustomerOnDate(customerId, dateISO) {
  return (DB.creditNotes || [])
    .filter(c => c && c.customerId === customerId && toLocalISODate(c.issuedAt) === dateISO)
    .reduce((s, c) => s + (computeCreditNoteTotals(c).grand || 0), 0);
}
// 거래처의 특정 날짜 이전(<) 크레딧 합계 (전미수금용)
function getCreditsForCustomerBefore(customerId, dateISO) {
  return (DB.creditNotes || [])
    .filter(c => c && c.customerId === customerId && toLocalISODate(c.issuedAt) < dateISO)
    .reduce((s, c) => s + (computeCreditNoteTotals(c).grand || 0), 0);
}
// 거래처의 전체 크레딧 합계 (스테이트먼트용)
function getCreditsForCustomerAll(customerId, uptoISO) {
  return (DB.creditNotes || [])
    .filter(c => c && c.customerId === customerId && (!uptoISO || toLocalISODate(c.issuedAt) <= uptoISO))
    .reduce((s, c) => s + (computeCreditNoteTotals(c).grand || 0), 0);
}

function renderCreditTbody() {
  const d = window._creditDraft;
  if (!d) return;
  const tbody = document.getElementById('creditTbody');
  if (!tbody) return;
  let html = '';
  d.lines.forEach(function(ln, i) {
    const disabled = !ln.pick;
    const kgVal = (ln.returnKg != null) ? Number(ln.returnKg).toFixed(2) : '';
    const amtVal = (ln.amount   != null) ? Number(ln.amount).toFixed(2)   : '';
    const rowStyle = ln.pick ? 'background:#FFF6F6;' : '';
    const kgInput  = '<input type="number" step="0.01" min="0" ' + (disabled?'disabled':'') + ' value="' + kgVal
      + '" style="width:100px;padding:5px;border:1px solid var(--line);border-radius:4px;text-align:right;'
      + (disabled?'background:#f5f5f5;color:#aaa;':'') + '"'
      + ' oninput="updateCreditLineKgLive(' + i + ', this.value)" onchange="updateCreditLineKg(' + i + ', this.value)">';
    const amtInput = '<input type="number" step="0.01" min="0" ' + (disabled?'disabled':'') + ' value="' + amtVal
      + '" style="width:100px;padding:5px;border:1px solid var(--line);border-radius:4px;text-align:right;'
      + (disabled?'background:#f5f5f5;color:#aaa;':'') + '"'
      + ' oninput="updateCreditLineAmtLive(' + i + ', this.value)" onchange="updateCreditLineAmt(' + i + ', this.value)">';
    const modeSelect = '<select ' + (disabled?'disabled':'') + ' style="padding:4px 6px;border:1px solid var(--line);border-radius:4px;font-size:12px;"'
      + ' onchange="updateCreditLineMode(' + i + ', this.value)">'
      + '<option value="kg"' + (ln.mode==='kg'?' selected':'') + '>kg 기준</option>'
      + '<option value="amt"' + (ln.mode==='amt'?' selected':'') + '>금액 직접</option>'
      + '</select>';
    const inputCell = ln.mode === 'amt'
      ? '$ ' + amtInput
      : kgInput + ' kg';
    const currentAmt = computeCreditLineAmount(ln);
    html += '<tr style="' + rowStyle + '">'
      + '<td style="text-align:center;"><input type="checkbox" ' + (ln.pick?'checked':'') + ' onchange="toggleCreditLinePick(' + i + ', this.checked)"></td>'
      + '<td><b>' + ln.name + '</b></td>'
      + '<td class="num">' + ln.origKg.toFixed(2) + ' kg</td>'
      + '<td class="num">$' + fmtMoney(ln.unitPrice) + '</td>'
      + '<td>' + modeSelect + '</td>'
      + '<td class="num">' + inputCell + '</td>'
      + '<td class="num"><b style="color:' + (currentAmt>0?'#C0392B':'#999') + ';">-$' + fmtMoney(currentAmt) + '</b></td>'
      + '</tr>';
  });
  tbody.innerHTML = html;
  renderCreditTotalsBox();
}
function computeCreditLineAmount(ln) {
  if (!ln.pick) return 0;
  if (ln.mode === 'amt') return Number(ln.amount) || 0;
  const kg = Number(ln.returnKg) || 0;
  return kg * (Number(ln.unitPrice) || 0);
}
function renderCreditTotalsBox() {
  const d = window._creditDraft;
  if (!d) return;
  const box = document.getElementById('creditTotalsBox');
  if (!box) return;
  const subtotalGross = d.lines.reduce(function(s, ln){ return s + computeCreditLineAmount(ln); }, 0);
  const gstRate = (DB.company && DB.company.gstRate) || 0;
  const gst = subtotalGross * (gstRate / (1 + gstRate));
  const sub = subtotalGross - gst;
  box.innerHTML = ''
    + '<div style="min-width:280px; padding:12px 16px; border:2px solid #C0392B; border-radius:8px; background:#FDECEA;">'
    + '<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:2px;"><span>Subtotal (ex GST)</span><span>-$' + fmtMoney(sub) + '</span></div>'
    + '<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;"><span>GST (' + (gstRate*100).toFixed(0) + '%)</span><span>-$' + fmtMoney(gst) + '</span></div>'
    + '<div style="display:flex; justify-content:space-between; font-size:18px; font-weight:800; color:#C0392B; padding-top:6px; border-top:1.5px solid #C0392B;"><span>CREDIT TOTAL</span><span>-$' + fmtMoney(subtotalGross) + '</span></div>'
    + '</div>';
}
window.toggleCreditLinePick = function(i, checked) {
  const d = window._creditDraft;
  if (!d || !d.lines[i]) return;
  d.lines[i].pick = !!checked;
  // 처음 체크 시 kg 모드는 origKg로 미리 채움
  if (checked && d.lines[i].mode === 'kg' && (!d.lines[i].returnKg || d.lines[i].returnKg === 0)) {
    d.lines[i].returnKg = d.lines[i].origKg;
  }
  renderCreditTbody();
};
// oninput 중에는 데이터만 갱신 + 합계만 다시 그림(입력 포커스 유지). onchange(=blur)일 때 전체 재렌더.
window.updateCreditLineKgLive  = function(i, v) { const d=window._creditDraft; if(!d||!d.lines[i])return; d.lines[i].returnKg = parseFloat(v)||0; renderCreditTotalsBox(); };
window.updateCreditLineAmtLive = function(i, v) { const d=window._creditDraft; if(!d||!d.lines[i])return; d.lines[i].amount   = parseFloat(v)||0; renderCreditTotalsBox(); };
window.updateCreditLineKg      = function(i, v) { const d=window._creditDraft; if(!d||!d.lines[i])return; d.lines[i].returnKg = parseFloat(v)||0; renderCreditTbody(); };
window.updateCreditLineAmt     = function(i, v) { const d=window._creditDraft; if(!d||!d.lines[i])return; d.lines[i].amount   = parseFloat(v)||0; renderCreditTbody(); };
window.updateCreditLineMode    = function(i, v) { const d=window._creditDraft; if(!d||!d.lines[i])return; d.lines[i].mode = (v==='amt'?'amt':'kg'); renderCreditTbody(); };

window.confirmIssueCreditNote = async function() {
  const d = window._creditDraft;
  if (!d) return;
  const picked = d.lines.filter(function(ln){ return ln.pick && computeCreditLineAmount(ln) > 0.001; });
  if (picked.length === 0) { alert('반품 처리할 품목을 하나 이상 선택하고 수량/금액을 입력하세요.'); return; }
  if (!d.reason || d.reason.trim().length < 2) { alert('반품 사유를 입력하세요.'); return; }
  const order = DB.orders.find(function(x){ return x.id === d.orderId; });
  if (!order) return;
  const cust  = DB.customers.find(function(c){ return c.id === order.customerId; });
  const totalPreview = picked.reduce(function(s, ln){ return s + computeCreditLineAmount(ln); }, 0);
  if (!confirm('크레딧 노트를 발행합니다.\n\n반품 총액: -$' + fmtMoney(totalPreview) + '\n라인 수: ' + picked.length + '건\n\n발행 후에는 수정 불가. 진행할까요?')) return;

  // 번호 발행 — 인보이스와 동일 시퀀스(invoiceNoNext) 공유 (사용자 확정 정책)
  let cnNo;
  if (DB_REF) {
    _lastSaveTime = Date.now();
    try {
      const txn = DB_REF.child('settings/invoiceNoNext').transaction(function(curr) {
        const next = (typeof curr === 'number' && curr >= 200001) ? curr : 200001;
        return next + 1;
      });
      const result = await Promise.race([ txn, new Promise(function(_, rej){ setTimeout(function(){ rej(new Error('cn number timeout')); }, 3000); }) ]);
      _lastSaveTime = Date.now();
      if (result && result.committed && result.snapshot && typeof result.snapshot.val() === 'number') {
        cnNo = String(result.snapshot.val() - 1);
        if (!DB.settings) DB.settings = {};
        DB.settings.invoiceNoNext = result.snapshot.val();
      }
    } catch(e) { console.warn('CN number transaction failed, using local:', e); }
  }
  if (!cnNo) {
    if (!DB.settings) DB.settings = {};
    if (!DB.settings.invoiceNoNext) DB.settings.invoiceNoNext = 200001;
    cnNo = String(DB.settings.invoiceNoNext++);
  }

  const cnId = 'cn_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  const items = picked.map(function(ln) {
    const amt = computeCreditLineAmount(ln);
    // kg 모드이면 returnKg/unitPrice 그대로; 금액모드이면 kg=0, 단가는 참조용으로 유지
    return {
      productId: ln.productId,
      name: ln.name,
      returnKg: ln.mode === 'kg' ? (Number(ln.returnKg) || 0) : 0,
      unitPrice: Number(ln.unitPrice) || 0,
      amount: amt,          // GST 포함 총액
      mode: ln.mode
    };
  });
  const cn = {
    id: cnId,
    creditNo: cnNo,
    orderId: order.id,
    invoiceNo: order.invoiceNo || '',
    customerId: order.customerId,
    issuedAt: new Date().toISOString(),
    reason: d.reason.trim(),
    notes: (d.notes || '').trim(),
    items: items
  };

  if (!Array.isArray(DB.creditNotes)) DB.creditNotes = [];
  DB.creditNotes.push(cn);
  if (!Array.isArray(order.credits)) order.credits = [];
  order.credits.push(cnId);

  // Firebase 부분 업데이트 + 로컬 저장
  try { saveLocalDB(); } catch(e){}
  try {
    if (typeof DB_REF !== 'undefined' && DB_REF) {
      const idx = DB.creditNotes.length - 1;
      DB_REF.child('creditNotes/' + idx).set(cn);
      const orderIdx = DB.orders.findIndex(function(x){ return x.id === order.id; });
      if (orderIdx >= 0) DB_REF.child('orders/' + orderIdx + '/credits').set(order.credits);
    }
  } catch(e) { console.warn('creditNote Firebase save failed:', e); }

  showToast('✅ 크레딧 노트 ' + cnNo + ' 발행 완료 — -$' + fmtMoney(totalPreview));
  window._creditDraft = null;
  location.hash = '#creditNote?id=' + cnId;
  // PDF 자동 저장
  autoSaveCreditNotePDF(cnId).catch(function(e){ console.warn('autoSaveCreditNotePDF error:', e); });
};

// -------- PDF 자동 저장 --------
async function autoSaveCreditNotePDF(cnId) {
  const cn = (DB.creditNotes || []).find(function(x){ return x.id === cnId; });
  if (!cn) return;
  if (typeof window.jspdf === 'undefined' || typeof window.html2canvas === 'undefined') return;
  const cust = DB.customers.find(function(c){ return c.id === cn.customerId; }) || { name: '미확인' };
  const now = new Date();
  const pad = function(n){ return String(n).padStart(2,'0'); };
  const dateStr = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
  const dirHandle = await getBackupDirHandle();
  try {
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
    document.body.appendChild(container);
    container.innerHTML = buildCreditNoteHTML(cn, cust);
    await new Promise(function(r){ setTimeout(r, 120); });
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(container.firstElementChild, { scale:2, useCORS:true, backgroundColor:'#ffffff', logging:false });
    document.body.removeChild(container);
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const pageW = 210, pageH = 297;
    const imgH = canvas.height * pageW / canvas.width;
    const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
    if (imgH <= pageH) doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
    else {
      let yOff = 0;
      while (yOff < imgH) {
        if (yOff > 0) doc.addPage();
        doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
        yOff += pageH;
      }
    }
    const custName = (cust.name || '거래처').replace(/[\/:*?"<>|]/g, '_');
    const pdfFilename = 'CN' + (cn.creditNo || cn.id) + '_' + dateStr + '_' + custName + '.pdf';
    if (dirHandle) {
      const buf = doc.output('arraybuffer');
      await writeToFolderPath(dirHandle, ['ATM Credit', custName], pdfFilename, buf);
      showToast('✅ 크레딧 노트 PDF 저장 완료 — 📁 ATM Credit/거래처/');
    } else {
      doc.save(pdfFilename);
      showToast('💾 크레딧 노트 PDF 다운로드 완료');
    }
  } catch(e) {
    console.warn('CN PDF 저장 실패:', e);
    showToast('⚠️ 크레딧 노트 PDF 저장 실패 — 화면에서 인쇄 버튼 사용');
  }
}

// -------- IndexedDB helpers (for persisting directory handle) --------
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('atm_app_meta', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const r = db.transaction('kv','readonly').objectStore('kv').get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const r = db.transaction('kv','readwrite').objectStore('kv').put(value, key);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

let _backupDirHandle = null;

// =========================================================================
//  인보이스 PDF 백업 (날짜별·거래처별)
// =========================================================================
let _invoiceBackupDirHandle = null;

async function getInvoiceBackupDirHandle() {
  if (_invoiceBackupDirHandle) {
    try {
      const perm = await _invoiceBackupDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return _invoiceBackupDirHandle;
      const req = await _invoiceBackupDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return _invoiceBackupDirHandle;
    } catch(e) {}
  }
  try {
    const handle = await idbGet('invoiceBackupDirHandle');
    if (handle) {
      let perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _invoiceBackupDirHandle = handle; return handle; }
    }
  } catch(e) {}
  return null;
}

async function setInvoiceBackupFolder() {
  if (!window.showDirectoryPicker) {
    return alert('이 브라우저는 폴더 선택을 지원하지 않습니다.\nChrome 또는 Edge를 사용해 주세요.');
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('invoiceBackupDirHandle', handle);
    _invoiceBackupDirHandle = handle;
    alert('✅ 인보이스 PDF 저장 폴더 설정 완료!\n📁 ' + handle.name + '\n\n이제 📄 인보이스 PDF 클릭 시 이 폴더에 자동 저장됩니다.');

    if (e.name !== 'AbortError') alert('폴더 선택 실패: ' + e.message);
  }
}

// 지정한 루트 폴더 아래로 segments 경로를 따라 디렉터리를 만들고 파일을 기록한다.
// ⚠️ 2중 폴더 방지: 사용자가 선택한 폴더 이름이 최상위 목표 폴더명(segments[0])과 같으면
//    그 폴더를 다시 만들지 않고 그대로 사용한다. (예: 'ATM Invoice' 폴더를 직접 선택했을 때
//    'ATM Invoice/ATM Invoice/...' 로 중첩 생성되던 버그 수정)
async function writeToFolderPath(rootHandle, segments, filename, data) {
  let dir = rootHandle;
  for (let i = 0; i < segments.length; i++) {
    const seg = (segments[i] || '').toString().trim();
    if (!seg) continue;
    // 현재 폴더와 같은 이름의 하위 폴더는 만들지 않음 (예: 사용자가 "거래처 백업" 폴더를 선택한 경우 중복 방지)
    if (dir.name === seg) continue;
    dir = await dir.getDirectoryHandle(seg, { create: true });
  }
  const fileHandle = await dir.getFileHandle(filename, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(data);
  await writable.close();
}

async function exportOrderPDFs(silent = false, onProgress = null) {
  const orders = DB.orders.filter(o => o.status !== 'cancelled');
  if (orders.length === 0) {
    if (!silent) alert('백업할 주문서가 없습니다.');
    return { saved: 0, failed: 0, skipped: '주문 없음' };
  }
  if (typeof window.jspdf === 'undefined' || typeof window.html2canvas === 'undefined') {
    if (!silent) alert('PDF 라이브러리를 불러오는 중입니다.\n잠시 후 다시 시도해 주세요.');
    return { saved: 0, failed: 0, skipped: 'PDF 라이브러리 로딩 중' };
  }
  const { jsPDF } = window.jspdf;
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
  document.body.appendChild(container);
  const dirHandle = await getBackupDirHandle();
  let saved = 0, failed = 0;
  let _idx = 0;
  for (const o of orders) {
    _idx++;
    try {
      const cust = DB.customers.find(c => c.id === o.customerId) || { name:'미확인', contact:'', phone:'', address:'', terms:'' };
      if (onProgress) await onProgress(_idx, orders.length, `${o.orderNo || ''} ${cust.name || ''}`.trim());
      container.innerHTML = buildOrderSheetHTML(o, cust);
      await new Promise(r => setTimeout(r, 80));
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pageW = 210, pageH = 297;
      const imgH = canvas.height * pageW / canvas.width;
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      if (imgH <= pageH) {
        doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
      } else {
        let yOff = 0;
        while (yOff < imgH) {
          if (yOff > 0) doc.addPage();
          doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
          yOff += pageH;
        }
      }
      const dateStr = (o.orderDate || '').slice(0,10);

      const custName = cust.name.replace(/[\/:*?"<>|]/g, '_');
      const pdfFilename = `주문서_${dateCompact}_${o.orderNo}.pdf`;
      if (dirHandle) {
        try {

          // (선택한 거래처 백업 폴더) > ATM 주문서 > {거래처} > PDF
          await writeToFolderPath(dirHandle, ['ATM 주문서', custName], pdfFilename, buf);
        } catch(e) {
          console.warn('주문서 폴더 저장 실패, 다운로드 대체:', e);
          doc.save(pdfFilename);
        }
      } else {
        doc.save(pdfFilename);
      }
      saved++;
      await new Promise(r => setTimeout(r, 300));
    } catch(e) {
      console.error('주문서 PDF 저장 실패:', o.orderNo, e);
      failed++;
    }
  }
  document.body.removeChild(container);
  if (!silent) {
    const msg = dirHandle
      ? `✅ 주문서 ${saved}건 → 📁 거래처 백업/ATM 주문서/거래처/ 저장` + (failed > 0 ? ` / ${failed}건 실패` : '')

    alert(msg);

async function setBackupFolder() {
  if (!window.showDirectoryPicker) {
    return alert('이 브라우저는 폴더 선택을 지원하지 않습니다.\nChrome 또는 Edge를 사용해 주세요.');
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('backupDirHandle', handle);
    _backupDirHandle = handle;
    showToast('✅ 백업 폴더 설정 완료: 📁 ' + handle.name);
    // 백업 탭이 열려 있으면 새로고침
    const hash = location.hash;
    if (hash.includes('tab=backup')) renderBackupAdmin();
  } catch(e) {
    if (e.name !== 'AbortError') alert('폴더 선택 실패: ' + e.message);
  }
}

async function getBackupDirHandle() {
  // 1. 메모리 캐시 확인
  if (_backupDirHandle) {
    try {
      const perm = await _backupDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return _backupDirHandle;
      const req = await _backupDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return _backupDirHandle;
    } catch(e) {}
  }
  // 2. IndexedDB 저장 핸들 복구
  try {
    const handle = await idbGet('backupDirHandle');
    if (handle) {
      let perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _backupDirHandle = handle; return handle; }
    }
  } catch(e) {}
  return null;
}

async function exportAll(silent = false) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const filename = `ATM_backup_${ts}.json`;
  const json = JSON.stringify(DB, null, 2);
  const dirHandle = await getBackupDirHandle();
  if (dirHandle) {
    try {
      await writeToFolderPath(dirHandle, ['_백업(JSON)', dateStr], filename, json);
      if (!silent) showToast(`✅ 백업 저장 완료 — 📁 _백업(JSON)/${dateStr}/${filename}`);
      return { success: true, filename, folder: `_백업(JSON)/${dateStr}` };
    } catch(e) { console.warn('폴더 저장 실패, 다운로드로 대체:', e); }
  } else {
    if (!silent) {
      const go = confirm('💡 백업 저장 폴더가 설정되지 않았습니다.\n\n지금 폴더를 선택하시겠습니까?\n\n(취소 시 다운로드 폴더로 저장됩니다)');
      if (go) { await setBackupFolder(); return await exportAll(silent); }
    }
  }
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  if (!silent) showToast(`💾 백업 다운로드 완료 — ${filename}`);
  return { success: true, filename, folder: null };
}

// ─────────────────────────────────────────────────────────────────────────
//  전체 백업용 진행 표시 오버레이 — "PDF X장 중 Y장 만드는 중" 형태로 화면에 띄움.
//  내부 백업/PDF 로직은 손대지 않고, 진행률만 보여주고 화면 갱신용 쉼표(yield)를 준다.
// ─────────────────────────────────────────────────────────────────────────
function showBackupProgress() {
  if (document.getElementById('backupProgressOverlay')) return;
  const ov = document.createElement('div');
  ov.id = 'backupProgressOverlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:24px 32px;min-width:340px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.3);text-align:center;font-family:inherit;">
      <div style="font-size:17px;font-weight:800;color:#1B5E20;margin-bottom:14px;">💾 전체 백업 진행 중</div>
      <div id="backupProgressLabel" style="font-size:15px;color:#222;margin-bottom:12px;font-weight:600;">시작 중…</div>
      <div style="background:#eee;border-radius:8px;height:16px;overflow:hidden;">
        <div id="backupProgressBar" style="background:#4CAF50;height:100%;width:0%;transition:width 0.2s;"></div>
      </div>
      <div id="backupProgressDetail" style="font-size:12px;color:#777;margin-top:10px;min-height:16px;"></div>
    </div>
  `;
  document.body.appendChild(ov);
}

async function updateBackupProgress(label, current, total, detail) {
  const labelEl = document.getElementById('backupProgressLabel');
  const barEl   = document.getElementById('backupProgressBar');
  const detEl   = document.getElementById('backupProgressDetail');
  if (labelEl) labelEl.textContent = total > 0
    ? `${label} — PDF ${total}장 중 ${current}장 만드는 중`
    : label;
  if (barEl)   barEl.style.width = (total > 0 ? Math.round((current / total) * 100) : 0) + '%';
  if (detEl && detail !== undefined) detEl.textContent = detail || '';
  // 화면 갱신용 쉼표 — 브라우저가 다시 그릴 틈을 준다
  await new Promise(r => requestAnimationFrame(() => setTimeout(r, 0)));
}

function hideBackupProgress() {
  const ov = document.getElementById('backupProgressOverlay');
  if (ov) ov.remove();
}

let _backupInProgress = false;
async function exportAllFull() {
  if (_backupInProgress) {
    showToast('⏳ 전체 백업이 이미 진행 중입니다. 잠시만 기다려 주세요.');
    return;
  }
  _backupInProgress = true;
  try {
  showBackupProgress();
  await updateBackupProgress('JSON 백업 저장 중', 0, 0, '');
  const jsonResult = await exportAll(true);
  const pdfResult = await exportInvoicePDFs(true, async (cur, tot, name) => {
    await updateBackupProgress('인보이스 PDF', cur, tot, name ? `· ${name}` : '');
  });
  const orderResult = await exportOrderPDFs(true, async (cur, tot, name) => {
    await updateBackupProgress('주문서 PDF', cur, tot, name ? `· ${name}` : '');
  });
  hideBackupProgress();
  let msg = '✅ 전체 백업 완료!\n\n';
  if (jsonResult.folder) {
    msg += `💾 JSON: 📁 ${jsonResult.folder} / ${jsonResult.filename}\n`;
  } else {
    msg += `💾 JSON: ${jsonResult.filename} (다운로드 폴더)\n`;
  }
  if (pdfResult.skipped) {
    msg += `📄 인보이스: ${pdfResult.skipped}\n`;
  } else if (pdfResult.failed > 0) {
    msg += `📄 인보이스: ${pdfResult.saved}건 저장 / ${pdfResult.failed}건 실패 (거래처 백업/ATM Invoice/거래처)\n`;
  } else {
    msg += `📄 인보이스: ${pdfResult.saved}건 → 거래처 백업/ATM Invoice/거래처\n`;
  }
  if (orderResult.skipped) {
    msg += `📄 주문서: ${orderResult.skipped}`;
  } else if (orderResult.failed > 0) {
    msg += `📄 주문서: ${orderResult.saved}건 저장 / ${orderResult.failed}건 실패 (거래처 백업/ATM 주문서/거래처)`;
  } else {
    msg += `📄 주문서: ${orderResult.saved}건 → 거래처 백업/ATM 주문서/거래처`;
  }
  alert(msg);
  } finally {
    hideBackupProgress();
    _backupInProgress = false;
  }
}

function importAll() {
  // 1차 잠금: 관리자만 가능
  if (!ADMIN_UNLOCKED) {
    return alert('⚠️ 복원은 관리자만 가능합니다.\n관리자 메뉴에서 먼저 로그인 후 진행해주세요.');
  }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const incoming = JSON.parse(ev.target.result);
        // 2차 잠금: 현재 vs 복원 후 데이터량 비교 미리보기
        const curC = (DB.customers||[]).length;
        const curO = (DB.orders||[]).length;
        const curP = (DB.products||[]).length;
        const curPay = (DB.payments||[]).length;
        const newC = (incoming.customers||[]).length;
        const newO = (incoming.orders||[]).length;
        const newP = (incoming.products||[]).length;
        const newPay = (incoming.payments||[]).length;

        function diffLabel(a, b) {
          if (a === b) return `${a}곳 (변동 없음)`;
          if (a > b)   return `${a}곳 → ${b}곳  ⚠️ ${a-b}곳 감소`;
          return `${a}곳 → ${b}곳  (+${b-a})`;
        }
        const dangerFlags = [];
        if (newC < curC) dangerFlags.push(`거래처 ${curC-newC}곳 손실`);
        if (newO < curO) dangerFlags.push(`주문 ${curO-newO}건 손실`);
        if (newP < curP) dangerFlags.push(`품목 ${curP-newP}개 손실`);
        if (newPay < curPay) dangerFlags.push(`결제기록 ${curPay-newPay}건 손실`);

        const warning = dangerFlags.length > 0
          ? `\n🚨 데이터 손실 경고:\n  · ${dangerFlags.join('\n  · ')}\n`
          : '';

        const msg = `📂 복원 확인\n\n` +
                    `[현재 → 복원 후]\n` +
                    `거래처: ${diffLabel(curC, newC)}\n` +
                    `주문:   ${diffLabel(curO, newO)}\n` +
                    `품목:   ${diffLabel(curP, newP)}\n` +
                    `결제:   ${diffLabel(curPay, newPay)}\n` +
                    warning + `\n` +
                    `⚠️ Firebase 동기화로 9개 기기 모두 데이터가 바뀝니다.\n` +
                    `(되돌릴 수 없음)\n\n` +
                    `진행하려면 정확히 "복원"을 입력하세요:`;
        const typed = prompt(msg);
        if (typed !== '복원') return alert('취소되었습니다. (입력값이 "복원"과 일치해야 진행)');

        // 3차 잠금: 마지막 확인
        if (!confirm(`정말 진행할까요?\n\n현재 거래처 ${curC}곳 → ${newC}곳\n현재 주문 ${curO}건 → ${newO}건`)) {
          return alert('취소되었습니다.');
        }

        DB = incoming;
        saveDB();
        alert(`✅ 복원 완료!\n거래처 ${newC}곳, 주문 ${newO}건, 품목 ${newP}개`);
        route();
      } catch (err) { alert('파일을 읽을 수 없습니다: ' + err.message); }
    };
    r.readAsText(f);
  };
  input.click();
}

function viewPayment(params) {

  const app = document.getElementById('app');
  const preCid = (params && params.cid) ? params.cid : '';
  const today = toLocalISODate(new Date());

  function balanceFor(cid) {
    if (!cid) return null;
    const invoiced = DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid)
      .reduce((s, o) => s + computeTotals(o).grand, 0);
    const paid = DB.payments.filter(p => p.customerId === cid)
      .reduce((s, p) => s + p.amount, 0);
    return invoiced - paid;

  function renderBalance(cid) {
    const bal = balanceFor(cid);

    return `<div style="margin-top:8px; padding:10px 14px; background:var(--surface); border-radius:6px; border:1px solid var(--line);">

  app.innerHTML = `
    <h2 class="page-title">💳 입금 처리

    </h2>
    <div class="card" style="max-width:560px;">
      <div class="field">
        <label>거래처</label>
        ${renderCustomerSearchSelect({
          selectId: 'payCustomer',
          selectedId: preCid,
          placeholder: '— 선택하세요 —',
          onChange: "document.getElementById('payBalanceBox').innerHTML=renderPaymentBalance(this.value)"
        })}
        <div id="payBalanceBox">${renderBalance(preCid)}</div>
      </div>
      <div class="field">
        <label>입금일</label>

      <div class="field">
        <label>금액 ($)</label>
        <input type="number" id="payAmount" min="0" step="0.01" placeholder="0.00"
          onblur="if(this.value!=='')this.value=parseFloat(this.value||0).toFixed(2)">
      </div>
      <div class="field">
        <label>입금 방법</label>
        <select id="payMethod">
          <option value="cash">현금</option>
          <option value="cheque">체크</option>
          <option value="bank">은행이체</option>
        </select>
      </div>

        <label>참조번호 (체크번호 / 은행 참조)</label>
        <input type="text" id="payRef" placeholder="선택 입력">

        <button class="btn success" onclick="savePayment()">💾 저장</button>
        <button class="btn secondary" onclick="history.back()">취소</button>
      </div>
      <div id="paySuccess" style="display:none; margin-top:12px; padding:10px 14px; background:#e6f9ee; border-radius:6px; color:#1a6b3a; font-weight:600;">
        ✅ 입금이 기록됐습니다.
      </div>
    </div>
  `;
  // Expose helpers to global for inline handlers
  window.renderPaymentBalance = function(cid) { return renderBalance(cid); };
}

window.savePayment = function() {
  const cid = document.getElementById('payCustomer').value;
  const date = document.getElementById('payDate').value;
  const amount = parseFloat(document.getElementById('payAmount').value);
  const method = document.getElementById('payMethod').value;
  const ref = document.getElementById('payRef').value.trim();
  const notes = document.getElementById('payNotes').value.trim();

  if (!cid) { alert('거래처를 선택하세요.'); return; }
  if (!date) { alert('입금일을 입력하세요.'); return; }
  if (isNaN(amount) || amount <= 0) { alert('올바른 금액을 입력하세요.'); return; }

  const payment = {
    id: uid('pay'),
    customerId: cid,
    date,
    amount,
    method,
    reference: ref,
    notes,
    createdAt: new Date().toISOString()
  };
  DB.payments.push(payment);
  // Phase 2 동시성: 다른 입금 작업과 충돌 없이 push
  pushEntityToFirebase('payments', payment);

  // Show success, reset amount/ref/notes for next entry
  document.getElementById('payAmount').value = '';
  document.getElementById('payRef').value = '';
  document.getElementById('payNotes').value = '';
  const succ = document.getElementById('paySuccess');
  succ.style.display = 'block';
  setTimeout(() => { succ.style.display = 'none'; }, 3000);
  // Refresh balance display
  id2 = document.getElementById('payCustomer').value;
  document.getElementById('payBalanceBox').innerHTML = window.renderPaymentBalance(cid2);
};

function viewStatement(params) {
  if (!ADMIN_UNLOCKED && !STAFF_UNLOCKED) { showStaffLogin(); return; }
  const app = document.getElementById('app');
  const today = toLocalISODate(new Date());
  const firstDate = toLocalISODate(new Date(new Date().getFullYear(), 0, 1)); // 올해 1월 1일
  const preCid = (params && params.cid) || '';

  function buildStatement(cid, dateFrom, dateTo) {
    const cust = DB.customers.find(c => c.id === cid);
    if (!cust) return '<p style="color:var(--muted); padding:8px;">거래처를 선택하고 [조회]를 누르세요.</p>';

    // 이월 잔액 = 시작일 이전의 모든 인보이스 - 입금
    const openInv = DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid && (o.invoicedAt||o.orderDate||'').slice(0,10) < dateFrom)
      .reduce((s,o) => s + computeTotals(o).grand, 0);
    const openPaid = DB.payments.filter(p => p.customerId === cid && p.date < dateFrom)
      .reduce((s,p) => s + p.amount, 0);
    const opening = openInv - openPaid;

    // 기간 내 인보이스 + 입금을 한 줄씩 이벤트로 모아 날짜순 정렬
    const events = [];
    DB.orders.filter(o => ['invoiced','delivered'].includes(o.status) && o.customerId === cid).forEach(o => {
      const d = (o.invoicedAt||o.orderDate||'').slice(0,10);
      if (d >= dateFrom && d <= dateTo) events.push({ date: d, kind: 'inv', no: (o.invoiceNo||o.orderNo||'-'), amount: computeTotals(o).grand });
    });
    DB.payments.filter(p => p.customerId === cid).forEach(p => {
      if (p.date >= dateFrom && p.date <= dateTo) events.push({ date: p.date, kind: 'pay', amount: p.amount });
    });
    events.sort((a,b) => { if (a.date !== b.date) return a.date < b.date ? -1 : 1; return a.kind === 'inv' ? -1 : 1; });

    let bal = opening, totInv = 0, totPay = 0;
    let rows = '<tr style="color:var(--muted);"><td>' + dateFrom + '</td><td>이월 잔액</td><td class="num">—</td><td class="num">—</td><td class="num"><b>$' + fmtMoney(opening) + '</b></td></tr>';
    events.forEach(e => {
      if (e.kind === 'inv') {
        bal += e.amount; totInv += e.amount;
        rows += '<tr><td>' + e.date + '</td><td>' + e.no + '</td><td class="num">$' + fmtMoney(e.amount) + '</td><td class="num">—</td><td class="num"><b>$' + fmtMoney(bal) + '</b></td></tr>';
      } else {
        bal -= e.amount; totPay += e.amount;
        rows += '<tr><td>' + e.date + '</td><td style="color:var(--muted);">입금</td><td class="num">—</td><td class="num" style="color:var(--success);">$' + fmtMoney(e.amount) + '</td><td class="num"><b>$' + fmtMoney(bal) + '</b></td></tr>';
      }
    });
    const balColor = bal > 0 ? 'var(--warn)' : 'var(--success)';

    return '<div id="statementPrintArea">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">' +
        '<div>' +
          '<div style="font-size:20px;font-weight:800;color:var(--brand-dark);">' + cust.name + '</div>' +
          '<div style="font-size:13px;color:var(--muted);margin-top:2px;">거래내역서 (Statement) · 기준일: ' + today + '</div>' +
          (cust.contact ? '<div style="font-size:12px;color:var(--muted);">' + cust.contact + ' · ' + (cust.phone||'') + '</div>' : '') +
        '</div>' +
        '<div style="text-align:right;font-size:12px;color:var(--muted);">' +
          '<div style="font-weight:700;color:var(--brand-dark);">ALL THAT MEAT WHOLESALE PTY LTD</div>' +
          '<div>기간: ' + dateFrom + ' ~ ' + dateTo + '</div>' +
        '</div>' +
      '</div>' +
      '<table class="t"><thead><tr><th>날짜</th><th>인보이스 번호</th><th class="num">금액</th><th class="num">입금</th><th class="num">발란스</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="margin-top:18px;padding:14px 18px;background:var(--surface);border-radius:8px;border:1px solid var(--line);display:flex;gap:32px;flex-wrap:wrap;">' +
        '<div><span style="color:var(--muted);font-size:12px;">총 인보이스</span><br><b style="font-size:18px;">$' + fmtMoney(totInv) + '</b></div>' +
        '<div><span style="color:var(--muted);font-size:12px;">총 입금</span><br><b style="font-size:18px;color:var(--success);">$' + fmtMoney(totPay) + '</b></div>' +
        '<div><span style="color:var(--muted);font-size:12px;">기말 미수금</span><br><b style="font-size:20px;color:' + balColor + ';">$' + fmtMoney(bal) + '</b></div>' +
      '</div></div>' +
      '<div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;" class="no-print">' +
        '<button class="btn" onclick="window.print()">🖨️ 출력 / PDF</button>' +
        '<button class="btn secondary" onclick="shareStatementKakao(\'' + cid + '\',\'' + dateFrom + '\',\'' + dateTo + '\')">📤 카톡/이메일 공유</button>' +
      '</div>';
  }

  app.innerHTML =
    '<h2 class="page-title">📄 거래내역서 (Statement)' +
      '<button class="btn sm secondary" style="float:right;" onclick="location.hash=\'#office\'">← 사무실로</button></h2>' +
    '<div class="card no-print" style="margin-bottom:12px;">' +
      '<div class="grid-3" style="align-items:flex-end;">' +
        '<div class="field"><label>거래처</label>' +
          renderCustomerSearchSelect({ selectId: 'stmtCust', selectedId: preCid, placeholder: '— 선택하세요 —' }) +
        '</div>' +
        '<div class="field"><label>시작일</label><input type="date" id="stmtFrom" value="' + firstDate + '"></div>' +
        '<div class="field"><label>종료일</label><input type="date" id="stmtTo" value="' + today + '"></div>' +
      '</div>' +
      '<div style="margin-top:10px;"><button class="btn sm" onclick="refreshStatement()">조회</button></div>' +
    '</div>' +
    '<div class="card" id="stmtBody">' + (preCid ? buildStatement(preCid, firstDate, today) : '<p style="color:var(--muted); padding:8px;">거래처와 기간을 선택하고 [조회]를 누르세요.</p>') + '</div>';

  window.refreshStatement = function() {
    const cid = document.getElementById('stmtCust').value;
    const from = document.getElementById('stmtFrom').value || firstDate;
    const to = document.getElementById('stmtTo').value || today;
    if (!cid) { alert('거래처를 선택하세요.'); return; }
    document.getElementById('stmtBody').innerHTML = buildStatement(cid, from, to);
  };
}

window.shareStatementKakao = function(cid, dateFrom, dateTo) {
  const cust = DB.customers.find(c => c.id === cid);
  const custName = cust ? cust.name : cid;
  const today = toLocalISODate(new Date());
  const methodLabel = { cash: '현금', cheque: '체크', bank: '은행이체' };

  const invoices = DB.orders.filter(o =>
    ['invoiced','delivered'].includes(o.status) &&
    o.customerId === cid &&
    (o.invoicedAt || o.orderDate || '').slice(0,10) >= dateFrom &&
    (o.invoicedAt || o.orderDate || '').slice(0,10) <= dateTo
  ).sort((a,b) => (a.invoicedAt||a.orderDate||'') > (b.invoicedAt||b.orderDate||'') ? 1 : -1);

  const payments = DB.payments.filter(p =>
    p.customerId === cid && p.date >= dateFrom && p.date <= dateTo
  ).sort((a,b) => a.date > b.date ? 1 : -1);

  const totalInvoiced = invoices.reduce((s, o) => s + computeTotals(o).grand, 0);
  const totalPaid = payments.reduce((s, p) => s + p.amount, 0);
  const balance = totalInvoiced - totalPaid;

  let txt = '[ALL THAT MEAT] ' + custName + ' 거래내역서\n기준일: ' + today + '\n';
  if (dateFrom !== '2000-01-01' || dateTo !== today) txt += '기간: ' + dateFrom + ' ~ ' + dateTo + '\n';
  txt += '\n--- 인보이스 ---\n';
  if (invoices.length === 0) { txt += '(없음)\n'; }
  else { invoices.forEach(function(o) { txt += (o.invoicedAt||o.orderDate||'').slice(0,10) + ' ' + (o.invoiceNo||o.orderNo) + ' $' + fmtMoney(computeTotals(o).grand) + '\n'; }); }
  txt += '\n--- 입금 ---\n';
  if (payments.length === 0) { txt += '(없음)\n'; }
  else { payments.forEach(function(p) { txt += p.date + ' ' + (methodLabel[p.method]||p.method) + ' $' + fmtMoney(p.amount) + (p.reference ? ' (' + p.reference + ')' : '') + '\n'; }); }
  txt += '\n미수금: $' + fmtMoney(balance);

  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() {
      alert('거래내역이 클립보드에 복사됐습니다.\n카카오톡 또는 이메일에 붙여넣기 하세요.\n\n' + txt);
    }).catch(function() { prompt('아래 내용을 복사하세요 (Ctrl+A → Ctrl+C):', txt); });
  } else {
    prompt('아래 내용을 복사하세요 (Ctrl+A → Ctrl+C):', txt);
  }
};

// =========================================================================
//  VIEW: INVENTORY (재고현황) — 1단계: 수동 차감 방식
// =========================================================================
//
// 설계 (확정):
// - 5개 카테고리(소고기·와규·돼지고기·오리·양고기) 2단 구조 (요약 + 부위별 펼침)
// - 단위: 정수 박스 (소수 없음), 음수 재고 = 괄호 표기 예 (3)
// - 전재고: 전일 현재고 자동 롤오버. 월 실사일엔 수동 입력 가능
// - 입고: 수동 입력 (제품입고 폼)
// - 출고: 배송완료 주문 리스트 표시 → 수동 차감 버튼 (자동 훅 없음 = 기존 배송완료 흐름 안 건드림)
// - 박스 환산: 돼지 박스=16kg/임계 8kg, 소·와규 박스=25kg/임계 12kg, 오리·양 항상 박스
// - 환산 공식: floor(누적÷박스중량) + (나머지 ≥ 임계 ? 1 : 0)
// - 미달분 이월 없음 → 매일 자정 리셋
// - PDF 저장: 매출일보와 완전 별도 폴더
//
// 데이터 구조 (DB.inventory):
// {
//   lastResetDate: 'YYYY-MM-DD',      // 마지막 일일 롤오버/리셋이 적용된 날짜
//   byProduct: {
//     [productId]: {
//       stock: number,                 // 현재고 (박스)
//       prev: number,                  // 전재고 (전일 현재고 또는 실사값)
//       receivedToday: number,         // 오늘 입고 (박스)
//       deductedToday: number          // 오늘 차감 누계 (박스, 박스 출고 + kg 환산)
//     }
//   },
//   deductedOrders: { [orderId]: 'YYYY-MM-DDTHH:MM' }  // 중복 차감 방지
// }

const INVENTORY_CATEGORIES = ['소고기','와규','돼지고기','오리','양고기','가공육'];

// 카테고리별 단위 라벨 — 기본 '박스', 가공육만 '팩'
const INVENTORY_UNIT_OVERRIDE = { '가공육': '팩' };
function inventoryUnitLabel(cut) {
  return INVENTORY_UNIT_OVERRIDE[cut] || '박스';
}

// 카테고리별 박스 환산 규칙 (kg → 박스)
const INVENTORY_BOX_RULES = {
  '돼지고기': { boxKg: 16, threshold: 8 },
  '소고기':   { boxKg: 25, threshold: 12 },
  '와규':     { boxKg: 25, threshold: 12 }
  // 오리·양고기·가공육은 kg 환산 규칙 없음 (박스/팩 단위만)
};

// kg 누적값을 박스로 환산: floor(kg/boxKg) + (나머지 ≥ threshold ? 1 : 0)
function inventoryBoxConvert(kgTotal, cut) {
  const rule = INVENTORY_BOX_RULES[cut];
  if (!rule || !kgTotal || kgTotal <= 0) return 0;
  const full = Math.floor(kgTotal / rule.boxKg);
  const rem = kgTotal - (full * rule.boxKg);
  return full + (rem >= rule.threshold ? 1 : 0);
}

// 팩 누적값을 단위(박스 또는 팩)로 환산.
// - 가공육: 단위 자체가 팩 → 1팩 = 1팩 (그대로)
// - 그 외(소·와규·돼지·오리·양): 2팩 = 1박스 (floor)
const INVENTORY_PACKS_PER_BOX = 2;
function inventoryPackToBox(packTotal, cut) {
  if (!packTotal || packTotal <= 0) return 0;
  if (inventoryUnitLabel(cut) === '팩') return packTotal; // 가공육: 1:1
  return Math.floor(packTotal / INVENTORY_PACKS_PER_BOX);
}

// 일일 롤오버: 마지막 리셋 이후 날짜가 바뀌었으면 전재고=현재고로 밀고 오늘 입출고 0으로 초기화
function inventoryRolloverIfNeeded() {
  const today = todayLocalISO();
  const inv = DB.inventory;
  if (!inv.lastResetDate) {
    // 첫 진입: 오늘 날짜로 초기화만
    inv.lastResetDate = today;
    return;
  }
  if (inv.lastResetDate === today) return; // 이미 오늘자

  // 날짜 바뀜 → 전체 품목 롤오버. 미달분 이월 없음 = 누계 그냥 0으로
  Object.keys(inv.byProduct).forEach(pid => {
    const e = inv.byProduct[pid];
    e.prev = e.stock;
    e.receivedToday = 0;
    e.deductedToday = 0;
  });
  // 어제 차감한 주문 기록은 유지 (다른 날 추적용)할 필요 없으니 정리
  inv.deductedOrders = {};
  inv.lastResetDate = today;
  saveDB();
}

// 품목 항목 초기화 (없으면 생성)
function inventoryEnsureProduct(pid) {
  if (!DB.inventory) DB.inventory = { lastResetDate:'', byProduct:{}, deductedOrders:{} };
  const inv = DB.inventory;
  if (!inv.byProduct) inv.byProduct = {};         // 구버전 DB 보호
  if (!inv.deductedOrders) inv.deductedOrders = {};
  if (!inv.byProduct[pid]) {
    inv.byProduct[pid] = { stock: 0, prev: 0, receivedToday: 0, deductedToday: 0 };
  }
  return inv.byProduct[pid];
}

// 음수 재고 표기: 음수면 (절댓값), 양수/0 이면 그대로 숫자
function inventoryFmt(n) {
  const v = Math.round(n || 0);
  if (v < 0) return '(' + Math.abs(v) + ')';
  return String(v);
}

// 오늘 배송완료된 주문에서 품목별 출고 집계 (제품 ID 기준)
// 반환: { [productId]: { boxQty, packQty, kgQty, perOrder: [{orderId, custName, boxQty, packQty, kgQty}] } }
function inventoryComputeTodaysOutgoing() {
  const today = todayLocalISO();
  const out = {};
  DB.orders.forEach(o => {
    if (o.status !== 'delivered') return;
    const ref = (o.deliveredAt || o.invoicedAt || o.orderDate || '').slice(0,10);
    if (ref !== today) return;
    const cust = DB.customers.find(c => c.id === o.customerId);
    const custName = cust ? cust.name : '-';
    (o.items || []).forEach(it => {
      if (!it.productId) return;
      const pid = it.productId;
      if (!out[pid]) out[pid] = { boxQty: 0, packQty: 0, kgQty: 0, perOrder: [] };
      let boxQty = 0, packQty = 0, kgQty = 0;
      if (it.unit === '작업중량') {
        kgQty = +(it.actualWeightKg != null ? it.actualWeightKg : it.quantity) || 0;
      } else if (it.unit === '팩') {
        packQty = +(it.quantity) || 0;
      } else {
        // 박스 (기본)
        boxQty = +(it.quantity) || 0;
      }
      out[pid].boxQty += boxQty;
      out[pid].packQty += packQty;
      out[pid].kgQty += kgQty;
      out[pid].perOrder.push({ orderId: o.id, custName, boxQty, packQty, kgQty, unit: it.unit, notes: it.notes||'' });
    });
  });
  return out;
}

// 5개 카테고리 요약: 각 카테고리별 전재고/입고/출고/현재고 합계
function inventoryComputeCategorySummary() {
  const summary = {};
  INVENTORY_CATEGORIES.forEach(cat => {
    summary[cat] = { prev: 0, received: 0, deducted: 0, stock: 0, products: [] };
  });
  DB.products.forEach(p => {
    if (!INVENTORY_CATEGORIES.includes(p.cut)) return;
    const e = inventoryEnsureProduct(p.id);
    const cat = summary[p.cut];
    cat.prev += e.prev || 0;
    cat.received += e.receivedToday || 0;
    cat.deducted += e.deductedToday || 0;
    cat.stock += e.stock || 0;
    cat.products.push({ p, e });
  });
  return summary;
}

window.inventoryToggleStocktake = function() {
  const wrap = document.getElementById('invStocktakeWrap');
  const btn = document.getElementById('invStocktakeToggleBtn');
  const applyBtn = document.getElementById('invStocktakeApplyBtn');
  const clearBtn = document.getElementById('invStocktakeClearBtn');
  if (!wrap || !btn) {
    console.warn('inventoryToggleStocktake: wrap/btn not found');
    return;
  }
  const open = wrap.style.display !== 'none';
  if (open) {
    // 접기
    wrap.style.display = 'none';
    btn.textContent = '📋 품목 리스트 펼치기';
    if (applyBtn) applyBtn.style.display = 'none';
    if (clearBtn) clearBtn.style.display = 'none';
  } else {
    // 펼치기 — 이 시점에 렌더링 (lazy)
    try {
      inventoryRenderStocktake();
    } catch(err) {
      console.error('inventoryRenderStocktake 실패:', err);
      wrap.innerHTML = '<div style="padding:14px; color:var(--warn); font-size:13px;">❌ 품목 리스트 로드 실패: ' + (err && err.message ? err.message : err) + '<br><small>관리자에게 위 내용을 알려주세요.</small></div>';
    }
    wrap.style.display = '';
    btn.textContent = '📋 품목 리스트 접기';
    if (applyBtn) applyBtn.style.display = '';
    if (clearBtn) clearBtn.style.display = '';
  }
};

window.inventoryApplyStocktakeBulk = function() {
  inventoryRolloverIfNeeded();
  const inputs = document.querySelectorAll('.invStockInput');
  const changes = [];
  inputs.forEach(el => {
    const raw = el.value.trim();
    if (raw === '') return; // 빈 칸 = 변경 없음
    const v = parseInt(raw, 10);
    if (isNaN(v)) return;
    changes.push({ pid: el.dataset.pid, value: v });
  });
  if (changes.length === 0) {
    alert('입력된 실사값이 없습니다.\n적용할 행에 박스 수를 입력하세요.');
    return;
  }
  // 변경 미리보기
  const preview = changes.slice(0, 8).map(ch => {
    const p = DB.products.find(x => x.id === ch.pid);
    const unit = p ? inventoryUnitLabel(p.cut) : '단위';
    return `  • ${p ? p.name : ch.pid}: ${ch.value}${unit}`;
  }).join('\n');
  const more = changes.length > 8 ? `\n  ... 외 ${changes.length - 8}건` : '';
  if (!confirm(`다음 ${changes.length}개 품목의 전재고를 실사값으로 적용합니다.\n오늘 입고·출고는 그 위에 그대로 가산됩니다.\n\n${preview}${more}\n\n진행할까요?`)) return;

  changes.forEach(ch => {
    const e = inventoryEnsureProduct(ch.pid);
    e.prev = ch.value;
    e.stock = ch.value + (e.receivedToday || 0) - (e.deductedToday || 0);
  });
  saveDB();
  showToast(`✅ ${changes.length}개 품목 실사 적용 완료`);
  inventoryRenderSummary();
  inventoryRenderStocktake();
};

function inventoryRenderOutgoing() {
  const wrap = document.getElementById('invOutgoingWrap');
  if (!wrap) return;
  const out = inventoryComputeTodaysOutgoing();
  const deducted = DB.inventory.deductedOrders || {};

  // 카테고리별로 묶어서 표시
  const byCat = {};
  INVENTORY_CATEGORIES.forEach(c => byCat[c] = []);

  Object.keys(out).forEach(pid => {
    const p = DB.products.find(x => x.id === pid);
    if (!p || !INVENTORY_CATEGORIES.includes(p.cut)) return;
    const o = out[pid];
    const kgBoxConvert = inventoryBoxConvert(o.kgQty, p.cut);
    const packBoxConvert = inventoryPackToBox(o.packQty, p.cut);
    const totalDeduct = o.boxQty + packBoxConvert + kgBoxConvert;
    byCat[p.cut].push({ p, ...o, kgBoxConvert, packBoxConvert, totalDeduct });
  });

  const hasAny = Object.values(byCat).some(arr => arr.length > 0);
  if (!hasAny) {
    wrap.innerHTML = `<div class="empty">오늘 배송완료된 출고 내역이 없습니다.</div>`;
    return;
  }

  wrap.innerHTML = INVENTORY_CATEGORIES.map(cat => {
    const arr = byCat[cat];
    if (arr.length === 0) return '';
    return `
      <div style="margin-bottom:14px;">
        <div style="font-weight:700; color:var(--brand-dark); padding:6px 8px; background:#FAF0E8; border-left:3px solid var(--brand);">▼ ${cat}</div>
        <table class="t" style="margin-top:4px;">
          <thead><tr>
            <th>품목</th>
            <th>거래처별 출고</th>
            <th class="num">박스</th>
            <th class="num">팩 (2팩=1박스)</th>
            <th class="num">kg 누적</th>
            <th class="num">환산 박스</th>
            <th class="num">합계 차감</th>
          </tr></thead>
          <tbody>
            ${arr.map(row => {
              const perOrderTxt = row.perOrder.map(po => {
                let tag;
                if (po.unit === '작업중량') tag = `${po.kgQty}kg`;
                else if (po.unit === '팩') tag = `${po.packQty}팩`;
                else tag = `${po.boxQty}박스`;
                const done = deducted[po.orderId] ? ' <span style="color:var(--ok);">✓차감</span>' : '';
                return `${po.custName} ${tag}${done}`;
              }).join(' · ');
              const allDone = row.perOrder.every(po => deducted[po.orderId]);
              const rowStyle = allDone ? 'color:#999; background:#F5F5F5;' : '';
              const unitLbl = inventoryUnitLabel(row.p.cut);
              const packTxt = row.packQty > 0 ? `${row.packQty}팩→${row.packBoxConvert}${unitLbl}` : '—';
              const kgTxt = row.kgQty > 0 ? row.kgQty.toFixed(1)+' kg' : '—';
              const kgBoxTxt = row.kgQty > 0 ? row.kgBoxConvert+'박스' : '—';
              return `<tr style="${rowStyle}">
                <td><b>${row.p.name}</b></td>
                <td style="font-size:12px;">${perOrderTxt}</td>
                <td class="num">${row.boxQty || '—'}</td>
                <td class="num" style="font-size:11px;">${packTxt}</td>

                <td class="num">${kgBoxTxt}</td>

// 전체 일괄 차감: 오늘 배송완료 + 아직 미차감 주문 전부 적용
window.inventoryApplyAllToday = function() {
  inventoryRolloverIfNeeded();
  const today = todayLocalISO();
  const inv = DB.inventory;
  const out = inventoryComputeTodaysOutgoing();
  const deducted = inv.deductedOrders || {};

  // 미차감 주문 ID 수집
  const pendingOrderIds = new Set();
  Object.keys(out).forEach(pid => {
    out[pid].perOrder.forEach(po => {
      if (!deducted[po.orderId]) pendingOrderIds.add(po.orderId);
    });
  });

  if (pendingOrderIds.size === 0) {
    alert('오늘 차감할 신규 출고가 없습니다.');
    return;
  }

  if (!confirm(`오늘 배송완료된 ${pendingOrderIds.size}건의 주문을 일괄 차감합니다.\n\n진행할까요?`)) return;

  // 품목별 박스 출고 + 팩 누적 + kg 누적 합산 → 환산 → 차감 적용
  // 미차감 주문만 합산
  const byProductBox  = {}; // pid -> box total
  const byProductPack = {}; // pid -> pack total
  const byProductKg   = {}; // pid -> kg total

  DB.orders.forEach(o => {
    if (o.status !== 'delivered') return;
    if (!pendingOrderIds.has(o.id)) return;
    const ref = (o.deliveredAt || o.invoicedAt || o.orderDate || '').slice(0,10);
    if (ref !== today) return;
    (o.items || []).forEach(it => {
      if (!it.productId) return;
      const p = DB.products.find(x => x.id === it.productId);
      if (!p || !INVENTORY_CATEGORIES.includes(p.cut)) return;
      if (it.unit === '작업중량') {
        byProductKg[it.productId] = (byProductKg[it.productId] || 0) + (+(it.actualWeightKg != null ? it.actualWeightKg : it.quantity) || 0);
      } else if (it.unit === '팩') {
        byProductPack[it.productId] = (byProductPack[it.productId] || 0) + (+(it.quantity) || 0);
      } else {
        byProductBox[it.productId] = (byProductBox[it.productId] || 0) + (+(it.quantity) || 0);
      }
    });
  });

  // 적용
  const allPids = new Set([
    ...Object.keys(byProductBox),
    ...Object.keys(byProductPack),
    ...Object.keys(byProductKg)
  ]);
  allPids.forEach(pid => {
    const p = DB.products.find(x => x.id === pid);
    if (!p) return;
    const e = inventoryEnsureProduct(pid);
    const boxOut = byProductBox[pid] || 0;
    const packOut = byProductPack[pid] || 0;
    const kgOut = byProductKg[pid] || 0;
    const packBox = inventoryPackToBox(packOut, p.cut);
    const kgBox = inventoryBoxConvert(kgOut, p.cut);
    const total = boxOut + packBox + kgBox;
    e.deductedToday += total;
    e.stock -= total;
  });

  // 차감 완료 마킹
  const stamp = new Date().toISOString();
  pendingOrderIds.forEach(oid => { deducted[oid] = stamp; });
  inv.deductedOrders = deducted;

  saveDB();
  // 화면 즉시 갱신 (카테고리 현황 + 출고 목록)
  inventoryRenderSummary();
  inventoryRenderOutgoing();
  // 영향 받은 카테고리 자동 펼침 — 변경 확인 쉽게
  const affectedCats = new Set();
  allPids.forEach(pid => {
    const p = DB.products.find(x => x.id === pid);
    if (p && p.cut) affectedCats.add(p.cut);
  });
  affectedCats.forEach(cat => {
    const detail = document.getElementById('invCatDetail_' + cat);
    const row = document.getElementById('invCatRow_' + cat);
    if (detail && detail.style.display === 'none') {
      detail.style.display = '';
      if (row && row.firstElementChild) row.firstElementChild.textContent = '▼';
    }
  });
  // 카테고리 요약 영역으로 스크롤
  const sumWrap = document.getElementById('invSummaryWrap');
  if (sumWrap && sumWrap.scrollIntoView) sumWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  showToast(`✅ ${pendingOrderIds.size}건 출고 차감 완료`);
  alert(`✅ ${pendingOrderIds.size}건 일괄 차감 완료.\n\n📦 카테고리 현황에 즉시 반영되었습니다.`);
};

// 5개 카테고리를 좌·우 2단으로 자동 균등 분배 (greedy bin-packing)
// 각 카테고리 "무게" = 1(헤더) + 품목 수
function inventoryAutoBalance(sum) {
  const items = INVENTORY_CATEGORIES.map(cat => ({
    cat,
    s: sum[cat],
    weight: 1 + sum[cat].products.length
  }));
  // 큰 카테고리부터 빈 컬럼에 배치
  const sorted = [...items].sort((a,b) => b.weight - a.weight);
  const left = [], right = [];
  let leftSum = 0, rightSum = 0;
  for (const it of sorted) {
    if (leftSum <= rightSum) { left.push(it); leftSum += it.weight; }
    else { right.push(it); rightSum += it.weight; }
  }
  // 원래 카테고리 순서 유지 (보기 좋게)
  const ord = c => INVENTORY_CATEGORIES.indexOf(c.cat);
  left.sort((a,b) => ord(a) - ord(b));
  right.sort((a,b) => ord(a) - ord(b));
  return { left, right };
}

// 2단 자동 균등 분배 본문 (PDF·인쇄 공용)
function buildInventoryBodyHTML() {
  const sum = inventoryComputeCategorySummary();
  const { left, right } = inventoryAutoBalance(sum);
  // 카테고리 합계 (총합 요약용)
  const total = INVENTORY_CATEGORIES.reduce((a,c) => {
    const s = sum[c];
    a.prev += s.prev; a.received += s.received; a.deducted += s.deducted; a.stock += s.stock;
    return a;
  }, { prev:0, received:0, deducted:0, stock:0 });
  return `
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6mm;">
      <div>${left.map(inventoryCategoryBlockHTML).join('')}</div>
      <div>${right.map(inventoryCategoryBlockHTML).join('')}</div>

}

    });

// =========================================================================
//  AUTO-BACKUP: 매일 정해진 시각에 JSON 자동 백업 (디바이스 단위)
// =========================================================================
const AUTO_BACKUP_KEY = 'atm_last_auto_backup_date';
async function checkAutoBackup(opts) {
  opts = opts || {};
  try {
    const settings = (DB && DB.settings) || {};
    const enabled = settings.autoBackupEnabled !== false; // 기본 ON
    const mode = settings.autoBackupMode || 'both'; // 'scheduled' | 'onOpen' | 'both'
    const hour = (typeof settings.autoBackupHour === 'number') ? settings.autoBackupHour : 22;
    if (!enabled) return;
    if (!_backupDirHandle) return; // 폴더 미설정이면 자동 백업 skip (조용히)

    const today = todayLocalISO();
    const last = localStorage.getItem(AUTO_BACKUP_KEY) || '';
    if (last === today) return; // 오늘 이미 자동 백업 완료

    const now = new Date();
    const isOpenTrigger = !!opts.onOpen;

    // 트리거 게이트:
    // - onOpen 호출이면 모드가 'onOpen' 또는 'both'일 때 즉시 실행 (시각 무시)
    // - 인터벌(주기) 호출이면 모드가 'scheduled' 또는 'both'일 때 설정 시각 이후만 실행
    if (isOpenTrigger) {
      if (mode === 'scheduled') return; // 스케줄 전용 모드면 onOpen 무시
    } else {
      if (mode === 'onOpen') return; // onOpen 전용 모드면 인터벌 무시
      if (now.getHours() < hour) return; // 설정 시각 이전이면 대기
    }

    const result = await exportAll(true); // silent=true
    if (result && result.success) {
      localStorage.setItem(AUTO_BACKUP_KEY, today);
      showToast(`🔄 자동 백업 완료 (${isOpenTrigger?'앱 열림':'스케줄'}) — ${result.filename}`);
    }
  } catch(e) {
    console.warn('자동 백업 실패:', e);
  }
}
function setAutoBackupMode(mode) {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupMode = mode;
  saveDB();
  const label = { scheduled:'정해진 시각', onOpen:'앱 열 때', both:'둘 다' }[mode] || mode;
  showToast(`✅ 자동 백업 동작: ${label}`);
  route();
}
function setAutoBackupTime(hour) {
  if (!DB.settings) DB.settings = {};
  DB.settings.autoBackupHour = hour;
  saveDB();
  showToast(`✅ 자동 백업 시각이 ${hour}:00로 변경되었습니다.`);
  route();
}
function toggleAutoBackup() {
  if (!DB.settings) DB.settings = {};

}

//  AUTO-SAVE: 인보이스 발행 시 OneDrive 폴더에 JSON + PDF 자동 저장

async function autoSaveInvoice(orderId) {
  const o = DB.orders.find(x => x.id === orderId);
  if (!o) return;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const dirHandle = await getBackupDirHandle();

  // 1. JSON 백업
  try {
    const json = JSON.stringify(DB, null, 2);
    const jsonFilename = `ATM_backup_${ts}.json`;
    if (dirHandle) {
      await writeToFolderPath(dirHandle, ['_백업(JSON)', dateStr], jsonFilename, json);
    } else {
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = jsonFilename; a.click();
      URL.revokeObjectURL(url);
    }
  } catch(e) { console.warn('JSON 백업 실패:', e); }

  // 2. 인보이스 PDF
  if (typeof window.jspdf !== 'undefined' && typeof window.html2canvas !== 'undefined') {
    try {
      const cust = DB.customers.find(c => c.id === o.customerId) || { name:'미확인', contact:'', phone:'', address:'', terms:'' };
      const totals = computeTotals(o);
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#fff;z-index:-1;pointer-events:none;';
      document.body.appendChild(container);
      container.innerHTML = buildInvoiceHTML(o, cust, totals);
      await new Promise(r => setTimeout(r, 120));
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false
      });
      document.body.removeChild(container);
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pageW = 210, pageH = 297;
      const imgH = canvas.height * pageW / canvas.width;
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      if (imgH <= pageH) {
        doc.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);
      } else {
        let yOff = 0;
        while (yOff < imgH) {
          if (yOff > 0) doc.addPage();
          doc.addImage(imgData, 'JPEG', 0, -yOff, pageW, imgH);
          yOff += pageH;
        }
      }
      const custName = cust.name.replace(/[\/:*?"<>|]/g, '_');
      const pdfFilename = `${o.invoiceNo || o.orderNo}_${dateStr}_${custName}.pdf`;
      if (dirHandle) {
        const buf = doc.output('arraybuffer');
        // exportInvoicePDFs 와 동일한 단일 구조로 저장
        // (선택한 거래처 백업 폴더) > ATM Invoice > {거래처} > PDF
        await writeToFolderPath(dirHandle, ['ATM Invoice', custName], pdfFilename, buf);
        showToast(`✅ JSON + 인보이스 PDF 저장 완료 — 📁 ATM Invoice/거래처/`);
      } else {
        doc.save(pdfFilename);
        showToast('💾 JSON + PDF 다운로드 완료');
      }
    } catch(e) {
      console.warn('PDF 저장 실패:', e);
      showToast(dirHandle ? '💾 JSON 저장 완료 (PDF 실패)' : '💾 JSON 백업 다운로드 완료');
    }
  } else {
    showToast(dirHandle ? '💾 JSON 백업 저장 완료' : '💾 JSON 백업 다운로드 완료');
  }
}

    document.body.appendChild(banner);

  let _firstLoad = true;
  // 버그 수정 (2026-06-12): isSelf 윈도우 3초 → 8초. 트랜잭션 서버 round-trip 이
  // 느린 네트워크에서 3초를 넘기면 자기 저장도 외부 업데이트로 오인됨.
  const SELF_WRITE_WINDOW_MS = 8000;
  DB_REF.on('value', snapshot => {
    const isSelf = (Date.now() - _lastSaveTime) < SELF_WRITE_WINDOW_MS;
    const data = snapshot.val();

    if (_firstLoad) {
      _firstLoad = false;
      initApp(data);
      return;
    }

    // 다른 기기에서 업데이트 — 자기가 방금 저장한 게 아니면 반영
    if (!isSelf) {
      // 버그 수정: 사용자가 입력 중인 화면이면 메모리도 덮어쓰지 말 것.
      // 그렇지 않으면 입력 중인 폼이 referencing 하던 객체가 사라져 "(품목없음)

} else {

<!-- PWA: Service Worker 등록 + 설치 안내 배너                          -->
<!-- =============================================================== -->
<script>
(function setupPWA() {
  // ---------------- Service Worker 등록 + 수동 업데이트 배너 ----------------
  // 정책:
  //   · 자동 reload 안 함 (admin 작업 중 데이터 유실처럼 보이는 문제 방지)
  //   · 새 버전 감지 시 상단 배너만 표시 → 사용자가 직접 탭해야 reload
  //   · admin(#admin) 화면에서는 배너도 띄우지 않음 (해시 바뀌면 다시 표시 시도)
  let _atmPendingUpdate = false;  // 새 SW가 대기 중인지

  function _isAdminRoute() {
    return (location.hash || '').startsWith('#admin');
  }

  function showUpdateBanner() {
    if (document.getElementById('atmUpdateBanner')) return;
    if (_isAdminRoute()) return;  // admin 작업 중에는 배너 숨김
    const bar = document.createElement('div');
    bar.id = 'atmUpdateBanner';
    bar.style.cssText =
      'position:fixed; top:0; left:0; right:0; z-index:99999;' +
      'background:#1976D2; color:#fff; padding:10px 14px;' +
      'font-size:13px; font-weight:600; text-align:center;' +
      'box-shadow:0 2px 8px rgba(0,0,0,0.2); font-family:inherit;' +
      'display:flex; align-items:center; justify-content:center; gap:12px;';
    bar.innerHTML =
      '<span style="cursor:pointer; flex:1;">🔄 새 버전 있음 — 탭하여 새로고침</span>' +
      '<button id="atmUpdateDismiss" style="background:rgba(255,255,255,0.2); color:#fff;' +
      'border:none; border-radius:4px; padding:4px 10px; font-size:12px; cursor:pointer;">나중에</button>';
    bar.querySelector('span').addEventListener('click', () => location.reload());
    bar.querySelector('#atmUpdateDismiss').addEventListener('click', e => {
      e.stopPropagation();
      bar.remove();
    });
    document.body.appendChild(bar);
  }

  // 해시 변경 시: admin 벗어났고 업데이트 대기 중이면 배너 재시도
  window.addEventListener('hashchange', () => {
    if (_atmPendingUpdate && !_isAdminRoute()) showUpdateBanner();
  });

  // artifact preview(claudeusercontent.com) / file:// 등 비-production 환경에서는 SW 등록을 스킵
  // (sw.js가 배포되어 있지 않아 404가 나면서 콘솔이 지저분해짐)
  if ('serviceWorker' in navigator && IS_PROD_ENV) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.info('[PWA] Service Worker 등록 완료:', reg.scope);

        // 이미 대기 중인 워커가 있으면 즉시 배너
        if (reg.waiting && navigator.serviceWorker.controller) {
          _atmPendingUpdate = true;
          showUpdateBanner();
        }

        // 새 워커 감지 → 배너만 표시 (자동 reload 없음)
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', () => {
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              console.info('[PWA] 새 버전 감지 — 배너 표시 (수동 새로고침 대기)');
              _atmPendingUpdate = true;
              showUpdateBanner();
            }
          });
        });

        // 주기적 업데이트 체크 — 30초마다
        setInterval(() => { reg.update().catch(()=>{}); }, 30000);

        // 앱 다시 열 때(visible) 업데이트 체크
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            reg.update().catch(()=>{});
          }
        });
      }).catch(err => console.warn('[PWA] SW 등록 실패:', err));
    });
  }

  // ---------------- 환경 감지 ----------------
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
  }
  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  }
  function recentlyDismissed() {
    try {
      const v = localStorage.getItem('atm_install_dismissed');
      if (!v) return false;
      const days = (Date.now() - parseInt(v, 10)) / (1000*60*60*24);
      return days < 14; // 14일 쿨다운
    } catch (_) { return false; }
  }
  function markDismissed() {
    try { localStorage.setItem('atm_install_dismissed', String(Date.now())); } catch(_){}
  }

  // ---------------- 설치 배너 ----------------
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // 진입 직후 바로 띄우지 말고 살짝 지연 — 사용자 첫 화면 보고 나서
    setTimeout(showInstallBanner, 2500);
  });

  window.addEventListener('appinstalled', () => {
    markDismissed();
    deferredPrompt = null;
    const b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
    if (typeof window.showToast === 'function') {
      window.showToast('✅ ATM 주문 앱이 설치되었습니다!');
    }
  });

  // iOS 는 beforeinstallprompt 미지원 — 직접 안내
  window.addEventListener('load', () => {
    setTimeout(() => { if (isIOS()) showInstallBanner(); }, 5000);
  });

  function showInstallBanner() {
    if (isStandalone()) return;
    if (recentlyDismissed()) return;
    if (document.getElementById('pwa-install-banner')) return;

    const ios = isIOS();
    const promptable = !!deferredPrompt;
    if (!ios && !promptable) return; // 데스크탑 + Chrome 외 — skip

    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = [
      'position:fixed','left:12px','right:12px','bottom:16px','z-index:10000',
      'background:#fff','color:#2A1A1A',
      'border:2px solid #5C0F0F','border-radius:14px',
      'box-shadow:0 8px 24px rgba(0,0,0,0.22)',
      'padding:14px 16px','display:flex','align-items:flex-start','gap:12px',
      'font-size:13px','line-height:1.5',
      'max-width:480px','margin:0 auto',
      'animation:pwaSlideUp 0.35s ease-out'
    ].join(';');

    const iconHtml = '<img src="icon-192.png" alt="ATM" style="width:48px;height:48px;border-radius:10px;flex-shrink:0;">';
    const closeBtn = '<button id="pwa-install-close" aria-label="닫기" style="background:none;border:none;color:#999;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;align-self:flex-start;">×</button>';

    if (ios) {
      banner.innerHTML = `
        ${iconHtml}
        <div style="flex:1;">
          <div style="font-weight:700; color:#5C0F0F; font-size:14px; margin-bottom:4px;">
            🏠 홈 화면에 추가 / Add to Home Screen
          </div>
          <div style="color:#555; font-size:12px;">
            하단의 <b>공유 버튼 <span style="display:inline-block;border:1px solid #888;border-radius:4px;padding:0 4px;font-size:11px;">⬆️</span></b> → <b>"홈 화면에 추가"</b>를 눌러 앱처럼 사용하세요.
          </div>
          <div style="margin-top:8px;">
            <button id="pwa-install-later" style="background:#F2EEE8;border:1px solid #ddd;color:#666;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;">14일 후 다시 보기</button>
          </div>
        </div>
        ${closeBtn}
      `;
    } else {
      banner.innerHTML = `
        ${iconHtml}
        <div style="flex:1;">
          <div style="font-weight:700; color:#5C0F0F; font-size:14px; margin-bottom:4px;">
            🥩 ATM 주문 앱 설치 / Install App
          </div>
          <div style="color:#555; font-size:12px;">
            홈 화면에 추가하면 더 빠르게 접속할 수 있고, 오프라인에서도 작동해요.
          </div>
          <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
            <button id="pwa-install-now" style="background:#5C0F0F;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📲 설치 / Install</button>
            <button id="pwa-install-later" style="background:#F2EEE8;border:1px solid #ddd;color:#666;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;">나중에 / Later</button>
          </div>
        </div>
        ${closeBtn}
      `;
    }

    document.body.appendChild(banner);

    const remove = () => { markDismissed(); banner.remove(); };
    document.getElementById('pwa-install-close')?.addEventListener('click', remove);
    document.getElementById('pwa-install-later')?.addEventListener('click', remove);
    document.getElementById('pwa-install-now')?.addEventListener('click', async () => {
      if (!deferredPrompt) { remove(); return; }
      try {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        if (choice && choice.outcome === 'accepted') markDismissed();
      } catch(e) { console.warn('[PWA] install prompt 실패:', e); }
      deferredPrompt = null;
      banner.remove();
    });
  }
})();
</script>

</body>
</html>
